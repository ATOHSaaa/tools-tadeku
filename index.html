<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>蓼食う虫式 tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f0f0;
      --surface: #ffffff;
      --ink: #111111;
      --muted: #666666;
      --border: #e0e0e0;
      --accent: #1a1a1a;
      --hover: #f5f5f5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
      font-weight: 500;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.25rem 4rem;
    }
    header {
      margin-bottom: 2.5rem;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .lead {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--muted);
    }
    .grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card {
      display: block;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--ink);
      text-decoration: none;
      padding: 1.25rem 1.35rem;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .card:hover {
      background: var(--hover);
      border-color: var(--accent);
    }
    .card:active {
      background: #ebebeb;
    }
    .card-name {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }
    @media (min-width: 540px) {
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      .card--wide {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>蓼食う虫式 tools</h1>
      <p class="lead">書くための小さな道具たち</p>
    </header>
    <nav class="grid" aria-label="ツール一覧">
      <a class="card" href="pedantryfall/">
        <div class="card-name">PedantryFall</div>
        <div class="card-title">衒学の滝</div>
      </a>
      <a class="card" href="WordFall/">
        <div class="card-name">WordFall</div>
        <div class="card-title">物書きのための語彙が降ってくる</div>
      </a>
      <a class="card" href="stoic/">
        <div class="card-name">stoic</div>
        <div class="card-title">前進専用エディタ</div>
      </a>
      <a class="card" href="tachometer/">
        <div class="card-name">tachometer</div>
        <div class="card-title">執筆速度計測エディタ</div>
      </a>
      <a class="card card--wide" href="Interval/">
        <div class="card-name">Interval</div>
        <div class="card-title">立ち止まりたい人のための執筆エディタ</div>
      </a>
    </nav>
    <footer>tools.tadeku.net</footer>
  </div>
</body>
</html>
