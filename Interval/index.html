<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HN5C12BJ0W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HN5C12BJ0W');

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interval</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/site-link.css">
  <link rel="stylesheet" href="../shared/editor-title.css">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --border: #000000;
      --surface: #ffffff;
      --invert: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    body.limit {
      background: var(--invert);
      color: #fff;
    }

    body.limit .header,
    body.limit .gauge-strip,
    body.limit .notice {
      border-color: #fff;
    }

    body.limit .stats {
      color: #fff;
    }

    body.limit .bar-bg {
      border-color: #fff;
      background: transparent;
    }

    body.limit #bar-fill {
      background: #fff;
    }

    body.limit #editor {
      color: #fff;
      caret-color: #fff;
    }

    body.limit .work-title {
      color: #fff;
    }

    body.limit .work-title::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }

    .header-stack {
      padding: 0.85rem 1.25rem 0.85rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn {
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--invert);
      color: #fff;
    }

    body.limit .btn {
      border-color: #fff;
      color: #fff;
      background: transparent;
    }

    body.limit .btn:hover {
      background: #fff;
      color: #000;
    }

    .brand {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .stats {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: right;
    }

    .gauge-strip {
      padding: 0.75rem 1.25rem;
      border-top: 2px solid var(--border);
    }

    .bar-bg {
      width: 100%;
      height: 8px;
      border: 2px solid var(--border);
      background: var(--surface);
    }

    #bar-fill {
      height: 100%;
      width: 0%;
      background: var(--ink);
      transition: width 0.2s linear;
    }

    .editor-wrap {
      flex: 1;
      min-height: 0;
    }

    #editor {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 1.05rem;
      line-height: 2;
      color: var(--ink);
      padding: 1.5rem 1.75rem;
      resize: none;
      outline: none;
      caret-color: var(--ink);
      transition: opacity 0.3s;
    }

    #editor:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .notice {
      flex-shrink: 0;
      padding: 0.65rem 1.25rem;
      border-top: 2px solid var(--border);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
    }
  </style>
</head>
<body id="body">
  <div class="layout">
    <header class="header">
      <div class="header-stack">
        <div class="header-row">
          <div class="brand">Interval</div>
          <div class="header-right">
            <div class="stats">
              <span id="gauge-prefix">10秒間の負荷:</span>
              <strong id="current-count">00</strong> / 25
            </div>
          </div>
        </div>
        <input type="text" class="work-title" id="work-title" placeholder="Title" maxlength="60" spellcheck="false">
      </div>
      <div class="gauge-strip">
        <div class="bar-bg">
          <div id="bar-fill"></div>
        </div>
      </div>
    </header>
    <div class="editor-wrap">
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
    <div class="notice">10秒間に25文字を超えると、言葉が冷めるまで入力できません · Library に自動保存</div>
  </div>

  <script src="../shared/editor-prefs.js"></script>
  <script src="../shared/editor-library.js"></script>
  <script>
    const body = document.getElementById('body');
    const editor = document.getElementById('editor');
    const workTitle = document.getElementById('work-title');
    const barFill = document.getElementById('bar-fill');
    const currentCountLabel = document.getElementById('current-count');
    const gaugePrefix = document.getElementById('gauge-prefix');

    let inputHistory = [];
    let committedLength = 0;
    let isComposing = false;
    let skipNextInputCount = false;
    let cooldownUntil = 0;
    const LIMIT_CHARS = 25;
    const TIME_WINDOW = 10000;
    const COOLDOWN_MS = 3000;

    TadekuEditorPrefs.trackEditor('interval');

    const library = TadekuEditorLibrary.createLibrarySession(
      'interval',
      () => ({ title: workTitle.value, body: editor.value }),
      {
        onLoad: ({ title, body }) => {
          workTitle.value = title || '';
          editor.value = body || '';
          committedLength = editor.value.length;
          inputHistory = [];
          updateStatus();
        },
        onTitleResolved: (uniqueTitle) => {
        if (document.activeElement !== workTitle) workTitle.value = uniqueTitle;
      } },
    );

    function scheduleSave() {
      library.scheduleSave();
    }

    workTitle.addEventListener('input', scheduleSave);

    setInterval(updateStatus, 100);

    editor.addEventListener('compositionstart', () => {
      isComposing = true;
    });

    editor.addEventListener('compositionend', () => {
      isComposing = false;
      recordCommittedInput();
    });

    editor.addEventListener('paste', () => {
      skipNextInputCount = true;
    });

    editor.addEventListener('input', (e) => {
      if (e.isComposing || isComposing) return;
      const fromPaste = skipNextInputCount
        || e.inputType === 'insertFromPaste'
        || e.inputType === 'insertFromDrop';
      skipNextInputCount = false;
      recordCommittedInput(fromPaste);
    });

    function recordCommittedInput(skipCount) {
      const newLen = editor.value.length;
      const delta = newLen - committedLength;
      if (delta > 0 && !skipCount) {
        const now = Date.now();
        for (let i = 0; i < delta; i++) inputHistory.push(now);
      }
      committedLength = newLen;
      scheduleSave();
      updateStatus();
    }

    function updateStatus() {
      const now = Date.now();
      inputHistory = inputHistory.filter(time => now - time < TIME_WINDOW);

      const count = inputHistory.length;
      currentCountLabel.textContent = String(count).padStart(2, '0');
      barFill.style.width = Math.min(100, (count / LIMIT_CHARS) * 100) + '%';

      if (count > LIMIT_CHARS && cooldownUntil <= now) {
        cooldownUntil = now + COOLDOWN_MS;
      }

      const inCooldown = now < cooldownUntil;
      const limited = inCooldown || count > LIMIT_CHARS;
      body.classList.toggle('limit', limited);

      if (limited) {
        editor.disabled = true;
        if (inCooldown) {
          const remain = Math.ceil((cooldownUntil - now) / 1000);
          gaugePrefix.textContent = `言葉が溢れました。あと ${String(remain).padStart(2, '0')} 秒:`;
        } else {
          gaugePrefix.textContent = '言葉が溢れました。少し待ってください:';
        }
        editor.blur();
      } else {
        cooldownUntil = 0;
        if (editor.disabled) {
          editor.disabled = false;
          editor.focus();
        }
        gaugePrefix.textContent = '10秒間の負荷:';
      }
    }

    (async () => {
      const docId = new URLSearchParams(location.search).get('doc');
      if (docId) await library.openDocument(docId);
      editor.focus();
      editor.setSelectionRange(0, 0);
    })();
  </script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
