<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="執筆速度をリアルタイムで見える化する小説執筆エディタ。文字/分・進捗・到達予測時刻をダッシュボードで確認し、書くリズムを整えられます。">
  <title>Tachometer — 執筆ペースを可視化 | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --border: #000000;
      --surface: #ffffff;
      --invert: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    body.slow-down .editor-wrap {
      opacity: 0.35;
      transition: opacity 0.4s;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }

    .header-stack {
      padding: 0.85rem 1.25rem 0.85rem;
    }

    .brand {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 2px solid var(--border);
    }

    .metric {
      padding: 0.75rem 0.5rem;
      text-align: center;
      border-right: 2px solid var(--border);
    }

    .metric:last-child {
      border-right: none;
    }

    .metric-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 0.35rem;
    }

    .metric-value {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .metric-unit {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .goal-input {
      width: 4.5rem;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 900;
      text-align: center;
      padding: 0.15rem 0.25rem;
      outline: none;
    }

    .goal-input:focus {
      background: var(--invert);
      color: #fff;
    }

    .editor-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      transition: opacity 0.4s;
    }

    .editor-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: var(--glow-level, 0);
      transition: opacity 0.25s linear;
      animation:
        rainbow-hue var(--hue-duration, 4s) linear infinite,
        rainbow-pulse var(--pulse-duration, 2s) ease-in-out infinite;
    }

    @keyframes rainbow-hue {
      to { filter: hue-rotate(360deg); }
    }

    @keyframes rainbow-pulse {
      0%, 100% {
        box-shadow:
          inset 0 0 0 var(--border-lo, 1px) hsl(0, 100%, 55%),
          inset 0 0 var(--glow-in-lo, 6px) hsla(0, 100%, 55%, var(--alpha-lo, 0.15)),
          0 0 var(--glow-out-lo, 8px) hsla(0, 100%, 55%, var(--alpha-lo, 0.1));
      }
      50% {
        box-shadow:
          inset 0 0 0 var(--border-hi, 3px) hsl(0, 100%, 55%),
          inset 0 0 var(--glow-in-hi, 24px) hsla(0, 100%, 55%, var(--alpha-hi, 0.55)),
          0 0 var(--glow-out-hi, 40px) hsla(0, 100%, 55%, var(--alpha-hi, 0.4));
      }
    }

    #editor {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 1.05rem;
      line-height: 2;
      color: var(--ink);
      padding: 1.5rem 1.75rem;
      resize: none;
      outline: none;
      caret-color: var(--ink);
    }

    .footer {
      flex-shrink: 0;
      padding: 0.65rem 1.25rem;
      border-top: 2px solid var(--border);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
    }

    @media (max-width: 640px) {
      .dashboard {
        grid-template-columns: repeat(2, 1fr);
      }

      .metric:nth-child(2) {
        border-right: none;
      }

      .metric:nth-child(1),
      .metric:nth-child(2) {
        border-bottom: 2px solid var(--border);
      }
    }
  </style>
  <link rel="stylesheet" href="../shared/site-link.css">
  <link rel="stylesheet" href="../shared/editor-title.css">
  <link rel="stylesheet" href="../shared/editor-save-indicator.css">
</head>
<body id="body">
  <div class="layout">
    <header class="header">
      <div class="header-stack">
        <div class="header-row">
          <div class="brand"><a class="brand-home" href="https://tools.tadeku.net/">tadeku-tools</a><span class="brand-sep"> / </span>Tachometer</div>
          <div class="stats">
            <span class="save-indicator" id="save-indicator"></span>
            <span>文字数 <strong id="char-count">0</strong></span>
          </div>
        </div>
        <input type="text" class="work-title" id="work-title" placeholder="Title" maxlength="60" spellcheck="false">
      </div>
      <div class="dashboard">
        <div class="metric">
          <div class="metric-label">目標</div>
          <input type="number" id="goal-chars" class="goal-input" value="1000">
        </div>
        <div class="metric">
          <div class="metric-label">執筆速度</div>
          <div class="metric-value"><span id="speed">0</span><span class="metric-unit"> 字/分</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">ゴールまで</div>
          <div class="metric-value"><span id="eta">--</span><span class="metric-unit"> 分</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">進捗</div>
          <div class="metric-value"><span id="progress">0</span><span class="metric-unit"> %</span></div>
        </div>
      </div>
    </header>
    <div class="editor-wrap" id="editor-wrap">
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
  </div>

  <script src="../shared/editor-prefs.js"></script>
  <script src="../shared/editor-library.js"></script>
  <script>
    const editor = document.getElementById('editor');
    const workTitle = document.getElementById('work-title');
    const editorWrap = document.getElementById('editor-wrap');
    const body = document.getElementById('body');
    const speedDisplay = document.getElementById('speed');
    const etaDisplay = document.getElementById('eta');
    const progressDisplay = document.getElementById('progress');
    const goalInput = document.getElementById('goal-chars');
    const saveIndicator = document.getElementById('save-indicator');
    const charCountEl = document.getElementById('char-count');

    let charHistory = [];
    let lastInputTime = Date.now();

    TadekuEditorPrefs.trackEditor('tachometer');

    const library = TadekuEditorLibrary.createLibrarySession(
      'tachometer',
      () => ({ title: workTitle.value, body: editor.value }),
      {
        onLoad: ({ title, body }) => {
          workTitle.value = title || '';
          editor.value = body || '';
          charHistory = [];
          lastInputTime = Date.now();
          updateDashboard();
        },
        onTitleResolved: (uniqueTitle) => {
          if (document.activeElement !== workTitle) workTitle.value = uniqueTitle;
        },
        onSaved: () => {
          saveIndicator.textContent = '保存済み';
          saveIndicator.classList.add('saved');
        },
        onError: () => {
          saveIndicator.textContent = '保存エラー';
          saveIndicator.classList.remove('saved');
        },
      },
    );

    function scheduleSave() {
      saveIndicator.textContent = '保存中…';
      saveIndicator.classList.remove('saved');
      library.scheduleSave();
    }

    workTitle.addEventListener('input', scheduleSave);

    editor.addEventListener('input', () => {
      const now = Date.now();
      lastInputTime = now;
      charHistory.push({ time: now, count: editor.value.length });
      scheduleSave();
      updateDashboard();
    });

    setInterval(updateDashboard, 1000);

    const SPEED_REF = 250;

    function smoothstep(t) {
      t = Math.max(0, Math.min(1, t));
      return t * t * (3 - 2 * t);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function setGlowVar(name, value) {
      editorWrap.style.setProperty(name, value);
    }

    function applyRainbowGlow(speed, idleSeconds) {
      const speedT = smoothstep(Math.pow(Math.min(speed, SPEED_REF) / SPEED_REF, 0.55));
      const idleT = Math.max(0, 1 - idleSeconds / 4);
      const intensity = speedT * idleT;

      if (intensity < 0.01) {
        setGlowVar('--glow-level', '0');
        return;
      }

      setGlowVar('--glow-level', intensity.toFixed(3));
      setGlowVar('--pulse-duration', lerp(2.8, 0.12, intensity).toFixed(3) + 's');
      setGlowVar('--hue-duration', lerp(5, 0.25, intensity).toFixed(3) + 's');
      setGlowVar('--border-lo', lerp(1, 2, intensity).toFixed(2) + 'px');
      setGlowVar('--border-hi', lerp(2, 7, intensity).toFixed(2) + 'px');
      setGlowVar('--glow-in-lo', lerp(4, 20, intensity).toFixed(1) + 'px');
      setGlowVar('--glow-in-hi', lerp(12, 55, intensity).toFixed(1) + 'px');
      setGlowVar('--glow-out-lo', lerp(6, 25, intensity).toFixed(1) + 'px');
      setGlowVar('--glow-out-hi', lerp(16, 70, intensity).toFixed(1) + 'px');
      setGlowVar('--alpha-lo', lerp(0.08, 0.35, intensity).toFixed(3));
      setGlowVar('--alpha-hi', lerp(0.25, 1, intensity).toFixed(3));
    }

    function updateDashboard() {
      const now = Date.now();
      const currentLength = editor.value.length;
      const goal = parseInt(goalInput.value, 10) || 1;

      const fiveMinutesAgo = now - 300000;
      charHistory = charHistory.filter(entry => entry.time > fiveMinutesAgo);

      progressDisplay.textContent = Math.min(100, Math.floor((currentLength / goal) * 100));
      charCountEl.textContent = currentLength;

      let speed = 0;
      if (charHistory.length > 1) {
        const firstEntry = charHistory[0];
        const timeDiffMin = (now - firstEntry.time) / 60000;
        const charDiff = currentLength - firstEntry.count;
        speed = timeDiffMin > 0 ? Math.max(0, Math.floor(charDiff / timeDiffMin)) : 0;
      }
      speedDisplay.textContent = speed;

      const remaining = goal - currentLength;
      if (remaining > 0 && speed > 0) {
        etaDisplay.textContent = String(Math.ceil(remaining / speed)).padStart(2, '0');
      } else if (remaining <= 0 && currentLength > 0) {
        etaDisplay.textContent = 'OK';
      } else {
        etaDisplay.textContent = '--';
      }

      const idleSeconds = (now - lastInputTime) / 1000;
      body.classList.toggle('slow-down', idleSeconds > 10 || (speed < 20 && charHistory.length > 5));
      applyRainbowGlow(speed, idleSeconds);
    }

    (async () => {
      await library.initFromUrl();
      editor.focus();
      editor.setSelectionRange(0, 0);
    })();
  </script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
