<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HN5C12BJ0W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HN5C12BJ0W');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="近代文学クイズ。100問の作品から10問がランダム出題。結果と解説は最後にまとめて表示されます。">
  <title>近代文学クイズ | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/site-link.css">
  <style>
    :root {
      --bg: #f2ebe4;
      --ink: #1a1410;
      --muted: #5c5248;
      --border: #1a1410;
      --surface: #fff;
      --accent: #6b3a3a;
      --accent-soft: #eadcda;
      --ok: #2d5a3a;
      --ok-soft: #d8eadc;
      --ng: #8a3a32;
      --ng-soft: #f0ddd8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.65;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 5rem;
    }

    .lead {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.8;
      margin-top: 0.5rem;
    }

    .panel {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: var(--surface);
      border: 2px solid var(--border);
    }

    .panel-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .btn:hover:not(:disabled) {
      background: var(--ink);
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--ink);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn-block {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 0.88rem;
    }

    .btn-share svg {
      width: 0.9rem;
      height: 0.9rem;
      fill: currentColor;
    }

    .progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .progress-bar {
      flex: 1;
      height: 0.35rem;
      background: var(--accent-soft);
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .mode-note {
      margin-top: 1rem;
      font-size: 0.78rem;
      text-align: center;
      line-height: 1.7;
      color: var(--muted);
    }

    .question-text {
      font-size: clamp(1.05rem, 3.5vw, 1.25rem);
      font-weight: 900;
      line-height: 1.55;
      margin-bottom: 1.25rem;
    }

    .choices {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      padding: 0.85rem 1rem;
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.55;
      letter-spacing: 0;
    }

    .choice-btn.is-selected {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .quiz-nav {
      display: flex;
      align-items: center;
      margin-top: 1rem;
      min-height: 2.5rem;
    }

    .quiz-nav-prev {
      margin-right: auto;
    }

    .quiz-nav-next {
      margin-left: auto;
    }

    .quiz-nav [hidden] {
      display: none;
    }

    .result-top {
      text-align: center;
      padding: 0.5rem 0 1.25rem;
      border-bottom: 1px dashed #ccc4b8;
      margin-bottom: 1.25rem;
    }

    .result-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .result-name {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 900;
      line-height: 1.35;
    }

    .result-score {
      font-size: 1.1rem;
      font-weight: 900;
      margin-top: 0.5rem;
    }

    .result-blurb {
      font-size: 0.9rem;
      line-height: 1.85;
      color: var(--muted);
      margin-top: 0.65rem;
    }

    .review-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .review-item {
      padding: 0.85rem 0.95rem;
      border: 2px solid var(--border);
      background: var(--surface);
    }

    .review-item.is-ok {
      border-color: var(--ok);
      background: var(--ok-soft);
    }

    .review-item.is-ng {
      border-color: var(--ng);
      background: var(--ng-soft);
    }

    .review-q {
      font-size: 0.88rem;
      font-weight: 900;
      line-height: 1.55;
      margin-bottom: 0.45rem;
    }

    .review-meta {
      font-size: 0.78rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .result-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.55rem;
      margin: 1.25rem 0;
    }

    .cross-banner {
      display: block;
      margin-top: 1.25rem;
      padding: 1rem 1.1rem;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--ink);
      text-decoration: none;
      text-align: center;
    }

    .cross-banner-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .cross-banner-title {
      display: block;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.03em;
    }

    .cross-banner-desc {
      display: block;
      margin-top: 0.35rem;
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .view[hidden] { display: none !important; }
  </style>
  <link rel="stylesheet" href="../shared/share-button.css">
</head>
<body>
  <div class="app">
    <header>
      <h1 class="page-title"><a class="brand-home" href="../">tadeku-tools</a><span class="brand-sep"> / </span>近代文学クイズ</h1>
      <p class="lead">作品名から作者を当てる4択クイズ。全100問から10問がランダム出題。結果と解説は最後にまとめて表示されます。</p>
    </header>

    <section class="panel view" id="view-start">
      <button type="button" class="btn btn-primary btn-block" id="start-btn">クイズを始める</button>
      <p class="mode-note">1回の挑戦は10問。100問の中からランダムに出題されます。</p>
    </section>

    <section class="panel view" id="view-quiz" hidden>
      <div class="progress">
        <span id="progress-label">1 / 10</span>
        <div class="progress-bar" aria-hidden="true"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
      </div>
      <p class="panel-title">近代文学</p>
      <h2 class="question-text" id="question-text"></h2>
      <ul class="choices" id="choices"></ul>
      <div class="quiz-nav">
        <button type="button" class="btn btn-primary quiz-nav-prev" id="prev-btn" hidden>前の問題に戻る</button>
        <button type="button" class="btn btn-primary quiz-nav-next" id="next-btn" hidden>次の問題へ</button>
      </div>
    </section>

    <div class="view" id="view-result-wrap" hidden aria-live="polite">
      <section class="panel" id="view-result">
        <h2 class="panel-title">結果</h2>
        <div class="result-top" id="result-top"></div>
        <div class="result-actions">
          <button type="button" class="btn btn-share" id="share-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Xでシェア
          </button>
          <button type="button" class="btn" id="retry-btn">もう一度</button>
        </div>
        <h3 class="panel-title">復習</h3>
        <ul class="review-list" id="review-list"></ul>
      </section>
      <a class="cross-banner" href="../bungakushi-quiz/">
        <span class="cross-banner-label">次はこちら</span>
        <span class="cross-banner-title">文学史クイズで遊ぶ →</span>
        <span class="cross-banner-desc">上代から近代まで、全500問の文学史4択クイズ</span>
      </a>
    </div>
  </div>

  <script src="../shared/kindai-author-quiz-data.js"></script>
  <script src="../shared/kindai-author-quiz-engine.js"></script>
  <script>
    const SHARE_URL = 'https://tools.tadeku.net/kindai-author-quiz/';
    const ROUND_SIZE = window.KindaiAuthorQuizData.ROUND_SIZE;
    const ADVANCE_DELAY_MS = 280;

    const els = {
      viewStart: document.getElementById('view-start'),
      viewQuiz: document.getElementById('view-quiz'),
      viewResult: document.getElementById('view-result-wrap'),
      startBtn: document.getElementById('start-btn'),
      progressLabel: document.getElementById('progress-label'),
      progressFill: document.getElementById('progress-fill'),
      questionText: document.getElementById('question-text'),
      choices: document.getElementById('choices'),
      prevBtn: document.getElementById('prev-btn'),
      nextBtn: document.getElementById('next-btn'),
      resultTop: document.getElementById('result-top'),
      reviewList: document.getElementById('review-list'),
      shareBtn: document.getElementById('share-btn'),
      retryBtn: document.getElementById('retry-btn'),
    };

    let questions = [];
    let step = 0;
    let answers = [];
    let lastResult = null;
    let advanceTimer = null;

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showView(name) {
      els.viewStart.hidden = name !== 'start';
      els.viewQuiz.hidden = name !== 'quiz';
      els.viewResult.hidden = name !== 'result';
    }

    function clearAdvanceTimer() {
      if (advanceTimer) {
        clearTimeout(advanceTimer);
        advanceTimer = null;
      }
    }

    function updateNavigation() {
      els.prevBtn.hidden = step <= 0;
      const showNext = answers[step] !== undefined && !advanceTimer;
      els.nextBtn.hidden = !showNext;
      els.nextBtn.textContent = step >= questions.length - 1 ? '結果を見る' : '次の問題へ';
    }

    function resetQuiz() {
      clearAdvanceTimer();
      questions = [];
      step = 0;
      answers = [];
      lastResult = null;
      showView('start');
    }

    function startQuiz() {
      clearAdvanceTimer();
      questions = window.KindaiAuthorQuizEngine.startRound(ROUND_SIZE);
      step = 0;
      answers = [];
      showView('quiz');
      renderQuestion();
    }

    function renderQuestion() {
      clearAdvanceTimer();
      const q = questions[step];
      const total = questions.length;
      const saved = answers[step];
      els.progressLabel.textContent = (step + 1) + ' / ' + total;
      els.progressFill.style.width = ((step + 1) / total * 100) + '%';
      els.questionText.textContent = q.text;

      els.choices.innerHTML = q.choices.map((choice, i) =>
        '<li><button type="button" class="btn choice-btn' + (saved === i ? ' is-selected' : '') + '" data-index="' + i + '">' + esc(choice) + '</button></li>'
      ).join('');

      els.choices.querySelectorAll('.choice-btn').forEach((btn) => {
        btn.addEventListener('click', () => pickAnswer(Number(btn.dataset.index)));
      });

      updateNavigation();
    }

    function pickAnswer(index) {
      clearAdvanceTimer();
      const isNewAnswer = answers[step] === undefined;
      answers[step] = index;

      els.choices.querySelectorAll('.choice-btn').forEach((btn, i) => {
        btn.classList.toggle('is-selected', i === index);
      });

      if (isNewAnswer) {
        advanceTimer = setTimeout(goNext, ADVANCE_DELAY_MS);
        updateNavigation();
        return;
      }

      updateNavigation();
    }

    function goPrev() {
      clearAdvanceTimer();
      if (step <= 0) return;
      step -= 1;
      renderQuestion();
    }

    function goNext() {
      clearAdvanceTimer();
      if (answers[step] === undefined) return;
      if (step >= questions.length - 1) {
        renderResult();
        return;
      }
      step += 1;
      renderQuestion();
    }

    function renderResult() {
      lastResult = window.KindaiAuthorQuizEngine.scoreRound(questions, answers);
      const grade = window.KindaiAuthorQuizEngine.resolveGrade(lastResult.pct);

      els.resultTop.innerHTML =
        '<p class="result-label">近代文学クイズ</p>' +
        '<p class="result-name">' + esc(grade.name) + '</p>' +
        '<p class="result-score">' + lastResult.correct + ' / ' + lastResult.total + ' 問正解（' + lastResult.pct + '%）</p>' +
        '<p class="result-blurb">' + esc(grade.blurb) + '</p>';

      els.reviewList.innerHTML = lastResult.details.map((item) => {
        const q = item.question;
        const selectedText = q.choices[item.selected];
        const correctText = q.choices[q.correct];
        return '<li class="review-item ' + (item.ok ? 'is-ok' : 'is-ng') + '">' +
          '<p class="review-q">' + esc(q.text) + '</p>' +
          '<p class="review-meta">' +
            (item.ok
              ? '正解：' + esc(correctText)
              : 'あなたの回答：' + esc(selectedText) + '／正解：' + esc(correctText)) +
          '</p>' +
          '<p class="review-meta" style="margin-top:0.35rem">' + esc(q.explanation) + '</p>' +
        '</li>';
      }).join('');

      showView('result');
      els.viewResult.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function openShare() {
      if (!lastResult) return;
      const grade = window.KindaiAuthorQuizEngine.resolveGrade(lastResult.pct);
      const text = '近代文学クイズの結果：' + grade.name + '（' + lastResult.correct + '/' + lastResult.total + '問正解）\n' + SHARE_URL + ' @tadeku_net';
      const shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
      window.open(shareUrl, '_blank', 'noopener,noreferrer,width=550,height=420');
    }

    els.startBtn.addEventListener('click', startQuiz);
    els.prevBtn.addEventListener('click', goPrev);
    els.nextBtn.addEventListener('click', goNext);
    els.retryBtn.addEventListener('click', resetQuiz);
    els.shareBtn.addEventListener('click', openShare);
  </script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
