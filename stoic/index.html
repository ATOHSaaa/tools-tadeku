<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HN5C12BJ0W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HN5C12BJ0W');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stoic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --border: #000000;
      --surface: #ffffff;
      --invert: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    body.warning {
      background: var(--invert);
      color: #fff;
    }

    body.warning .header {
      border-color: #fff;
    }

    body.warning #editor {
      color: #fff;
      caret-color: #fff;
    }

    body.warning .btn {
      border-color: #fff;
      color: #fff;
      background: transparent;
    }

    body.warning .btn:hover {
      background: #fff;
      color: #000;
    }

    body.warning .notice {
      border-color: #fff;
      color: #fff;
    }

    @keyframes flash {
      0% { background-color: #fff; }
      100% { background-color: #fff; }
    }

    body.flash-animation {
      animation: flash 0.8s ease-out;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1.25rem;
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .btn {
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--invert);
      color: #fff;
    }

    .editor-wrap {
      flex: 1;
      min-height: 0;
    }

    #editor {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 1.05rem;
      line-height: 2;
      color: var(--ink);
      padding: 1.5rem 1.75rem;
      resize: none;
      outline: none;
      caret-color: var(--ink);
    }

    .notice {
      flex-shrink: 0;
      padding: 0.65rem 1.25rem;
      border-top: 2px solid var(--border);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
    }
  </style>
  <link rel="stylesheet" href="../shared/site-link.css">
</head>
<body id="body">
  <div class="layout">
    <header class="header">
      <div class="brand">stoic</div>
      <div class="stats">
        <span>文字数 <strong id="char-count">0</strong></span>
        <span>放置 <strong id="idle-seconds">0</strong>秒</span>
      </div>
      <button id="finish-btn" class="btn" type="button">脱稿（全消去）</button>
    </header>
    <div class="editor-wrap">
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
    <div class="notice">Backspace / Delete は無効です</div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const body = document.getElementById('body');
    const charCount = document.getElementById('char-count');
    const idleSecondsLabel = document.getElementById('idle-seconds');
    const finishBtn = document.getElementById('finish-btn');

    let lastInputTime = Date.now();

    const savedData = localStorage.getItem('forward-only-content');
    if (savedData) {
      editor.value = savedData;
      charCount.textContent = savedData.length;
    }

    editor.addEventListener('input', () => {
      const content = editor.value;
      localStorage.setItem('forward-only-content', content);
      charCount.textContent = content.length;
      lastInputTime = Date.now();
      body.classList.remove('warning');
    });

    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' || e.key === 'Delete') e.preventDefault();
    });

    setInterval(() => {
      const diff = Math.floor((Date.now() - lastInputTime) / 1000);
      idleSecondsLabel.textContent = diff;
      body.classList.toggle('warning', diff >= 30);
    }, 1000);

    finishBtn.addEventListener('click', () => {
      if (!window.confirm('【最終確認】\nこれまでの執筆内容をすべて消去し、新しく書き始めますか？\n（この操作は取り消せません）')) return;

      body.classList.remove('warning');
      body.classList.add('flash-animation');
      editor.value = '';
      localStorage.removeItem('forward-only-content');
      charCount.textContent = '0';
      lastInputTime = Date.now();
      setTimeout(() => body.classList.remove('flash-animation'), 800);
    });

    editor.addEventListener('paste', () => {
      setTimeout(() => {
        localStorage.setItem('forward-only-content', editor.value);
        charCount.textContent = editor.value.length;
        lastInputTime = Date.now();
      }, 0);
    });

    editor.focus();
  </script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
