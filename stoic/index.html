<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HN5C12BJ0W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HN5C12BJ0W');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="前に進むだけの執筆エディタ。小説やエッセイを書き切るための、すっきりしたWeb執筆空間。書くことに没頭できます。">
  <title>Stoic — 書き進める執筆エディタ | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --border: #000000;
      --surface: #ffffff;
      --invert: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    body.warning {
      background: var(--invert);
      color: #fff;
    }

    body.warning .header {
      border-color: #fff;
    }

    body.warning #editor {
      color: #fff;
      caret-color: #fff;
    }

    body.warning .notice {
      border-color: #fff;
      color: #fff;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      padding: 0.85rem 1.25rem;
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }

    body.warning .work-title {
      color: #fff;
    }

    body.warning .work-title::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .brand {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .editor-wrap {
      flex: 1;
      min-height: 0;
    }

    #editor {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 1.05rem;
      line-height: 2;
      color: var(--ink);
      padding: 1.5rem 1.75rem;
      resize: none;
      outline: none;
      caret-color: var(--ink);
    }

    .notice {
      flex-shrink: 0;
      padding: 0.65rem 1.25rem;
      border-top: 2px solid var(--border);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
    }
  </style>
  <link rel="stylesheet" href="../shared/site-link.css">
  <link rel="stylesheet" href="../shared/editor-title.css">
  <link rel="stylesheet" href="../shared/editor-mobile.css">
  <script src="../shared/editor-mobile-viewport.js"></script>
  <link rel="stylesheet" href="../shared/editor-save-indicator.css">
</head>
<body id="body">
  <div class="layout">
    <header class="header">
      <div class="header-row">
        <div class="brand"><a class="brand-home" href="https://tools.tadeku.net/">tadeku-tools</a><span class="brand-sep"> / </span>Stoic</div>
        <div class="stats">
          <span class="save-indicator" id="save-indicator"></span>
          <span>文字数 <strong id="char-count">0</strong></span>
          <span>放置 <strong id="idle-seconds">0</strong>秒</span>
        </div>
      </div>
      <input type="text" class="work-title" id="work-title" placeholder="Title" maxlength="60" spellcheck="false">
    </header>
    <div class="editor-wrap">
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
    <div class="notice">Backspace / Delete は無効</div>
  </div>

  <script src="../shared/editor-prefs.js"></script>
  <script src="../shared/editor-library.js"></script>
  <script>
    const editor = document.getElementById('editor');
    const workTitle = document.getElementById('work-title');
    const body = document.getElementById('body');
    const charCount = document.getElementById('char-count');
    const idleSecondsLabel = document.getElementById('idle-seconds');
    const saveIndicator = document.getElementById('save-indicator');

    let lastInputTime = Date.now();

    TadekuEditorPrefs.trackEditor('stoic');

    const library = TadekuEditorLibrary.createLibrarySession(
      'stoic',
      () => ({ title: workTitle.value, body: editor.value }),
      {
        onLoad: ({ title, body }) => {
          workTitle.value = title || '';
          editor.value = body || '';
          charCount.textContent = editor.value.length;
          lastInputTime = Date.now();
        },
        onTitleResolved: (uniqueTitle) => {
          if (document.activeElement !== workTitle) workTitle.value = uniqueTitle;
        },
        onSaved: () => {
          saveIndicator.textContent = '保存済み';
          saveIndicator.classList.add('saved');
        },
        onError: () => {
          saveIndicator.textContent = '保存エラー（他タブを閉じ再読込）';
          saveIndicator.classList.remove('saved');
        },
      },
    );

    function scheduleSave() {
      saveIndicator.textContent = '保存中…';
      saveIndicator.classList.remove('saved');
      library.scheduleSave();
    }

    workTitle.addEventListener('input', scheduleSave);

    editor.addEventListener('input', () => {
      charCount.textContent = editor.value.length;
      lastInputTime = Date.now();
      body.classList.remove('warning');
      scheduleSave();
    });

    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' || e.key === 'Delete') e.preventDefault();
    });

    editor.addEventListener('paste', () => {
      setTimeout(() => {
        charCount.textContent = editor.value.length;
        lastInputTime = Date.now();
        scheduleSave();
      }, 0);
    });

    setInterval(() => {
      const diff = Math.floor((Date.now() - lastInputTime) / 1000);
      idleSecondsLabel.textContent = diff;
      body.classList.toggle('warning', diff >= 30);
    }, 1000);

    (async () => {
      await library.initFromUrl();
      editor.focus();
      editor.setSelectionRange(0, 0);
    })();
  </script>
  <script>TadekuEditorMobileViewport.bind({ root: '.layout' });</script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
