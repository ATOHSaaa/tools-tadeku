<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shaper — 小説テキスト整形</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/site-link.css">
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #000000;
      --muted: #4a4a4a;
      --border: #000000;
      --surface: #ffffff;
      --accent: #e8913a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4.5rem;
    }

    .brand {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.35rem;
    }

    .tagline {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .editor-panel {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .editor-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }

    .btn:hover {
      border-color: var(--ink);
    }

    .btn:active {
      background: var(--bg);
    }

    .btn.copied {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-danger {
      background: #b23b3b;
      border-color: #b23b3b;
      color: #fff;
    }

    .btn-danger:hover {
      background: #962f2f;
      border-color: #962f2f;
      color: #fff;
    }

    .btn-danger:active {
      background: #7a2626;
    }

    .char-count {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .editor-meta {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn:disabled:hover {
      border-color: var(--border);
    }

    textarea {
      width: 100%;
      min-height: 320px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.75;
      padding: 0.85rem 1rem;
      resize: vertical;
      transition: border-color 0.12s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--ink);
    }

    .actions-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .action-group {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 1.25rem;
    }

    .group-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    @media (min-width: 720px) {
      .action-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .action-btn {
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      padding: 0.7rem 0.85rem;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }

    .action-btn:hover {
      border-color: var(--ink);
      background: var(--surface);
    }

    .action-btn:active {
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="layout">
    <h1 class="brand">Shaper</h1>
    <p class="tagline">小説原稿のテキストを、ボタンひとつで整形します。</p>

    <div class="editor-panel">
      <div class="editor-head">
        <div class="editor-actions">
          <button type="button" class="btn btn-danger" id="btn-clear">クリア</button>
          <button type="button" class="btn" id="btn-copy">コピー</button>
        </div>
        <div class="editor-meta">
          <button type="button" class="btn" id="btn-undo" disabled>操作を戻す</button>
          <span class="char-count" id="char-count" aria-live="polite">0文字</span>
        </div>
      </div>
      <textarea id="editor" placeholder="ここに文章を入力…" spellcheck="false"></textarea>
    </div>

    <div class="actions-panel" aria-label="整形操作">
      <section class="action-group" aria-label="除去">
        <h2 class="group-title">除去</h2>
        <div class="action-grid">
          <button type="button" class="action-btn" data-action="removeHalfSpaces">半角スペース</button>
          <button type="button" class="action-btn" data-action="removeFullSpaces">全角スペース</button>
          <button type="button" class="action-btn" data-action="removeTabs">Tab</button>
          <button type="button" class="action-btn" data-action="reduceBlankLines">空白行</button>
          <button type="button" class="action-btn" data-action="removeLineBreaks">改行</button>
          <button type="button" class="action-btn" data-action="unindentNonDialogue">一字下げ</button>
        </div>
      </section>

      <section class="action-group" aria-label="追加">
        <h2 class="group-title">追加</h2>
        <div class="action-grid">
          <button type="button" class="action-btn" data-action="indentNonDialogue">一字下げ</button>
          <button type="button" class="action-btn" data-action="addBlankLines">空白行</button>
        </div>
      </section>

      <section class="action-group" aria-label="変換">
        <h2 class="group-title">変換</h2>
        <div class="action-grid">
          <button type="button" class="action-btn" data-action="digitsToKanji">数字 → 漢数字</button>
        </div>
      </section>
    </div>
  </div>

  <script src="../shared/site-link.js"></script>
  <script>
    (function () {
      const KANJI_DIGITS = ['〇', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
      const FW_DIGITS = '０１２３４５６７８９';

      function digitToKanji(digit) {
        if (digit >= '0' && digit <= '9') return KANJI_DIGITS[digit.charCodeAt(0) - 48];
        const index = FW_DIGITS.indexOf(digit);
        return index >= 0 ? KANJI_DIGITS[index] : digit;
      }

      function indentLine(line) {
        if (!line.trim()) return line;
        if (line.startsWith('「') || line.startsWith('『')) return line;
        if (line.startsWith('　')) return line;
        return '　' + line;
      }

      function unindentLine(line) {
        if (!line.trim()) return line;
        if (line.startsWith('「') || line.startsWith('『')) return line;
        if (line.startsWith('　')) return line.slice(1);
        return line;
      }

      const transforms = {
        removeHalfSpaces: (text) => text.replace(/ /g, ''),
        removeFullSpaces: (text) => text.replace(/\u3000/g, ''),
        removeTabs: (text) => text.replace(/\t/g, ''),
        removeLineBreaks: (text) => text.replace(/\r\n|\r|\n/g, ''),
        reduceBlankLines: (text) => text.replace(/\n{2,}/g, (match) => '\n'.repeat(match.length - 1)),
        addBlankLines: (text) => text.split('\n').join('\n\n'),
        indentNonDialogue: (text) => text.split('\n').map(indentLine).join('\n'),
        unindentNonDialogue: (text) => text.split('\n').map(unindentLine).join('\n'),
        digitsToKanji: (text) => text.replace(/[0-9０-９]/g, digitToKanji)
      };

      const editorEl = document.getElementById('editor');
      const charCountEl = document.getElementById('char-count');
      const undoBtn = document.getElementById('btn-undo');
      const undoStack = [];
      const UNDO_LIMIT = 50;
      let restoring = false;

      function updateUndoButton() {
        undoBtn.disabled = undoStack.length === 0;
      }

      function recordUndo() {
        if (restoring) return;
        undoStack.push(editorEl.value);
        if (undoStack.length > UNDO_LIMIT) undoStack.shift();
        updateUndoButton();
      }

      function undoLastAction() {
        if (!undoStack.length) return;
        restoring = true;
        editorEl.value = undoStack.pop();
        restoring = false;
        updateCharCount();
        updateUndoButton();
        editorEl.focus();
      }

      function updateCharCount() {
        charCountEl.textContent = `${editorEl.value.length.toLocaleString('ja-JP')}文字`;
      }

      function setEditorText(text, { record = true } = {}) {
        if (record && text !== editorEl.value) recordUndo();
        editorEl.value = text;
        updateCharCount();
        editorEl.focus();
      }

      function applyTransform(name) {
        const fn = transforms[name];
        if (!fn) return;
        const next = fn(editorEl.value);
        if (next === editorEl.value) return;
        recordUndo();
        editorEl.value = next;
        updateCharCount();
        editorEl.focus();
      }

      document.querySelectorAll('[data-action]').forEach((btn) => {
        btn.addEventListener('click', () => {
          applyTransform(btn.dataset.action);
        });
      });

      editorEl.addEventListener('input', updateCharCount);

      document.getElementById('btn-undo').addEventListener('click', undoLastAction);

      document.getElementById('btn-clear').addEventListener('click', () => {
        if (!editorEl.value) return;
        if (!window.confirm('入力内容をすべて消去しますか？')) return;
        setEditorText('');
        editorEl.focus();
      });

      document.getElementById('btn-copy').addEventListener('click', async () => {
        if (!editorEl.value) return;
        const btn = document.getElementById('btn-copy');
        try {
          await navigator.clipboard.writeText(editorEl.value);
          btn.textContent = 'コピーしました';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'コピー';
            btn.classList.remove('copied');
          }, 1400);
        } catch {
          editorEl.select();
          document.execCommand('copy');
        }
      });

      updateCharCount();
    })();
  </script>
</body>
</html>
