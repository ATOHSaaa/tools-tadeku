<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>ReadType — 読書スタイル診断 | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/site-link.css">
  <style>
    :root {
      --bg: #f3efe6;
      --ink: #1a1a1a;
      --muted: #5c5a54;
      --border: #1a1a1a;
      --surface: #fff;
      --accent: #3d6b8c;
      --accent-soft: #dce8f0;
      --warm: #c47d3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.65;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 5rem;
    }

    .lead {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.8;
      margin-top: 0.5rem;
    }

    .panel {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: var(--surface);
      border: 2px solid var(--border);
    }

    .panel-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }

    .btn {
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
    }

    .btn:hover:not(:disabled) {
      background: var(--ink);
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--ink);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.88;
      background: var(--ink);
      color: #fff;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.55rem;
      line-height: 1.6;
    }

    .book-list-wrap {
      max-height: 16rem;
      overflow-y: auto;
      border: 1px solid #e8e4da;
      margin-bottom: 0.85rem;
    }

    .book-list-wrap[hidden] {
      display: none;
    }

    .book-list-wrap .book-list {
      padding: 0 0.65rem;
    }

    .book-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .book-item {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 0.65rem;
      align-items: center;
      padding: 0.55rem 0;
      border-bottom: 1px solid #e8e4da;
    }

    .book-item:last-child { border-bottom: none; }

    .book-cover {
      width: 40px;
      height: 60px;
      object-fit: cover;
      background: #e8e4da;
    }

    .book-title {
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .book-cover-link {
      display: block;
      line-height: 0;
    }

    .book-title a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.12em;
    }

    .book-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .book-sub a {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 0.12em;
    }

    .book-sub a:hover { color: var(--ink); }

    .remove-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.25rem;
    }

    .remove-btn:hover { color: var(--ink); }

    .empty-books {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0.5rem 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-top: 1.25rem;
    }

    .status {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.65rem;
      min-height: 1.2em;
    }

    .status.is-error { color: #a33; }

    .result {
      display: none;
      margin-top: 1.5rem;
    }

    .result.is-visible { display: block; }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      gap: 1.5rem 1.75rem;
      align-items: start;
    }

    .result-main,
    .result-side {
      min-width: 0;
    }

    .result-side {
      border-left: 1px dashed #ccc8be;
      padding-left: 1.5rem;
    }

    .result-meta {
      font-size: 0.78rem;
      color: var(--warm);
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 0.65rem;
    }

    .result-type {
      font-family: "Shippori Mincho", serif;
      font-size: clamp(1.5rem, 4.2vw, 2rem);
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 0.65rem;
    }

    .result-body {
      font-size: 0.9rem;
      line-height: 1.85;
      margin-bottom: 1rem;
    }

    .result-divider {
      border: none;
      border-top: 1px dashed #ccc8be;
      margin: 1.35rem 0;
    }

    .result-block-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.3rem 0.55rem;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .trait-list {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .trait-row {
      display: grid;
      grid-template-columns: 4.5rem 1fr 2rem;
      gap: 0.55rem;
      align-items: center;
    }

    .trait-label {
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .trait-track {
      height: 0.85rem;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .trait-fill {
      height: 100%;
      background: var(--accent);
    }

    .trait-num {
      font-size: 0.72rem;
      font-weight: 700;
      text-align: right;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .bias-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .bias-item {
      font-size: 0.84rem;
      line-height: 1.6;
      padding: 0.45rem 0;
      border-bottom: 1px solid #e8e4da;
    }

    .bias-item:last-child { border-bottom: none; }

    .bias-strong {
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 0.14em;
      text-decoration-thickness: 2px;
    }

    .bias-weak {
      color: var(--muted);
    }

    .result-advice {
      font-size: 0.86rem;
      line-height: 1.85;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }

    .genre-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .genre-chip {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.38rem 0.65rem;
      border: 2px solid var(--border);
      background: var(--surface);
    }

    .rec-section {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px dashed #ccc8be;
    }

    .rec-heading {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .rec-lead {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }

    .rec-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .rec-item {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 0.65rem;
      align-items: center;
      padding: 0.55rem 0;
      border-bottom: 1px solid #e8e4da;
    }

    .rec-item:last-child { border-bottom: none; }

    .rec-item .book-title a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.12em;
    }

    .rec-add-btn {
      border: 2px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.35rem 0.55rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .rec-add-btn:hover {
      background: var(--ink);
      color: #fff;
    }

    .rec-add-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .rec-empty {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .panel-lead {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.75;
      margin: -0.35rem 0 0.85rem;
    }

    .booklog-row {
      display: flex;
      gap: 0.5rem;
    }

    .booklog-input {
      flex: 1;
      border: 2px solid var(--border);
      background: var(--bg);
      font-family: inherit;
      font-size: 0.82rem;
      padding: 0.5rem 0.65rem;
      min-width: 0;
    }

    .booklog-input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    @media (max-width: 680px) {
      .result-grid { grid-template-columns: 1fr; }
      .result-side {
        border-left: none;
        padding-left: 0;
        border-top: 1px dashed #ccc8be;
        padding-top: 1.25rem;
      }
    }

    @media (max-width: 520px) {
      .trait-row { grid-template-columns: 3.8rem 1fr 1.8rem; }
      .booklog-row { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="page-title"><a class="brand-home" href="../">tadeku-tools</a><span class="brand-sep"> / </span>ReadType</h1>
      <p class="lead">ブクログの本棚を読み込んで、読書スタイルを診断します。3冊以上で結果が出て、おすすめの本も <a href="https://booklog.jp" target="_blank" rel="noopener noreferrer">ブクログ</a> から提案します。</p>
    </header>

    <section class="panel" aria-labelledby="import-title">
      <h2 class="panel-title" id="import-title">ブクログ本棚から読み込む</h2>
      <div class="booklog-row">
        <input type="text" class="booklog-input" id="booklog-id" placeholder="ブクログ ID（ユーザー名）" autocomplete="off">
        <button type="button" class="btn btn-primary" id="booklog-btn">本棚を読み込む</button>
      </div>
      <p class="hint">ユーザー名（<code>booklog.jp/users/◯◯</code> の ◯◯）か、プロフィール URL をそのまま貼れます。最大1万冊まで取り込みます。</p>
      <p class="status" id="status" aria-live="polite"></p>
    </section>

    <section class="panel" aria-labelledby="list-title">
      <h2 class="panel-title" id="list-title">登録した本 <span id="book-count">(0)</span></h2>
      <div class="book-list-wrap" id="book-list-wrap" hidden>
        <ul class="book-list" id="book-list"></ul>
      </div>
      <p class="empty-books" id="empty-books">まだ本がありません。</p>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="diagnose-btn" disabled>診断する</button>
        <button type="button" class="btn" id="clear-btn">すべて消す</button>
      </div>
    </section>

    <section class="panel result" id="result" aria-live="polite">
      <h2 class="panel-title">診断結果</h2>
      <div class="result-grid">
        <div class="result-main" id="result-main"></div>
        <div class="result-side" id="result-side"></div>
      </div>
      <div class="rec-section" id="rec-section" hidden>
        <h3 class="rec-heading">おすすめの本</h3>
        <p class="rec-lead" id="rec-lead"></p>
        <ul class="rec-list" id="rec-list"></ul>
      </div>
    </section>
  </div>

  <script src="../shared/readtype-rec-shelves.js"></script>
  <script src="../shared/readtype-rec-books.js"></script>
  <script>
    const STORAGE_KEY = 'readtype-books-v1';
    const REC_SHELF_DEPTH_KEY = 'readtype-rec-shelf-depth-v1';
    const MIN_BOOKS = 3;
    const BOOKLOG_IMPORT_MAX = 10000;
    const REC_SHELF_BATCH_SIZE = 10;
    const AMAZON_ASSOCIATE_TAG = 'read-type-22';

    const FICTION_RE = /小説|物語|文庫|コミック|漫画|マンガ|ノベル|新潮|講談社|角川|集英社|幻冬舎|双葉|光文社|文春|筑摩|河出|ポプラ|ハヤカワ|創元|宝島|小学館|少年|少女|文芸|連作|短編集/i;

    const IMAGINATION_RE = /ミステリー|推理|殺人|探偵|ＳＦ|SF|ファンタジー|幻想|ホラー|怪談|魔法|ドラゴン|宇宙|異世界|刑事|連続殺人|怪奇|妖怪|ゴシック|サスペンス|ハードボイルド|メグレ|ポアロ|マープル/i;
    const CLASSIC_RE = /夏目漱石|芥川龍之介|川端康成|三島由紀夫|司馬遼太郎|谷崎潤一郎|太宰治|荷風|森鴎外|志賀直哉|中原中也|萩原朔太郎|与謝野|泉鏡花|樋口一葉|古典|明治|大正|昭和|全集|岩波文庫|世界文学|古典文学|ギリシア|ローマ|莎士比亜|シェイクスピア|トルストイ|ドストエフスキー|カフカ|プルースト/i;
    const CONTEMPORARY_RE = /202[0-9]|201[6-9]|新書|KADOKAWA|文春e-book|ebook|電子版|最新|話題|令和/i;
    const DEPTH_RE = /全集|全\d+巻|上下|上中下|完結|大長編|三部作|四部作|物語|長編/i;

    const TYPES = [
      {
        id: 'deep',
        name: '深掘り型',
        desc: '厚めの本や、同じ作家・近いテーマに留まる傾向があります。一度入った世界を根まで味わいたい読み手です。',
        genreRec: '長編小説、作家もの、評伝、シリーズ物など、じっくり腰を据えて読める本が向いています。',
        readRec: '同じ作者を続けて読む、シリーズを最初から追う、一冊を何度も開き直す読み方がしっくりきやすいタイプです。',
        chips: ['社会派小説', '文芸長編', '評伝', 'シリーズ完走'],
        tags: ['じっくり', '没入', '反復'],
      },
      {
        id: 'explorer',
        name: '冒険家型',
        desc: '著者もジャンルも年代も幅広く、次の一冊がいつも違う驚きになりがちです。読書棚の散歩が好きなタイプです。',
        genreRec: 'アンソロジー、異色作、新刊ピックアップ、いま話題の本など、次の一冊の予想がつかない選び方が向いています。',
        readRec: '気になったら即レジ、短い間隔でジャンルを切り替える、ブクログや書店の棚から偶然を拾う読み方が合います。',
        chips: ['アンソロジー', '新刊', '異ジャンル', '書店散歩'],
        tags: ['多様性', '発見', '好奇心'],
      },
      {
        id: 'classic',
        name: '古典派',
        desc: '出版から年月の経った作品に惹かれやすい傾向です。時代を超えて残る物語や思想に親しみを感じる読み手です。',
        genreRec: '文庫の定番、世界文学、近代日本文学、古典の新訳など、蓄積のある作品が向いています。',
        readRec: '文庫の背表紙から選ぶ、作家の代表作から入る、読み返し前提で本棚に並べる読み方が合います。',
        chips: ['世界文学', '文庫定番', '近代文学', '古典新訳'],
        tags: ['古典', '蓄積', '文庫'],
      },
      {
        id: 'contemporary',
        name: '旬を読む派',
        desc: '比較的新しい作品が多く、いま話題の空気や現代的な関心ごとを追いかける読み方です。',
        genreRec: '直近の文庫新刊、話題作、エッセイ、いまの社会を映す小説が向いています。',
        readRec: 'SNSやメディアで見かけた本をすぐ買う、発売月で選ぶ、感想を読みながら追体験する読み方が合います。',
        chips: ['話題作', '新刊', 'エッセイ', '現代小説'],
        tags: ['新刊', 'いま', '共感'],
      },
      {
        id: 'story',
        name: '物語派',
        desc: 'フィクションの世界に重心があります。人物の運命や物語の起伏から、読書の主な喜びを得ているようです。',
        genreRec: '純文学、ミステリ、恋愛小説、ヒューマンドラマなど、物語の温度を感じられる本が向いています。',
        readRec: '登場人物の感情に寄り添う、結末まで一気に進める、余韻を味わって次の一冊を探す読み方が合います。',
        chips: ['純文学', 'ヒューマン', '恋愛', '連作短編'],
        tags: ['小説', '物語', '感情'],
      },
      {
        id: 'mind',
        name: '知的派',
        desc: '歴史・科学・思想など、知的好奇心をくすぐる書籍が目立ちます。読書を「調べる」「考える」時間として楽しんでいます。',
        genreRec: 'ノンフィクション、新書、思想書、科学書、社会評論など、読後に考えが続く本が向いています。',
        readRec: 'メモを取りながら読む、関連書を横に広げる、著者の別著書まで追う読み方が合います。',
        chips: ['新書', 'ノンフィクション', '思想', '科学'],
        tags: ['ノンフィクション', '考察', '学び'],
      },
      {
        id: 'dream',
        name: '幻想派',
        desc: 'ミステリ、SF、ファンタジーなど、現実の外側へ足を伸ばす作品に親しみがあります。',
        genreRec: 'ミステリ、SF、ファンタジー、ホラーなど、ルールや世界観の違いを楽しめる本が向いています。',
        readRec: '設定を味わう、シリーズの法則を追う、日常から離れた世界に長く滞在する読み方が合います。',
        chips: ['ミステリ', 'SF', 'ファンタジー', 'サスペンス'],
        tags: ['ミステリ', 'SF', '幻想'],
      },
    ];

    const TRAITS = [
      { key: 'immersion', label: '没入' },
      { key: 'story', label: '物語' },
      { key: 'knowledge', label: '知性' },
      { key: 'discovery', label: '発見' },
      { key: 'heritage', label: '古典' },
      { key: 'fantasy', label: '幻想' },
    ];

    const BIAS_DEFS = [
      { key: 'mode', left: 'フィクション', right: 'ノンフィクション' },
      { key: 'era', left: '古典・定番', right: 'いまの作品' },
      { key: 'focus', left: '深掘り', right: 'いろいろ試す' },
      { key: 'reality', left: '現実味', right: '非日常' },
    ];

    const BOOKLOG_REC_SHELVES = window.READTYPE_REC_SHELVES || [];
    const CURATED_REC_BOOKS = window.READTYPE_REC_BOOKS || [];
    const shelfDataCache = new Map();

    const RECOMMEND_BY_TYPE = {
      deep: { lead: 'じっくり浸れる、厚みのある一冊' },
      explorer: { lead: '次の驚きにつながりそうな一冊' },
      classic: { lead: '時を経ても色あせない一冊' },
      contemporary: { lead: 'いまの空気に近い一冊' },
      story: { lead: '物語の温度を感じる一冊' },
      mind: { lead: '読後も考えが続く一冊' },
      dream: { lead: '現実の外側へ連れて行く一冊' },
    };

    let books = loadBooks();

    const els = {
      status: document.getElementById('status'),
      bookList: document.getElementById('book-list'),
      bookListWrap: document.getElementById('book-list-wrap'),
      bookCount: document.getElementById('book-count'),
      emptyBooks: document.getElementById('empty-books'),
      diagnoseBtn: document.getElementById('diagnose-btn'),
      clearBtn: document.getElementById('clear-btn'),
      result: document.getElementById('result'),
      resultMain: document.getElementById('result-main'),
      resultSide: document.getElementById('result-side'),
      booklogId: document.getElementById('booklog-id'),
      booklogBtn: document.getElementById('booklog-btn'),
      recSection: document.getElementById('rec-section'),
      recLead: document.getElementById('rec-lead'),
      recList: document.getElementById('rec-list'),
    };

    function loadBooks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return [];
        return parsed.map((book) => {
          const authors = book.authors || [];
          const title = book.title || '（タイトル不明）';
          return {
            ...book,
            id: book.id || book.olKey || ('manual:' + normalizeTitle(title)),
            subjects: (book.subjects && book.subjects.length)
              ? book.subjects
              : inferSubjects(title, authors),
            source: book.source || ((book.id || book.olKey || '').startsWith('booklog:') ? 'booklog' : 'manual'),
            amazonUrl: amazonUrlFromBook({ ...book, amazonUrl: book.amazonUrl }),
          };
        });
      } catch {
        return [];
      }
    }

    function saveBooks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
    }

    function clamp(n, min = 0, max = 100) {
      return Math.max(min, Math.min(max, n));
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function bookKey(book) {
      return book.id || book.olKey || book.title;
    }

    function parseYearFromText(text) {
      const m = String(text || '').match(/(\d{4})年/);
      if (!m) return null;
      const year = Number(m[1]);
      return year >= 1800 && year <= 2035 ? year : null;
    }

    function bookText(book) {
      return [
        book.title,
        (book.authors || []).join(' '),
        (book.subjects || []).join(' '),
      ].join(' ');
    }

    function inferSubjects(title, authors) {
      const text = title + ' ' + (authors || []).join(' ');
      const subjects = [];
      if (FICTION_RE.test(text)) subjects.push('物語');
      if (KNOWLEDGE_RE.test(text)) subjects.push('知性');
      if (IMAGINATION_RE.test(text)) subjects.push('幻想');
      if (CLASSIC_RE.test(text)) subjects.push('古典');
      if (CONTEMPORARY_RE.test(text)) subjects.push('現代');
      if (DEPTH_RE.test(text)) subjects.push('長編');
      return subjects;
    }

    function withAmazonAssociateTag(url) {
      if (!url || !AMAZON_ASSOCIATE_TAG) return url || '';
      try {
        const u = new URL(url);
        if (!/amazon\.(?:co\.jp|com)/i.test(u.hostname)) return url;
        u.searchParams.set('tag', AMAZON_ASSOCIATE_TAG);
        return u.toString();
      } catch {
        return url;
      }
    }

    function amazonUrlFromAsin(asin) {
      if (!asin) return '';
      return withAmazonAssociateTag('https://www.amazon.co.jp/dp/' + asin);
    }

    function asinFromBooklogUrl(url) {
      const m = String(url || '').match(/\/archives\/(?:\d+\/)?([^/?#]+)/);
      if (!m) return null;
      const id = m[1];
      if (!/^(?:\d{9}[\dX]|\d{13}|[A-Z0-9]{10})$/i.test(id)) return null;
      return id;
    }

    function amazonUrlFromBooklogUrl(url) {
      return amazonUrlFromAsin(asinFromBooklogUrl(url));
    }

    function amazonUrlFromBook(book) {
      if (book.amazonUrl) return withAmazonAssociateTag(book.amazonUrl);
      const fromUrl = amazonUrlFromBooklogUrl(book.booklogUrl || '');
      if (fromUrl) return fromUrl;
      const id = String(book.id || book.olKey || '');
      if (id.startsWith('booklog:')) {
        const asin = id.slice('booklog:'.length);
        if (/^(?:\d{9}[\dX]|\d{13}|[A-Z0-9]{10})$/i.test(asin)) {
          return amazonUrlFromAsin(asin);
        }
      }
      return '';
    }

    function bookTitleHtml(book) {
      const title = esc(book.title || '（タイトル不明）');
      const amazonUrl = amazonUrlFromBook(book);
      if (!amazonUrl) return title;
      return '<a href="' + esc(amazonUrl) + '" target="_blank" rel="noopener noreferrer">' + title + '</a>';
    }

    function bookCoverHtml(book, className) {
      const cover = book.coverUrl || '';
      const amazonUrl = amazonUrlFromBook(book);
      const inner = cover
        ? '<img class="' + className + '" src="' + esc(cover) + '" alt="">'
        : '<div class="' + className + '" aria-hidden="true"></div>';
      if (!amazonUrl) return inner;
      return '<a href="' + esc(amazonUrl) + '" target="_blank" rel="noopener noreferrer" class="book-cover-link">' + inner + '</a>';
    }

    function bookSubHtml(book, extraParts) {
      const parts = (extraParts || []).filter(Boolean).map((part) => esc(part));
      if (book.booklogUrl) {
        parts.push('<a href="' + esc(book.booklogUrl) + '" target="_blank" rel="noopener noreferrer">ブクログ</a>');
      }
      return parts.length ? parts.join(' · ') : '';
    }

    function booklogItemToBook(item) {
      const booklogUrl = item.url || '';
      const authors = item.author
        ? item.author.split(/[、,／/]/).map((s) => s.trim()).filter(Boolean)
        : [];
      const title = item.title || '（タイトル不明）';
      return {
        id: booklogItemKey(item),
        title,
        authors,
        year: parseYearFromText(title),
        subjects: inferSubjects(title, authors),
        coverUrl: item.image || null,
        booklogUrl,
        amazonUrl: amazonUrlFromBooklogUrl(booklogUrl),
        source: 'booklog',
      };
    }

    function normalizeTitle(title) {
      return String(title || '')
        .toLowerCase()
        .replace(/[\s\u3000]+/g, '')
        .replace(/[^\p{L}\p{N}]/gu, '');
    }

    function isOwnedBook(candidate) {
      const norm = normalizeTitle(candidate.title);
      return books.some((b) => {
        const candidateId = candidate.id || candidate.olKey;
        const bookId = b.id || b.olKey;
        if (candidateId && bookId && candidateId === bookId) return true;
        return normalizeTitle(b.title) === norm;
      });
    }

    function shuffleInPlace(list) {
      for (let i = list.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }

    function curatedBookToRec(entry) {
      return {
        id: 'rec:' + entry.asin,
        title: entry.title,
        authors: entry.authors || [],
        year: entry.year || null,
        subjects: entry.subjects || [],
        types: entry.types || [],
        coverUrl: 'https://images-fe.ssl-images-amazon.com/images/P/' + entry.asin + '.09._SX100_.jpg',
        amazonUrl: amazonUrlFromAsin(entry.asin),
        sourceLabel: entry.source || 'タイプ別おすすめ',
      };
    }

    function buildRecProfile(result) {
      const authorCounts = {};
      books.forEach((book) => {
        (book.authors || []).forEach((author) => {
          authorCounts[author] = (authorCounts[author] || 0) + 1;
        });
      });
      const topAuthors = Object.entries(authorCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10)
        .map((entry) => entry[0]);
      return {
        typeId: result.type.id,
        motivations: result.motivations,
        axes: result.axes,
        subjectSet: new Set(books.flatMap((b) => b.subjects || [])),
        authorCounts,
        topAuthors,
      };
    }

    function scoreRecCandidate(candidate, profile) {
      let score = 0;
      const typeId = profile.typeId;
      const types = candidate.types || [];
      if (types.includes(typeId)) score += 45;
      else if (bookMatchesRecType(candidate, typeId)) score += 18;
      else score -= 12;

      (candidate.subjects || []).forEach((subject) => {
        if (profile.subjectSet.has(subject)) score += 10;
      });

      const m = profile.motivations;
      const text = bookText(candidate);
      if (m.heritage >= 58 && (CLASSIC_RE.test(text) || (candidate.subjects || []).includes('古典'))) score += 16;
      if (m.fantasy >= 58 && (IMAGINATION_RE.test(text) || (candidate.subjects || []).includes('幻想'))) score += 16;
      if (m.knowledge >= 58 && (KNOWLEDGE_RE.test(text) || (candidate.subjects || []).includes('知性'))) score += 16;
      if (m.immersion >= 58 && (DEPTH_RE.test(text) || (candidate.subjects || []).includes('長編'))) score += 14;
      if (m.discovery >= 58 && profile.axes.breadth >= 55) score += 10;
      if (m.story >= 58 && (candidate.subjects || []).includes('物語')) score += 10;
      if (profile.axes.contemporary >= 60 && (CONTEMPORARY_RE.test(text) || (candidate.subjects || []).includes('現代'))) score += 12;
      if (profile.axes.classic >= 60 && (CLASSIC_RE.test(text) || (candidate.subjects || []).includes('古典'))) score += 12;

      (candidate.authors || []).forEach((author) => {
        if (typeId === 'deep' || typeId === 'classic') {
          if ((profile.authorCounts[author] || 0) >= 2) score += 20;
          else if (profile.topAuthors.includes(author)) score += 10;
        } else if (typeId === 'explorer') {
          if (profile.authorCounts[author]) score -= 10;
        }
      });

      score += Math.random() * 4;
      return score;
    }

    function pickScoredCandidates(candidates, profile, seen, limit, usedAuthors) {
      const ranked = candidates
        .filter((candidate) => !isOwnedBook(candidate))
        .map((candidate) => ({ candidate, score: scoreRecCandidate(candidate, profile) }))
        .sort((a, b) => b.score - a.score);

      const picks = [];
      for (const { candidate } of ranked) {
        if (picks.length >= limit) break;
        const key = bookKey(candidate);
        if (seen.has(key)) continue;
        const mainAuthor = (candidate.authors || [])[0] || '';
        if (mainAuthor && usedAuthors.has(mainAuthor) && picks.length >= 2) continue;
        seen.add(key);
        if (mainAuthor) usedAuthors.add(mainAuthor);
        picks.push(candidate);
      }
      return picks;
    }

    function pickCuratedRecommendations(result, seen, usedAuthors, limit) {
      const profile = buildRecProfile(result);
      const pool = CURATED_REC_BOOKS.map(curatedBookToRec);
      return pickScoredCandidates(pool, profile, seen, limit, usedAuthors);
    }

    function booklogItemToRecommend(item, meta) {
      const shelfName = meta.shelfName || 'ブクログ';
      return {
        ...booklogItemToBook(item),
        sourceLabel: shelfName,
      };
    }

    function bookMatchesRecType(book, typeId) {
      const text = bookText(book);
      const subjects = book.subjects || [];
      switch (typeId) {
        case 'deep':
          return DEPTH_RE.test(text) || subjects.includes('長編') || subjects.includes('古典');
        case 'classic':
          return CLASSIC_RE.test(text) || subjects.includes('古典');
        case 'contemporary':
          return CONTEMPORARY_RE.test(text) || subjects.includes('現代') || !CLASSIC_RE.test(text);
        case 'story':
          return FICTION_RE.test(text) || subjects.includes('物語');
        case 'mind':
          return KNOWLEDGE_RE.test(text) || subjects.includes('知性');
        case 'dream':
          return IMAGINATION_RE.test(text) || subjects.includes('幻想');
        case 'explorer':
        default:
          return true;
      }
    }

    function getRecShelfDepth() {
      try {
        const n = Number(localStorage.getItem(REC_SHELF_DEPTH_KEY));
        return Number.isFinite(n) && n > 0 ? n : 0;
      } catch {
        return 0;
      }
    }

    function setRecShelfDepth(n) {
      localStorage.setItem(REC_SHELF_DEPTH_KEY, String(n));
    }

    function advanceRecShelfDepth() {
      const max = BOOKLOG_REC_SHELVES.length;
      const next = Math.min(getRecShelfDepth() + REC_SHELF_BATCH_SIZE, max);
      setRecShelfDepth(next);
      return next;
    }

    function resetRecShelfDepth() {
      localStorage.removeItem(REC_SHELF_DEPTH_KEY);
      shelfDataCache.clear();
      updateDiagnoseBtnLabel();
    }

    function updateDiagnoseBtnLabel() {
      if (books.length < MIN_BOOKS) return;
      els.diagnoseBtn.textContent = getRecShelfDepth() > 0 ? '深堀り診断' : '診断する';
    }

    function shelvesForType(typeId, depth) {
      const active = BOOKLOG_REC_SHELVES.slice(0, depth || BOOKLOG_REC_SHELVES.length);
      const matched = active.filter((shelf) => shelf.types.includes(typeId));
      const pool = matched.length >= 4 ? matched : active;
      return shuffleInPlace([...pool]);
    }

    async function fetchRecShelfBatch(shelves) {
      if (!shelves.length) return;
      await Promise.all(shelves.map(async (shelf) => {
        try {
          const data = await fetchBooklogShelfBooks(shelf.id);
          shelfDataCache.set(shelf.id, data);
        } catch {
          shelfDataCache.set(shelf.id, { books: [], tana: null });
        }
      }));
    }

    async function fetchBooklogShelfBooks(userId) {
      const attempts = [
        { status: '3', rank: '5' },
        { status: '3' },
        {},
      ];
      for (const options of attempts) {
        const data = await fetchBooklogJsonp(userId, 30, options);
        if (data.books && data.books.length) return data;
      }
      return { books: [], tana: null };
    }

    function pickFromShelf(data, typeId, seen, profile, usedAuthors, strict) {
      const shelfName = (data.tana && data.tana.name) ? data.tana.name : 'ブクログ';
      const items = (data.books || [])
        .filter(isBooklogItemReadable)
        .map((item) => booklogItemToRecommend(item, { shelfName }));
      const filtered = strict
        ? items.filter((item) => bookMatchesRecType(item, typeId))
        : items;
      const pool = filtered.length ? filtered : items;
      return pickScoredCandidates(pool, profile, seen, 1, usedAuthors)[0] || null;
    }

    async function fetchRecommendations(result) {
      const depth = advanceRecShelfDepth();
      const prevDepth = Math.max(0, depth - REC_SHELF_BATCH_SIZE);
      const newShelves = BOOKLOG_REC_SHELVES.slice(prevDepth, depth);
      await fetchRecShelfBatch(newShelves);
      updateDiagnoseBtnLabel();

      const typeId = result.type.id;
      const profile = buildRecProfile(result);
      const seen = new Set();
      const usedAuthors = new Set();
      const picks = pickCuratedRecommendations(result, seen, usedAuthors, 4);

      const shelves = shelvesForType(typeId, depth);
      const loaded = shelves.map((shelf) => ({
        shelf,
        data: shelfDataCache.get(shelf.id) || { books: [], tana: null },
      }));

      const usedShelfIds = new Set();

      for (const entry of shuffleInPlace([...loaded])) {
        if (picks.length >= 6) break;
        const rec = pickFromShelf(entry.data, typeId, seen, profile, usedAuthors, true);
        if (rec) {
          picks.push(rec);
          usedShelfIds.add(entry.shelf.id);
        }
      }

      if (picks.length < 6) {
        const unused = loaded.filter((entry) => !usedShelfIds.has(entry.shelf.id));
        for (const entry of shuffleInPlace(unused)) {
          if (picks.length >= 6) break;
          const rec = pickFromShelf(entry.data, typeId, seen, profile, usedAuthors, false);
          if (rec) {
            picks.push(rec);
            usedShelfIds.add(entry.shelf.id);
          }
        }
      }

      if (picks.length < 6) {
        const curatedMore = pickCuratedRecommendations(result, seen, usedAuthors, 6 - picks.length);
        picks.push(...curatedMore);
      }

      if (picks.length < 6) {
        for (const entry of shuffleInPlace([...loaded])) {
          if (picks.length >= 6) break;
          const rec = pickFromShelf(entry.data, typeId, seen, profile, usedAuthors, false);
          if (rec) {
            picks.push(rec);
            usedShelfIds.add(entry.shelf.id);
          }
        }
      }

      picks.sourceCount = usedShelfIds.size || new Set(picks.map((rec) => rec.sourceLabel)).size;
      picks.curatedCount = picks.filter((rec) => String(rec.id || '').startsWith('rec:')).length;
      picks.shelfDepth = depth;
      picks.shelfMax = BOOKLOG_REC_SHELVES.length;
      return picks;
    }

    function renderRecommendations(recs, result) {
      const plan = RECOMMEND_BY_TYPE[result.type.id] || RECOMMEND_BY_TYPE.explorer;
      const shelfDepth = recs.shelfDepth || getRecShelfDepth();
      const shelfMax = recs.shelfMax || BOOKLOG_REC_SHELVES.length;
      const curatedCount = recs.curatedCount || 0;
      const booklogCount = recs.sourceCount || 0;
      let sourceNote = '';
      if (curatedCount && booklogCount) {
        sourceNote = '（診断タイプ・本棚に合わせて選書 + ブクログ本棚 ' + shelfDepth + '/' + shelfMax + '人より）';
      } else if (curatedCount) {
        sourceNote = '（診断タイプ・本棚に合わせて選書）';
      } else if (booklogCount) {
        sourceNote = '（ブクログ Best User Award 受賞者など ' + shelfDepth + '/' + shelfMax + '人の本棚より）';
      } else {
        sourceNote = '（ブクログの読書家の本棚より）';
      }
      const sourceNoteFinal = sourceNote;
      els.recLead.textContent = plan.lead + sourceNoteFinal;
      els.recSection.hidden = false;
      if (!recs.length) {
        els.recList.innerHTML = '<li class="rec-empty">おすすめを取得できませんでした。しばらくしてから再度診断してください。</li>';
        return;
      }
      els.recList.innerHTML = recs.map((rec, index) => {
        const metaParts = [
          (rec.authors || []).join(', '),
          rec.sourceLabel || '',
        ];
        const sub = bookSubHtml(rec, metaParts);
        return '<li class="rec-item" data-rec-index="' + index + '">' +
          bookCoverHtml(rec, 'book-cover') +
          '<div><div class="book-title">' + bookTitleHtml(rec) + '</div>' +
          (sub ? '<div class="book-sub">' + sub + '</div>' : '') +
          '</div>' +
          '<button type="button" class="rec-add-btn" data-rec-index="' + index + '">追加</button>' +
          '</li>';
      }).join('');
      els.recList._recs = recs;
    }

    function setStatus(msg, isError) {
      els.status.textContent = msg || '';
      els.status.classList.toggle('is-error', !!isError);
    }

    function renderBooks() {
      els.bookCount.textContent = '(' + books.length + ')';
      const hasBooks = books.length > 0;
      els.emptyBooks.style.display = hasBooks ? 'none' : 'block';
      els.bookListWrap.hidden = !hasBooks;
      els.bookList.innerHTML = books.map((book, index) => {
        const metaParts = [
          (book.authors || []).join(', '),
          book.year ? book.year + '年' : '',
          (book.subjects || []).slice(0, 2).join(' · '),
        ];
        const sub = bookSubHtml(book, metaParts);
        return '<li class="book-item">' +
          bookCoverHtml(book, 'book-cover') +
          '<div><div class="book-title">' + bookTitleHtml(book) + '</div>' +
          (sub ? '<div class="book-sub">' + sub + '</div>' : '') +
          '</div>' +
          '<button type="button" class="remove-btn" data-index="' + index + '" aria-label="削除">×</button>' +
          '</li>';
      }).join('');
      els.diagnoseBtn.disabled = books.length < MIN_BOOKS;
      updateDiagnoseBtnLabel();
      saveBooks();
    }

    function addBook(book) {
      if (books.some((b) => bookKey(b) === bookKey(book))) {
        setStatus('すでに登録されています。');
        return false;
      }
      books.push(book);
      renderBooks();
      setStatus('「' + book.title + '」を追加しました。');
      return true;
    }

    function pickType(axes) {
      const scores = [
        { type: TYPES[0], score: axes.depth * 0.55 + (100 - axes.breadth) * 0.45 },
        { type: TYPES[1], score: axes.breadth * 1.0 + axes.fiction * 0.1 },
        { type: TYPES[2], score: axes.classic * 0.85 + (100 - axes.contemporary) * 0.25 },
        { type: TYPES[3], score: axes.contemporary * 0.9 },
        { type: TYPES[4], score: axes.fiction * 0.75 + (100 - axes.knowledge) * 0.35 },
        { type: TYPES[5], score: axes.knowledge * 1.0 + axes.depth * 0.2 },
        { type: TYPES[6], score: axes.imagination * 1.05 + axes.fiction * 0.15 },
      ];
      scores.sort((a, b) => b.score - a.score);
      return scores[0].type;
    }

    function normalizeBooklogId(raw) {
      const trimmed = String(raw || '').trim();
      const fromUrl = trimmed.match(/booklog\.jp\/users\/([^/?#]+)/i);
      if (fromUrl) return fromUrl[1];
      return trimmed.replace(/^@/, '');
    }

    function fetchBooklogJsonp(userId, count, options) {
      const opts = options || {};
      return new Promise((resolve, reject) => {
        const cb = '__readtypeBooklog' + Date.now() + Math.random().toString(36).slice(2, 8);
        const script = document.createElement('script');
        let settled = false;
        const finish = (err, data) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          delete window[cb];
          script.remove();
          if (err) reject(err);
          else resolve(data);
        };
        window[cb] = (data) => finish(null, data);
        script.onerror = () => finish(new Error('load failed'));
        const timer = setTimeout(() => finish(new Error('timeout')), opts.timeout || 15000);
        let url = 'https://api.booklog.jp/v2/json/'
          + encodeURIComponent(userId)
          + '?count=' + count;
        if (opts.category) url += '&category=' + encodeURIComponent(opts.category);
        if (opts.status) url += '&status=' + encodeURIComponent(opts.status);
        if (opts.rank) url += '&rank=' + encodeURIComponent(opts.rank);
        url += '&callback=' + cb;
        script.src = url;
        document.head.appendChild(script);
      });
    }

    function isBooklogItemReadable(item) {
      const cat = String(item.catalog || 'book').toLowerCase();
      const skip = new Set(['dvd', 'cd', 'music', 'game', 'bluray', 'blu-ray']);
      return !skip.has(cat);
    }

    function booklogItemKey(item) {
      const url = String(item.url || '');
      const m = url.match(/\/archives\/(?:\d+\/)?([^/?#]+)/);
      if (m) return 'booklog:' + m[1];
      return 'booklog:' + (item.id || item.asin || item.title);
    }

    async function importBooklog() {
      const id = normalizeBooklogId(els.booklogId.value);
      if (!id) {
        setStatus('ブクログ ID を入力してください。', true);
        return;
      }
      els.booklogBtn.disabled = true;
      setStatus('本棚を読み込み中…');
      try {
        const data = await fetchBooklogJsonp(id, BOOKLOG_IMPORT_MAX, { timeout: 60000 });
        if (!data || !data.books || !data.books.length) {
          setStatus('本棚が空か、IDが見つかりませんでした。', true);
          return;
        }
        let added = 0;
        let skipped = 0;
        let duplicates = 0;
        for (const item of data.books) {
          if (!isBooklogItemReadable(item)) {
            skipped += 1;
            continue;
          }
          const book = booklogItemToBook(item);
          if (books.some((b) => bookKey(b) === bookKey(book))) {
            duplicates += 1;
            continue;
          }
          books.push(book);
          added += 1;
        }
        renderBooks();
        if (added) {
          setStatus(added + '冊を本棚から追加しました。');
        } else if (duplicates && duplicates === data.books.length - skipped) {
          setStatus('本棚の本はすでにすべて登録済みです。');
        } else if (skipped && skipped === data.books.length) {
          setStatus('本棚に取り込める書籍がありませんでした（DVD等のみ）。', true);
        } else {
          setStatus('新しく追加できる本がありませんでした。', true);
        }
      } catch {
        setStatus('本棚を取得できませんでした。IDを確認してください。', true);
      } finally {
        els.booklogBtn.disabled = false;
      }
    }

    function countPatternHits(list, re) {
      return list.filter((book) => re.test(bookText(book))).length;
    }

    function analyzeBooks(list) {
      const n = list.length;
      const authors = new Set(list.flatMap((b) => b.authors || []).filter(Boolean));
      const authorCounts = {};
      list.forEach((book) => {
        (book.authors || []).forEach((author) => {
          authorCounts[author] = (authorCounts[author] || 0) + 1;
        });
      });
      const repeatAuthors = Object.values(authorCounts).filter((count) => count >= 2).length;
      const subjectSet = new Set(list.flatMap((b) => b.subjects || []));
      const years = list.map((b) => b.year).filter((y) => y > 0);
      const avgYear = years.length ? years.reduce((a, b) => a + b, 0) / years.length : null;
      const avgTitleLen = list.reduce((sum, book) => sum + String(book.title || '').length, 0) / n;
      const authorDiversity = authors.size / n;

      const fictionHits = countPatternHits(list, FICTION_RE);
      const knowledgeHits = countPatternHits(list, KNOWLEDGE_RE);
      const imaginationHits = countPatternHits(list, IMAGINATION_RE);
      const classicHits = countPatternHits(list, CLASSIC_RE);
      const contemporaryHits = countPatternHits(list, CONTEMPORARY_RE);
      const depthHits = countPatternHits(list, DEPTH_RE);

      const axes = {
        depth: clamp((depthHits / n) * 55 + (repeatAuthors / Math.max(authors.size, 1)) * 45 + (avgTitleLen / 28) * 15),
        breadth: clamp(authorDiversity * 72 + (subjectSet.size / Math.max(n, 1)) * 28),
        classic: clamp((classicHits / n) * 85 + (avgYear ? ((2020 - avgYear) / 90) * 40 : 0)),
        contemporary: clamp((contemporaryHits / n) * 85 + (avgYear ? ((avgYear - 1985) / 40) * 40 : 0)),
        fiction: clamp((fictionHits / n) * 100),
        knowledge: clamp((knowledgeHits / n) * 100),
        imagination: clamp((imaginationHits / n) * 100),
      };

      const motivations = {
        immersion: axes.depth,
        story: axes.fiction,
        knowledge: axes.knowledge,
        discovery: axes.breadth,
        heritage: axes.classic,
        fantasy: axes.imagination,
      };

      const spectrums = {
        character: clamp(50 + axes.fiction * 0.35 - axes.knowledge * 0.15),
        mood: clamp(50 + axes.classic * 0.2 - axes.contemporary * 0.2),
        pace: clamp(50 + axes.contemporary * 0.3 - axes.depth * 0.25),
        mode: clamp(axes.fiction * 0.85 + (100 - axes.knowledge) * 0.1),
        era: clamp(axes.contemporary * 0.75 + (100 - axes.classic) * 0.1),
        length: clamp(axes.depth * 0.8 + axes.fiction * 0.1),
        focus: clamp(axes.depth * 0.45 + (100 - axes.breadth) * 0.35),
        reality: clamp(50 + axes.knowledge * 0.25 - axes.imagination * 0.3),
      };

      const type = pickType(axes);
      const tags = new Set(type.tags);
      if (axes.depth >= 60) tags.add('長編');
      if (axes.breadth >= 60) tags.add('ジャンル横断');
      if (axes.classic >= 55) tags.add('古典寄り');
      if (axes.contemporary >= 55) tags.add('現代寄り');
      if (fictionHits / n >= 0.7) tags.add('フィクション多め');
      if (knowledgeHits / n >= 0.35) tags.add('ノンフィクション多め');

      const summaryParts = [
        books.length + '冊から診断',
        '著者 ' + authors.size + '人',
      ];
      if (avgYear) summaryParts.push('平均 ' + Math.round(avgYear) + '年');
      if (subjectSet.size) summaryParts.push(subjectSet.size + '種類の傾向');

      return {
        axes,
        motivations,
        spectrums,
        type,
        tags: [...tags],
        summary: summaryParts.join(' · '),
        authorCount: authors.size,
      };
    }

    function biasItems(spectrums) {
      return BIAS_DEFS.map((def) => {
        const value = spectrums[def.key];
        const lean = value >= 50 ? def.right : def.left;
        return { ...def, value, lean, strength: Math.abs(value - 50) };
      })
        .filter((item) => item.strength >= 8)
        .sort((a, b) => b.strength - a.strength);
    }

    function renderTraitBars(motivations) {
      return TRAITS.map((trait) => {
        const score = Math.round(motivations[trait.key] || 0);
        return '<div class="trait-row">' +
          '<span class="trait-label">' + esc(trait.label) + '</span>' +
          '<div class="trait-track"><div class="trait-fill" style="width:' + score + '%"></div></div>' +
          '<span class="trait-num">' + score + '</span>' +
          '</div>';
      }).join('');
    }

    function renderBiasList(biases) {
      if (!biases.length) {
        return '<li class="bias-item"><span class="bias-weak">どちらかとは言いにくい、バランス寄りの本棚です。</span></li>';
      }
      return biases.map((bias) => {
        const other = bias.lean === bias.left ? bias.right : bias.left;
        const degree = bias.strength >= 22 ? 'かなり' : 'やや';
        return '<li class="bias-item">' +
          '<span class="bias-strong">' + esc(bias.lean) + '</span>' +
          '寄り（' + degree + '） · ' +
          '<span class="bias-weak">' + esc(other) + '</span>' +
          '</li>';
      }).join('');
    }

    function renderResult(result) {
      const type = result.type;
      const tags = [...new Set([...type.tags, ...result.tags])].slice(0, 8);
      const biases = biasItems(result.spectrums);

      els.resultMain.innerHTML =
        '<p class="result-meta">' + esc(result.summary) + '</p>' +
        '<h3 class="result-type">' + esc(type.name) + '</h3>' +
        '<p class="result-body">' + esc(type.desc) + '</p>' +
        '<div class="tags">' + tags.map((t) => '<span class="tag">' + esc(t) + '</span>').join('') + '</div>' +
        '<hr class="result-divider">' +
        '<h4 class="result-block-title">この先の一冊</h4>' +
        '<p class="result-advice">' + esc(type.genreRec) + ' ' + esc(type.readRec) + '</p>' +
        '<div class="genre-chips">' + type.chips.map((chip) => '<span class="genre-chip">' + esc(chip) + '</span>').join('') + '</div>';

      els.resultSide.innerHTML =
        '<h4 class="result-block-title">本棚から見えた傾向</h4>' +
        '<div class="trait-list">' + renderTraitBars(result.motivations) + '</div>' +
        '<hr class="result-divider">' +
        '<h4 class="result-block-title">どちら寄りか</h4>' +
        '<ul class="bias-list">' + renderBiasList(biases) + '</ul>';
    }

    function runDiagnosis() {
      if (books.length < MIN_BOOKS) return;
      const result = analyzeBooks(books);
      renderResult(result);
      els.result.classList.add('is-visible');
      els.recSection.hidden = false;
      const targetDepth = Math.min(getRecShelfDepth() + REC_SHELF_BATCH_SIZE, BOOKLOG_REC_SHELVES.length);
      els.recLead.textContent = 'おすすめを探しています…（' + targetDepth + '人の本棚から）';
      els.recList.innerHTML = '<li class="rec-empty">ブクログの本棚から探しています…</li>';
      els.result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      fetchRecommendations(result).then((recs) => {
        renderRecommendations(recs, result);
      });
    }

    els.booklogBtn.addEventListener('click', importBooklog);
    els.diagnoseBtn.addEventListener('click', runDiagnosis);
    els.clearBtn.addEventListener('click', () => {
      if (!books.length || !confirm('登録した本をすべて消しますか？')) return;
      books = [];
      resetRecShelfDepth();
      renderBooks();
      els.result.classList.remove('is-visible');
      els.recSection.hidden = true;
      setStatus('');
    });
    els.recList.addEventListener('click', (e) => {
      const btn = e.target.closest('.rec-add-btn');
      if (!btn || !els.recList._recs) return;
      const rec = els.recList._recs[Number(btn.dataset.recIndex)];
      if (!rec) return;
      addBook({
        id: rec.id || rec.olKey,
        title: rec.title,
        authors: rec.authors,
        year: rec.year,
        subjects: rec.subjects,
        coverUrl: rec.coverUrl || null,
        booklogUrl: rec.booklogUrl || '',
        amazonUrl: amazonUrlFromBook(rec),
        source: 'booklog',
      });
      btn.disabled = true;
      btn.textContent = '追加済';
    });
    els.bookList.addEventListener('click', (e) => {
      const btn = e.target.closest('.remove-btn');
      if (!btn) return;
      books.splice(Number(btn.dataset.index), 1);
      renderBooks();
    });

    renderBooks();
    updateDiagnoseBtnLabel();
  </script>
</body>
</html>
