<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="執筆中に語彙がひらめく小説執筆エディタ。WordFall・PedantryFall連携で用例付きの語を見ながら、表現豊かな原稿を書けます。">
  <title>Cue — 語彙と一緒に書くエディタ | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/editor-title.css">
  <link rel="stylesheet" href="../shared/editor-save-indicator.css">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --border: #000000;
      --surface: #ffffff;
      --invert: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 240px;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    .header {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      padding: 0.85rem 1.25rem;
      border-bottom: 2px solid var(--border);
    }

    .brand {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .editor-wrap {
      min-height: 0;
      border-right: 2px solid var(--border);
    }

    #editor {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 1.05rem;
      line-height: 2;
      color: var(--ink);
      padding: 1.5rem 1.75rem;
      resize: none;
      outline: none;
    }

    .word-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      background: var(--surface);
    }

    .inject-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }

    .inject-row {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      padding: 1rem;
      text-align: center;
      gap: 0.5rem;
      min-width: 0;
    }

    .inject-row + .inject-row {
      border-top: 2px solid var(--border);
    }

    .inject-label {
      width: 100%;
      max-width: 100%;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      overflow-wrap: anywhere;
      word-break: break-all;
      line-break: anywhere;
    }

    .inject-word {
      width: 100%;
      max-width: 100%;
      font-size: clamp(0.85rem, 2.5vw, 1.25rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1.4;
      overflow-wrap: anywhere;
      word-break: break-all;
      line-break: anywhere;
    }

    .inject-empty {
      width: 100%;
      max-width: 100%;
      font-size: 0.78rem;
      font-weight: 500;
      color: #888;
      overflow-wrap: anywhere;
      word-break: break-all;
    }

    .word-footer {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 2px solid var(--border);
    }

    .word-timer {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 100%;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.5rem 0.65rem;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      white-space: normal;
      overflow-wrap: break-word;
      word-break: break-word;
      transition: background 0.15s, color 0.15s;
    }

    .btn:hover {
      background: var(--invert);
      color: #fff;
    }

    .btn-sm {
      font-size: 0.65rem;
      padding: 0.35rem 0.5rem;
    }

    @media (max-width: 640px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
      }

      .editor-wrap {
        border-right: none;
        border-bottom: 2px solid var(--border);
      }

      .inject-rows {
        flex-direction: row;
        min-width: 0;
      }

      .inject-row {
        flex: 1 1 0;
        min-width: 0;
        padding: 0.75rem 0.5rem;
      }

      .inject-row + .inject-row {
        border-top: none;
        border-left: 2px solid var(--border);
      }

      .inject-word {
        font-size: clamp(0.75rem, 3.5vw, 0.95rem);
      }
    }
  </style>
  <link rel="stylesheet" href="../shared/site-link.css">
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="header-row">
        <div class="brand"><a class="brand-home" href="https://tools.tadeku.net/">tadeku-tools</a><span class="brand-sep"> / </span>Cue</div>
        <div class="stats">
          <span class="save-indicator" id="save-indicator"></span>
          <span>文字数 <strong id="char-count">0</strong></span>
        </div>
      </div>
      <input type="text" class="work-title" id="work-title" placeholder="Title" maxlength="60" spellcheck="false">
    </header>

    <div class="editor-wrap">
      <textarea id="editor" spellcheck="false"></textarea>
    </div>

    <aside class="word-panel" aria-live="polite">
      <div class="inject-rows">
        <section class="inject-row">
          <div class="inject-label">from WordFall</div>
          <p class="inject-word" id="wordfall-text">—</p>
          <a class="btn btn-sm" id="wordfall-link" href="#" target="_blank" rel="noopener noreferrer">用例を見る</a>
        </section>
        <section class="inject-row">
          <div class="inject-label">from PedantryFall</div>
          <p class="inject-word" id="pedantry-text">—</p>
          <a class="btn btn-sm" id="pedantry-link" href="#" target="_blank" rel="noopener noreferrer">Wikipediaを見る</a>
        </section>
      </div>
      <div class="word-footer">
        <p class="word-timer" id="word-timer">—</p>
        <button class="btn" id="word-next" type="button">次の語</button>
      </div>
    </aside>
  </div>

  <script src="../shared/wordfall-words.js"></script>
  <script>
    const wordfallWords = window.WORDFALL_CONFIG?.words || [];
    const wordfallGas = window.WORDFALL_CONFIG?.gasUrl;
  </script>
  <script src="../shared/pedantryfall-words.js"></script>
  <script src="../shared/editor-prefs.js"></script>
  <script src="../shared/editor-library.js"></script>
  <script>
    const pedantryWords = window.WORDFALL_CONFIG?.words || [];
    const pedantryGas = window.WORDFALL_CONFIG?.gasUrl;

    const INTERVAL_SEC = 20;

    const state = {
      wordfallList: wordfallWords,
      pedantryList: pedantryWords,
      wordfallCurrent: null,
      pedantryCurrent: null,
      secondsLeft: INTERVAL_SEC,
    };

    const els = {
      editor: document.getElementById('editor'),
      workTitle: document.getElementById('work-title'),
      charCount: document.getElementById('char-count'),
      saveIndicator: document.getElementById('save-indicator'),
      wordfallText: document.getElementById('wordfall-text'),
      wordfallLink: document.getElementById('wordfall-link'),
      pedantryText: document.getElementById('pedantry-text'),
      pedantryLink: document.getElementById('pedantry-link'),
      wordNext: document.getElementById('word-next'),
      wordTimer: document.getElementById('word-timer'),
    };

    TadekuEditorPrefs.trackEditor('cue');

    const library = TadekuEditorLibrary.createLibrarySession(
      'cue',
      () => ({ title: els.workTitle.value, body: els.editor.value }),
      {
        onLoad: ({ title, body }) => {
          els.workTitle.value = title || '';
          els.editor.value = body || '';
          els.charCount.textContent = els.editor.value.length;
        },
        onTitleResolved: (uniqueTitle) => {
          if (document.activeElement !== els.workTitle) els.workTitle.value = uniqueTitle;
        },
        onSaved: () => {
          els.saveIndicator.textContent = '保存済み';
          els.saveIndicator.classList.add('saved');
        },
        onError: () => {
          els.saveIndicator.textContent = '保存エラー（他タブを閉じ再読込）';
          els.saveIndicator.classList.remove('saved');
        },
      },
    );

    function pickFrom(list, avoid) {
      if (!list.length) return null;
      if (list.length === 1) return list[0];
      let next;
      do {
        next = list[Math.floor(Math.random() * list.length)];
      } while (next === avoid && list.length > 1);
      return next;
    }

    function showWord(row, word) {
      const textEl = row === 'wordfall' ? els.wordfallText : els.pedantryText;
      const linkEl = row === 'wordfall' ? els.wordfallLink : els.pedantryLink;
      if (!word) {
        textEl.textContent = '—';
        textEl.className = 'inject-empty';
        linkEl.style.display = 'none';
        return;
      }
      textEl.textContent = word.word;
      textEl.className = 'inject-word';
      linkEl.href = word.url;
      linkEl.style.display = '';
    }

    function injectWords() {
      if (state.wordfallList.length) {
        state.wordfallCurrent = pickFrom(state.wordfallList, state.wordfallCurrent);
        showWord('wordfall', state.wordfallCurrent);
      } else {
        showWord('wordfall', null);
      }

      if (state.pedantryList.length) {
        state.pedantryCurrent = pickFrom(state.pedantryList, state.pedantryCurrent);
        showWord('pedantry', state.pedantryCurrent);
      } else {
        showWord('pedantry', null);
      }

      state.secondsLeft = INTERVAL_SEC;
      updateTimer();
    }

    function updateTimer() {
      const sec = String(state.secondsLeft).padStart(2, '0');
      els.wordTimer.textContent = `次の語の表示まで ${sec}秒`;
    }

    function scheduleSave() {
      els.saveIndicator.textContent = '保存中…';
      els.saveIndicator.classList.remove('saved');
      library.scheduleSave();
    }

    function refreshWords() {
      if (wordfallGas && navigator.onLine) {
        fetch(wordfallGas)
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(fresh => { if (fresh?.length) state.wordfallList = fresh; })
          .catch(() => {});
      }
      if (pedantryGas && navigator.onLine) {
        fetch(pedantryGas)
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(fresh => { if (fresh?.length) state.pedantryList = fresh; })
          .catch(() => {});
      }
    }

    setInterval(() => {
      state.secondsLeft -= 1;
      if (state.secondsLeft <= 0) injectWords();
      updateTimer();
    }, 1000);

    els.editor.addEventListener('input', () => {
      els.charCount.textContent = els.editor.value.length;
      scheduleSave();
    });

    els.workTitle.addEventListener('input', scheduleSave);

    els.wordNext.addEventListener('click', injectWords);

    refreshWords();
    injectWords();
    (async () => {
      await library.initFromUrl();
      els.editor.focus();
      els.editor.setSelectionRange(0, 0);
    })();
  </script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
