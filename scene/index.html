<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HN5C12BJ0W"></script>
  <script>

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene — シーンエディタ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/export.css">
  <link rel="stylesheet" href="../shared/site-link.css">
  <link rel="stylesheet" href="../shared/editor-title.css">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --muted: #000000;
      --border: #000000;
      --surface: #ffffff;
      --invert: #000000;
      --max-chars: 300;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    /* Header */
    .header {
      margin-bottom: 1.5rem;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .brand {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .header-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
      padding-top: 0.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--invert);
      border-color: var(--invert);
      color: #fff;
    }

    .btn-danger:hover {
      background: var(--invert);
      border-color: var(--invert);
      color: #fff;
    }

    .stats {
      display: flex;
      gap: 1.25rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ink);
    }

    .stats strong {
      color: var(--ink);
      font-weight: 700;
    }

    /* Scene list */
    .scene-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .scene-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0;
      background: var(--surface);
      border: 2px solid var(--border);
      transition: border-color 0.15s, opacity 0.15s;
    }

    .scene-card:focus-within {
      border-color: var(--ink);
    }

    .scene-card.dragging {
      opacity: 0.85;
      border-color: var(--ink);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
      position: relative;
      z-index: 5;
    }

    .scene-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.75rem 0.5rem;
      border-right: 2px solid var(--border);
      background: var(--invert);
      color: #fff;
    }

    .drag-handle {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 0.35rem 0.5rem;
      cursor: grab;
      border: none;
      background: transparent;
      color: #fff;
      transition: opacity 0.15s;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .drag-handle:hover { opacity: 0.65; }
    .drag-handle:active { cursor: grabbing; }

    .drag-handle span {
      display: block;
      width: 14px;
      height: 2px;
      background: currentColor;
    }

    .scene-num {
      font-size: 0.7rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
      min-width: 1.5rem;
      text-align: center;
    }

    .move-btns {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .move-btn {
      width: 24px;
      height: 20px;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      font-size: 0.65rem;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, color 0.15s;
    }

    .move-btn:hover:not(:disabled) {
      background: #fff;
      color: #000;
    }

    .move-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .scene-body {
      padding: 0.85rem 1rem;
      min-width: 0;
    }

    .scene-title {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--ink);
      padding: 0 0 0.4rem;
      margin-bottom: 0.5rem;
      outline: none;
    }

    .scene-title::placeholder { color: #888; font-weight: 500; }
    .scene-title:focus { border-color: var(--ink); }

    .scene-text {
      width: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--ink);
      resize: none;
      outline: none;
      min-height: 4.5rem;
      overflow: hidden;
    }

    .scene-text::placeholder { color: #888; }

    .scene-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.5rem;
    }

    .char-count {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.03em;
    }

    .char-count.warn {
      background: var(--ink);
      color: #fff;
      padding: 0.1rem 0.4rem;
    }

    .char-count.over {
      background: var(--ink);
      color: #fff;
      padding: 0.1rem 0.4rem;
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    .scene-actions {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0.5rem;
      border-left: 2px solid var(--border);
      background: var(--surface);
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .delete-btn:hover {
      background: var(--invert);
      color: #fff;
    }

    /* Add button */
    .add-scene {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      margin-top: 0.75rem;
      padding: 1rem;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .add-scene:hover {
      background: var(--invert);
      color: #fff;
    }

    .add-scene .plus {
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1;
    }

    /* Empty state */
    .empty-hint {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.8;
    }

    .empty-hint strong {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    /* Footer */
    .footer {
      margin-top: 2.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-align: center;
    }

    .save-indicator {
      font-size: 0.72rem;
      color: var(--ink);
      font-weight: 700;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .save-indicator.saved { opacity: 1; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.85);
    }

    .modal-overlay[hidden] {
      display: none;
    }

    .modal {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 1.5rem;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      margin-bottom: 0.75rem;
    }

    .modal-message {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.75;
      margin-bottom: 1.25rem;
    }

    .modal-message strong {
      font-weight: 900;
    }

    .format-options {
      border: none;
      margin-bottom: 1rem;
    }

    .format-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .format-group {
      display: flex;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .scene-list.is-dragging {
      -webkit-user-select: none;
      user-select: none;
    }

    @media (max-width: 520px) {
      .header-top { flex-direction: column; }
      .header-actions { padding-top: 0; }
      .scene-side { padding: 0.5rem 0.35rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div style="flex:1; min-width:0">
          <div class="brand">Scene — シーンエディタ</div>
          <input type="text" class="work-title" id="work-title" placeholder="Title" maxlength="60" spellcheck="false">
        </div>
        <div class="header-actions">
          <button class="btn" id="export-btn" title="テキストを書き出す">書き出し</button>
          <button class="btn btn-danger" id="clear-btn" title="全シーンを消去">全消去</button>
        </div>
      </div>
      <div class="stats">
        <span>シーン <strong id="scene-count">0</strong></span>
        <span>合計 <strong id="total-chars">0</strong> 字</span>
        <span class="save-indicator" id="save-indicator">保存済み</span>
      </div>
    </header>

    <div class="scene-list" id="scene-list"></div>

    <button class="add-scene" id="add-scene" type="button">
      <span class="plus">+</span>
      シーンを追加
    </button>

    <footer class="footer">1シーン300字以内 · ドラッグで並べ替え · 自動保存</footer>
  </div>

  <div class="modal-overlay" id="export-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="export-modal-title">
      <p class="modal-title" id="export-modal-title">書き出し</p>
      <p class="modal-message" id="export-modal-message"></p>
      <fieldset class="format-options">
        <legend class="format-label">形式を選ぶと書き出します</legend>
        <div class="format-group">
          <button class="format-btn" type="button" data-format="txt">.txt</button>
          <button class="format-btn" type="button" data-format="md">.md</button>
          <button class="format-btn" type="button" data-format="jpg">.jpg</button>
        </div>
      </fieldset>
      <div class="modal-actions">
        <button class="btn" id="export-modal-cancel" type="button">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="../shared/export.js"></script>
  <script src="../shared/editor-prefs.js"></script>
  <script>
    const STORAGE_KEY = 'scene-scenes-v1';
    const LEGACY_STORAGE_KEY = 'beat-scenes-v1';
    const MAX_CHARS = 300;

    let data = { title: '', scenes: [] };
    let saveTimer = null;

    function sceneCharCount() {
      return data.scenes.reduce((s, sc) => s + sc.body.length, 0);
    }

    function syncMeta() {
      TadekuEditorPrefs.syncDraftMeta('scene', {
        charCount: sceneCharCount(),
        title: (data.title || '').trim(),
      });
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function load() {
      try {
        let raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) raw = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (raw) data = JSON.parse(raw);
      } catch (_) {}
      if (!Array.isArray(data.scenes)) data.scenes = [];
      if (!data.scenes.length) data.scenes = [makeScene()];
    }

    function makeScene() {
      return { id: uid(), title: '', body: '' };
    }

    function scheduleSave() {
      const el = document.getElementById('save-indicator');
      el.textContent = '保存中…';
      el.classList.remove('saved');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        syncMeta();
        el.textContent = '保存済み';
        el.classList.add('saved');
      }, 400);
    }

    function updateStats() {
      document.getElementById('scene-count').textContent = data.scenes.length;
      const total = data.scenes.reduce((s, sc) => s + sc.body.length, 0);
      document.getElementById('total-chars').textContent = total;
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function charClass(len) {
      if (len > MAX_CHARS) return 'over';
      if (len > MAX_CHARS * 0.85) return 'warn';
      return '';
    }

    function startPointerDrag(e, card, handle, list) {
      if (e.button != null && e.button > 0) return;
      // タッチ環境ではポインターのキャプチャが DOM 移動で外れたり、
      // OS にスクロールとして横取りされて pointermove が止まることがある。
      // タッチイベントは開始要素で発火し続けるため、タッチ時は touch* を使う。
      const isTouch = e.pointerType === 'touch';
      e.preventDefault();
      card.classList.add('dragging');
      list.classList.add('is-dragging');

      const pointY = ev => {
        if (ev.touches) return ev.touches[0] ? ev.touches[0].clientY : null;
        if (ev.changedTouches) return ev.changedTouches[0] ? ev.changedTouches[0].clientY : null;
        return ev.clientY;
      };

      const onMove = ev => {
        if (ev.cancelable) ev.preventDefault();
        const y = pointY(ev);
        if (y == null) return;
        const others = [...list.querySelectorAll('.scene-card:not(.dragging)')];
        let next = null;
        for (const other of others) {
          const rect = other.getBoundingClientRect();
          if (y < rect.top + rect.height / 2) { next = other; break; }
        }
        if (next) {
          if (card.nextElementSibling !== next) list.insertBefore(card, next);
        } else if (list.lastElementChild !== card) {
          list.appendChild(card);
        }
      };

      const finish = () => {
        if (isTouch) {
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', finish);
          document.removeEventListener('touchcancel', finish);
        } else {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', finish);
          document.removeEventListener('pointercancel', finish);
        }
        card.classList.remove('dragging');
        list.classList.remove('is-dragging');

        const order = [...list.querySelectorAll('.scene-card')].map(c => c.dataset.id);
        const changed = data.scenes.some((s, i) => s.id !== order[i]);
        if (changed) {
          data.scenes.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
          render();
          scheduleSave();
        }
      };

      if (isTouch) {
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', finish);
        document.addEventListener('touchcancel', finish);
      } else {
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', finish);
        document.addEventListener('pointercancel', finish);
      }
    }

    function render() {
      const list = document.getElementById('scene-list');
      list.innerHTML = '';

      data.scenes.forEach((scene, index) => {
        const card = document.createElement('article');
        card.className = 'scene-card';
        card.dataset.id = scene.id;

        const len = scene.body.length;

        card.innerHTML = `
          <div class="scene-side">
            <button class="drag-handle" type="button" aria-label="ドラッグして並べ替え" tabindex="-1">
              <span></span><span></span><span></span>
            </button>
            <div class="scene-num">${index + 1}</div>
            <div class="move-btns">
              <button class="move-btn" data-action="up" aria-label="上へ" ${index === 0 ? 'disabled' : ''}>▲</button>
              <button class="move-btn" data-action="down" aria-label="下へ" ${index === data.scenes.length - 1 ? 'disabled' : ''}>▼</button>
            </div>
          </div>
          <div class="scene-body">
            <input class="scene-title" type="text" placeholder="シーン名（任意）" maxlength="40" value="${esc(scene.title)}" spellcheck="false">
            <textarea class="scene-text" placeholder="このシーンで起きることを、${MAX_CHARS}字以内で。" maxlength="${MAX_CHARS + 20}">${esc(scene.body)}</textarea>
            <div class="scene-footer">
              <span class="char-count ${charClass(len)}">${len} / ${MAX_CHARS}</span>
            </div>
          </div>
          <div class="scene-actions">
            <button class="delete-btn" type="button" aria-label="シーンを削除" title="削除">×</button>
          </div>
        `;

        const titleInput = card.querySelector('.scene-title');
        const textarea = card.querySelector('.scene-text');
        const counter = card.querySelector('.char-count');

        titleInput.addEventListener('input', () => {
          scene.title = titleInput.value;
          scheduleSave();
        });

        textarea.addEventListener('input', () => {
          scene.body = textarea.value;
          const l = scene.body.length;
          counter.textContent = `${l} / ${MAX_CHARS}`;
          counter.className = 'char-count ' + charClass(l);
          autoResize(textarea);
          updateStats();
          scheduleSave();
        });

        autoResize(textarea);

        card.querySelector('.delete-btn').addEventListener('click', () => {
          if (data.scenes.length <= 1) {
            scene.title = '';
            scene.body = '';
            render();
            scheduleSave();
            return;
          }
          if (!confirm(`シーン ${index + 1} を削除しますか？`)) return;
          data.scenes.splice(index, 1);
          render();
          scheduleSave();
          updateStats();
        });

        card.querySelectorAll('.move-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const dir = btn.dataset.action;
            const target = dir === 'up' ? index - 1 : index + 1;
            if (target < 0 || target >= data.scenes.length) return;
            [data.scenes[index], data.scenes[target]] = [data.scenes[target], data.scenes[index]];
            render();
            scheduleSave();
          });
        });

        const handle = card.querySelector('.drag-handle');
        handle.removeAttribute('tabindex');
        handle.addEventListener('pointerdown', e => startPointerDrag(e, card, handle, list));

        list.appendChild(card);
      });

      updateStats();
    }

    function esc(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function exportSourceText() {
      const lines = [];
      if (data.title.trim()) lines.push(data.title.trim());
      for (const sc of data.scenes) {
        if (sc.body.trim()) lines.push(sc.body.trim());
      }
      return lines.join('\n');
    }

    function showExportModal() {
      const count = data.scenes.length;
      return ExportUtils.showExportFormatModal(`${count} シーン`, null);
    }

    function buildExportContent(format) {
      const title = ExportUtils.exportBasenameFromText(exportSourceText());
      if (format === 'md') {
        const lines = [`# ${title}`, ''];
        data.scenes.forEach((sc, i) => {
          const label = sc.title.trim() || `シーン ${i + 1}`;
          lines.push(`## ${label}`);
          lines.push('');
          lines.push(sc.body.trim() || '（未記入）');
          lines.push('');
        });
        return lines.join('\n');
      }
      const lines = [title, ''];
      data.scenes.forEach((sc, i) => {
        const label = sc.title.trim() || `シーン ${i + 1}`;
        lines.push(`【${label}】`);
        lines.push(sc.body.trim() || '（未記入）');
        lines.push('');
      });
      return lines.join('\n');
    }

    const EXPORT_W = 720;
    const EXPORT_SCALE = 2;
    const EXPORT_FONT = '"Noto Sans JP", "Hiragino Sans", sans-serif';

    function wrapCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      let line = '';
      for (const ch of text) {
        if (ch === '\n') {
          lines.push(line);
          line = '';
          continue;
        }
        const next = line + ch;
        if (line && ctx.measureText(next).width > maxWidth) {
          lines.push(line);
          line = ch;
        } else {
          line = next;
        }
      }
      if (line) lines.push(line);
      return lines.length ? lines : [''];
    }

    function sceneCardLayout(ctx, cardW, scene, index) {
      const sideW = 44;
      const bodyPadX = 16;
      const bodyPadY = 14;
      const bodyW = cardW - sideW;
      const textW = bodyW - bodyPadX * 2;
      const titleText = scene.title.trim();
      const bodyText = scene.body.trim() || '（未記入）';
      const bodyEmpty = !scene.body.trim();

      ctx.font = `700 13px ${EXPORT_FONT}`;
      const titleH = titleText ? 22 : 0;

      ctx.font = `400 15px ${EXPORT_FONT}`;
      const bodyLines = wrapCanvasLines(ctx, bodyText, textW);
      const bodyLineH = 26;
      const bodyH = bodyLines.length * bodyLineH;

      ctx.font = `700 11px ${EXPORT_FONT}`;
      const footerH = 20;

      const innerH = bodyPadY + titleH + (titleText ? 8 : 0) + bodyH + 8 + footerH + bodyPadY;
      const cardH = Math.max(88, innerH);

      return {
        sideW, bodyPadX, bodyPadY, bodyW, textW, titleText, bodyText, bodyEmpty,
        bodyLines, bodyLineH, titleH, cardH, charCount: scene.body.length,
      };
    }

    function drawSceneCard(ctx, x, y, cardW, scene, index) {
      const L = sceneCardLayout(ctx, cardW, scene, index);

      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, cardW, L.cardH);

      ctx.fillStyle = '#000';
      ctx.fillRect(x, y, L.sideW, L.cardH);

      ctx.fillStyle = '#fff';
      ctx.font = `900 13px ${EXPORT_FONT}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(index + 1), x + L.sideW / 2, y + L.cardH / 2);

      const bodyX = x + L.sideW + L.bodyPadX;
      let cy = y + L.bodyPadY;

      if (L.titleText) {
        ctx.fillStyle = '#000';
        ctx.font = `700 13px ${EXPORT_FONT}`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(L.titleText, bodyX, cy);
        cy += L.titleH + 8;
      }

      ctx.font = `400 15px ${EXPORT_FONT}`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      for (const line of L.bodyLines) {
        ctx.fillStyle = L.bodyEmpty ? '#888' : '#000';
        ctx.fillText(line, bodyX, cy);
        cy += L.bodyLineH;
      }

      ctx.fillStyle = '#000';
      ctx.font = `700 11px ${EXPORT_FONT}`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`${L.charCount} / ${MAX_CHARS}`, bodyX, y + L.cardH - L.bodyPadY - 14);
    }

    function measureExportHeight(ctx, cardW) {
      const pad = 24;
      const headerH = 72;
      const statsH = 28;
      const gap = 10;
      let h = pad + headerH + statsH + gap;
      data.scenes.forEach((sc, i) => {
        h += sceneCardLayout(ctx, cardW, sc, i).cardH + gap;
      });
      h += pad + 20;
      return h;
    }

    async function renderExportCanvas() {
      await document.fonts.ready;

      const cardW = EXPORT_W - 48;
      const probe = document.createElement('canvas');
      const probeCtx = probe.getContext('2d');
      const totalH = measureExportHeight(probeCtx, cardW);

      const canvas = document.createElement('canvas');
      canvas.width = EXPORT_W * EXPORT_SCALE;
      canvas.height = totalH * EXPORT_SCALE;
      const ctx = canvas.getContext('2d');
      ctx.scale(EXPORT_SCALE, EXPORT_SCALE);

      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, EXPORT_W, totalH);

      const pad = 24;
      const workTitle = data.title.trim() || ExportUtils.exportBasenameFromText(exportSourceText());
      const totalChars = data.scenes.reduce((s, sc) => s + sc.body.length, 0);

      ctx.fillStyle = '#000';
      ctx.font = `900 28px ${EXPORT_FONT}`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(workTitle, pad, pad);

      ctx.font = `700 12px ${EXPORT_FONT}`;
      ctx.fillText(`${data.scenes.length} シーン · ${totalChars} 字`, pad, pad + 44);

      let y = pad + 72 + 28 + 10;
      data.scenes.forEach((sc, i) => {
        const L = sceneCardLayout(ctx, cardW, sc, i);
        drawSceneCard(ctx, pad, y, cardW, sc, i);
        y += L.cardH + 10;
      });

      return canvas;
    }

    function canvasToJpgBlob(canvas) {
      return new Promise(resolve => {
        canvas.toBlob(b => resolve(b), 'image/jpeg', 0.94);
      });
    }

    async function exportFile(format) {
      if (format === 'jpg') {
        const base = ExportUtils.exportBasenameFromText(exportSourceText());
        const canvas = await renderExportCanvas();
        const blob = await canvasToJpgBlob(canvas);
        if (blob) ExportUtils.downloadBlob(blob, base + '.jpg');
        return;
      }

      const filename = ExportUtils.exportFilename(exportSourceText(), format);
      const content = buildExportContent(format);
      const mime = format === 'md' ? 'text/markdown;charset=utf-8' : 'text/plain;charset=utf-8';
      const blob = new Blob([content], { type: mime });
      ExportUtils.downloadBlob(blob, filename);
    }

    document.getElementById('work-title').value = data.title || '';
    document.getElementById('work-title').addEventListener('input', e => {
      data.title = e.target.value;
      scheduleSave();
    });

    document.getElementById('add-scene').addEventListener('click', () => {
      data.scenes.push(makeScene());
      render();
      scheduleSave();
      const cards = document.querySelectorAll('.scene-card');
      const last = cards[cards.length - 1];
      last.querySelector('.scene-text').focus();
      last.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    document.getElementById('export-btn').addEventListener('click', async () => {
      const format = await showExportModal();
      if (format) await exportFile(format);
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (!confirm('すべてのシーンを消去しますか？この操作は元に戻せません。')) return;
      data = { title: '', scenes: [makeScene()] };
      document.getElementById('work-title').value = '';
      render();
      scheduleSave();
    });

    load();
    syncMeta();
    render();
  </script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
