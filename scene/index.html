<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="シーン単位で物語の構成を組み立てるプロットエディタ。1シーン300字以内、ドラッグ並べ替えで、小説の設計を楽しみながら進められます。">
  <title>Scene — 物語の構成エディタ | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/export.css">
  <link rel="stylesheet" href="../shared/editor-title.css">
  <link rel="stylesheet" href="../shared/editor-mobile.css">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --muted: #000000;
      --border: #000000;
      --surface: #ffffff;
      --invert: #000000;
      --max-chars: 300;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    /* Header */
    .header {
      margin-bottom: 1.5rem;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .brand {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .header-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
      padding-top: 0.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--invert);
      border-color: var(--invert);
      color: #fff;
    }

    .btn-library {
      background: var(--invert);
      border-color: var(--invert);
      color: #fff;
      text-decoration: none;
    }

    .btn-library:hover {
      opacity: 0.85;
      background: var(--invert);
      border-color: var(--invert);
      color: #fff;
    }

    .stats {
      display: flex;
      gap: 1.25rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ink);
    }

    .stats strong {
      color: var(--ink);
      font-weight: 700;
    }

    /* Scene list */
    .scene-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .scene-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0;
      background: var(--surface);
      border: 2px solid var(--border);
      transition: border-color 0.15s, opacity 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
    }

    .scene-card:focus-within {
      border-color: var(--ink);
    }

    .scene-card.dragging {
      opacity: 1;
      border-color: var(--ink);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.24);
      z-index: 100;
      transition: none !important;
      pointer-events: none;
    }

    .scene-card.scene-placeholder {
      border-style: dashed;
      background: var(--bg);
      box-shadow: none;
      pointer-events: none;
    }

    .scene-side {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 0.2rem;
      padding: 0.85rem 0.45rem 0.65rem 0.5rem;
      border-right: 2px solid var(--border);
      background: var(--invert);
      color: #fff;
    }

    .drag-handle {
      display: flex;
      flex-direction: column;
      gap: 3px;
      height: 28px;
      justify-content: center;
      box-sizing: border-box;
      padding: 0 0.35rem;
      cursor: grab;
      border: none;
      background: transparent;
      color: #fff;
      transition: opacity 0.15s;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .drag-handle:hover { opacity: 0.65; }
    .drag-handle:active,
    .scene-list.is-dragging .drag-handle { cursor: grabbing; opacity: 1; }

    .drag-handle span {
      display: block;
      width: 14px;
      height: 2px;
      background: currentColor;
    }

    .scene-num {
      font-size: 0.7rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
      min-width: 1.1rem;
      height: 28px;
      line-height: 28px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene-body {
      padding: 0.85rem 0.3rem 0.85rem 1rem;
      min-width: 0;
    }

    .scene-body-head {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 0;
      padding-bottom: 0.4rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .scene-actions {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 0.85rem 0.65rem 0.5rem 0;
      background: var(--surface);
    }

    .scene-title {
      flex: 1;
      min-width: 0;
      width: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--ink);
      height: 28px;
      line-height: 28px;
      padding: 0;
      margin: 0;
      outline: none;
    }

    .scene-title::placeholder { color: #888; font-weight: 500; }
    .scene-title:focus { outline: none; }

    .scene-body-head:focus-within {
      border-bottom-color: var(--ink);
    }

    .scene-text {
      width: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--ink);
      resize: none;
      outline: none;
      min-height: 4.5rem;
      overflow: hidden;
    }

    .scene-text::placeholder { color: #888; }

    .char-count {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.03em;
      white-space: nowrap;
      height: 28px;
      line-height: 28px;
      display: flex;
      align-items: center;
    }

    .char-count.warn {
      background: var(--ink);
      color: #fff;
      padding: 0.1rem 0.4rem;
    }

    .char-count.over {
      background: var(--ink);
      color: #fff;
      padding: 0.1rem 0.4rem;
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    .collapse-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-size: 0.6rem;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .collapse-btn:hover {
      background: var(--invert);
      color: #fff;
    }

    .collapse-icon {
      display: block;
      transition: transform 0.15s;
    }

    .scene-card.is-collapsed .collapse-icon {
      transform: rotate(-90deg);
    }

    .scene-card.is-collapsed .scene-detail {
      display: none;
    }

    .scene-card.is-collapsed {
      align-items: center;
    }

    .scene-card.is-collapsed .scene-side {
      align-items: center;
      padding: 0.65rem 0.45rem 0.65rem 0.5rem;
    }

    .scene-card.is-collapsed .scene-body {
      padding: 0.65rem 0.3rem 0.65rem 1rem;
    }

    .scene-card.is-collapsed .scene-body-head {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .scene-card.is-collapsed .scene-title {
      margin-bottom: 0;
      border-bottom: none;
      padding: 0;
      height: 28px;
      line-height: 28px;
    }

    .scene-card.is-collapsed .char-count {
      line-height: 28px;
    }

    .scene-card.is-collapsed .scene-actions {
      padding: 0.65rem 0.65rem 0.65rem 0;
      justify-content: center;
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border: 2px solid #c62828;
      background: #fff;
      color: #c62828;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .delete-btn:hover {
      background: #c62828;
      border-color: #c62828;
      color: #fff;
    }

    /* Add button */
    .add-scene {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      margin-top: 0.75rem;
      padding: 1rem;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .add-scene:hover {
      background: var(--invert);
      color: #fff;
    }

    .add-scene .plus {
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1;
    }

    /* Empty state */
    .empty-hint {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.8;
    }

    .empty-hint strong {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    /* Footer */
    .footer {
      margin-top: 2.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-align: center;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.85);
    }

    .modal-overlay[hidden] {
      display: none;
    }

    .modal {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 1.5rem;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      margin-bottom: 0.75rem;
    }

    .modal-message {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.75;
      margin-bottom: 1.25rem;
    }

    .modal-message strong {
      font-weight: 900;
    }

    .format-options {
      border: none;
      margin-bottom: 1rem;
    }

    .format-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .format-group {
      display: flex;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .scene-list.is-dragging {
      -webkit-user-select: none;
      user-select: none;
    }

    .scene-list.is-dragging .scene-card:not(.dragging) {
      opacity: 0.38;
    }

    @media (max-width: 520px) {
      .header-top { flex-direction: column; }
      .header-actions { padding-top: 0; }
      .scene-side { padding: 0.5rem 0.35rem; }
    }
  </style>

<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div style="flex:1; min-width:0">
          <div class="brand"><a class="brand-home" href="https://tools.tadeku.net/">tadeku-tools</a><span class="brand-sep"> / </span>Scene</div>
          <input type="text" class="work-title" id="work-title" placeholder="Title" maxlength="60" spellcheck="false">
        </div>
        <div class="header-actions">
          <a class="btn btn-library" href="library/">Library</a>
          <button class="btn" id="new-btn" type="button" title="新しいプロットを作成">新規作成</button>
          <button class="btn" id="export-btn" title="テキストを書き出す">書き出し</button>
        </div>
      </div>
      <div class="stats">
        <span>シーン <strong id="scene-count">0</strong></span>
        <span>合計 <strong id="total-chars">0</strong> 字</span>
      </div>
    </header>

    <div class="scene-list" id="scene-list"></div>

    <button class="add-scene" id="add-scene" type="button">
      <span class="plus">+</span>
      シーンを追加
    </button>

    <footer class="footer">1シーン300字以内 · ドラッグで並べ替え · 自動保存</footer>
  </div>

  <div class="modal-overlay" id="export-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="export-modal-title">
      <p class="modal-title" id="export-modal-title">書き出し</p>
      <p class="modal-message" id="export-modal-message"></p>
      <fieldset class="format-options">
        <legend class="format-label">形式を選ぶと書き出します</legend>
        <div class="format-group">
          <button class="format-btn" type="button" data-format="txt">.txt</button>
          <button class="format-btn" type="button" data-format="md">.md</button>
          <button class="format-btn" type="button" data-format="jpg">.jpg</button>
        </div>
      </fieldset>
      <div class="modal-actions">
        <button class="btn" id="export-modal-cancel" type="button">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="../shared/export.js"></script>
  <script src="../shared/editor-prefs.js"></script>
  <script src="../shared/editor-library.js"></script>
  <script src="../shared/editor-undo.js"></script>
  <script>
    const STORAGE_KEY = 'scene-scenes-v1';
    const LEGACY_STORAGE_KEY = 'beat-scenes-v1';
    const MAX_CHARS = 300;

    let data = { title: '', scenes: [] };
    let saveTimer = null;
    const undo = TadekuEditorUndo.createStack({ limit: 50 });

    TadekuEditorPrefs.trackEditor('scene');

    function serializeForLibrary() {
      const hasSceneContent = data.scenes.some(sc => sc.title.trim() || sc.body.trim());
      if (!data.title.trim() && !hasSceneContent) return '';
      return JSON.stringify({
        scenes: data.scenes.map(sc => ({
          title: sc.title,
          body: sc.body,
          collapsed: !!sc.collapsed,
        })),
      });
    }

    function deserializeFromLibrary(body) {
      try {
        const parsed = JSON.parse(body);
        if (!parsed || !Array.isArray(parsed.scenes)) return null;
        return parsed.scenes.map(sc => ({
          id: uid(),
          title: sc.title || '',
          body: sc.body || '',
          collapsed: sc.collapsed == null ? false : !!sc.collapsed,
        }));
      } catch (_) {
        return null;
      }
    }

    function applyLibraryDocument({ title, body }) {
      const scenes = deserializeFromLibrary(body);
      data = {
        title: title || '',
        scenes: scenes && scenes.length ? scenes : [makeScene()],
      };
      document.getElementById('work-title').value = data.title || '';
      render();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      syncMeta();
    }

    const library = TadekuEditorLibrary.createLibrarySession(
      'scene',
      () => ({
        title: document.getElementById('work-title').value,
        body: serializeForLibrary(),
      }),
      {
        onLoad: applyLibraryDocument,
        onTitleResolved: (uniqueTitle) => {
          const workTitle = document.getElementById('work-title');
          if (document.activeElement !== workTitle) {
            workTitle.value = uniqueTitle;
            data.title = uniqueTitle;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            syncMeta();
          }
        },
      },
    );

    function getEditorState() {
      return data;
    }

    function applyEditorState(state) {
      data = state;
      document.getElementById('work-title').value = data.title || '';
      render();
      scheduleSave();
    }

    function pushUndo() {
      undo.push(getEditorState);
    }

    function isEditingText() {
      const el = document.activeElement;
      if (!el) return false;
      const tag = el.tagName;
      return tag === 'TEXTAREA' || (tag === 'INPUT' && el.type === 'text');
    }

    function sceneCharCount() {
      return data.scenes.reduce((s, sc) => s + sc.body.length, 0);
    }

    function syncMeta() {
      TadekuEditorPrefs.syncDraftMeta('scene', {
        charCount: sceneCharCount(),
        title: (data.title || '').trim(),
      });
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function load() {
      try {
        let raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) raw = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (raw) data = JSON.parse(raw);
      } catch (_) {}
      if (!Array.isArray(data.scenes)) data.scenes = [];
      if (typeof data.title !== 'string') data.title = '';
      data.scenes.forEach(sc => {
        if (sc.collapsed == null) sc.collapsed = false;
      });
      if (!data.scenes.length) data.scenes = [makeScene()];
    }

    function makeScene() {
      return { id: uid(), title: '', body: '', collapsed: false };
    }

    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        syncMeta();
        library.scheduleSave();
      }, 400);
    }

    function updateStats() {
      document.getElementById('scene-count').textContent = data.scenes.length;
      const total = data.scenes.reduce((s, sc) => s + sc.body.length, 0);
      document.getElementById('total-chars').textContent = total;
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function charClass(len) {
      if (len > MAX_CHARS) return 'over';
      if (len > MAX_CHARS * 0.85) return 'warn';
      return '';
    }

    function setSceneCollapsed(scene, card, collapsed) {
      scene.collapsed = !!collapsed;
      card.classList.toggle('is-collapsed', scene.collapsed);
      const btn = card.querySelector('.collapse-btn');
      const expanded = !scene.collapsed;
      btn.setAttribute('aria-expanded', String(expanded));
      const label = expanded ? '本文を閉じる' : '本文を開く';
      btn.setAttribute('aria-label', label);
      btn.title = label;
    }

    function clearCardMotion(list) {
      list.querySelectorAll('.scene-card').forEach(card => {
        card.style.transition = '';
        card.style.transform = '';
      });
    }

    function clearDragStyles(card) {
      card.style.position = '';
      card.style.left = '';
      card.style.top = '';
      card.style.width = '';
      card.style.zIndex = '';
      card.style.margin = '';
      card.style.transition = '';
      card.style.transform = '';
      card.style.pointerEvents = '';
    }

    function pointerXY(ev) {
      if (ev.touches && ev.touches[0]) {
        return { x: ev.touches[0].clientX, y: ev.touches[0].clientY };
      }
      if (ev.changedTouches && ev.changedTouches[0]) {
        return { x: ev.changedTouches[0].clientX, y: ev.changedTouches[0].clientY };
      }
      return { x: ev.clientX, y: ev.clientY };
    }

    function flipReorder(list, mutate) {
      const cards = [...list.querySelectorAll('.scene-card')];
      const tops = new Map(cards.map(card => [card, card.getBoundingClientRect().top]));
      mutate();
      cards.forEach(card => {
        if (card.classList.contains('dragging') || card.classList.contains('scene-placeholder')) return;
        const prevTop = tops.get(card);
        if (prevTop == null) return;
        const dy = prevTop - card.getBoundingClientRect().top;
        if (!dy) return;
        card.style.transition = 'none';
        card.style.transform = `translateY(${dy}px)`;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            card.style.transition = 'transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)';
            card.style.transform = '';
          });
        });
      });
    }

    function reorderPlaceholder(list, placeholder, probeY, prevProbeY) {
      const draggingDown = prevProbeY == null || probeY >= prevProbeY;
      const ratio = draggingDown ? 0.3 : 0.7;
      const others = [...list.querySelectorAll('.scene-card:not(.dragging)')];
      let next = null;
      for (const other of others) {
        if (other === placeholder) continue;
        const rect = other.getBoundingClientRect();
        if (probeY < rect.top + rect.height * ratio) { next = other; break; }
      }
      const wouldMove = next
        ? placeholder.nextElementSibling !== next
        : list.lastElementChild !== placeholder;
      if (!wouldMove) return;

      flipReorder(list, () => {
        if (next) list.insertBefore(placeholder, next);
        else list.appendChild(placeholder);
      });
    }

    function startPointerDrag(e, card, handle, list) {
      if (e.button != null && e.button > 0) return;
      const isTouch = e.pointerType === 'touch';
      e.preventDefault();

      const startRect = card.getBoundingClientRect();
      const pointer = pointerXY(e);
      const offsetY = pointer.y - startRect.top;

      const placeholder = document.createElement('article');
      placeholder.className = 'scene-card scene-placeholder';
      placeholder.setAttribute('aria-hidden', 'true');
      placeholder.style.height = startRect.height + 'px';
      list.insertBefore(placeholder, card);

      card.classList.add('dragging');
      list.classList.add('is-dragging');
      card.style.position = 'fixed';
      card.style.left = startRect.left + 'px';
      card.style.top = startRect.top + 'px';
      card.style.width = startRect.width + 'px';
      card.style.zIndex = '100';
      card.style.margin = '0';
      card.style.transition = 'none';
      card.style.transform = 'scale(1.015)';

      let lastProbeY = null;

      const onMove = ev => {
        if (ev.cancelable) ev.preventDefault();
        const pt = pointerXY(ev);
        if (pt.y == null) return;
        const cardTop = pt.y - offsetY;
        card.style.top = cardTop + 'px';
        const probeY = cardTop + startRect.height * 0.5;
        reorderPlaceholder(list, placeholder, probeY, lastProbeY);
        lastProbeY = probeY;
      };

      const finish = () => {
        if (isTouch) {
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', finish);
          document.removeEventListener('touchcancel', finish);
        } else {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', finish);
          document.removeEventListener('pointercancel', finish);
        }

        const targetTop = placeholder.getBoundingClientRect().top;
        let released = false;
        const release = () => {
          if (released) return;
          released = true;
          list.insertBefore(card, placeholder);
          placeholder.remove();
          card.classList.remove('dragging');
          list.classList.remove('is-dragging');
          clearDragStyles(card);
          clearCardMotion(list);

          const order = [...list.querySelectorAll('.scene-card')].map(c => c.dataset.id);
          const changed = data.scenes.some((s, i) => s.id !== order[i]);
          if (changed) {
            data.scenes.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
            render();
            scheduleSave();
          }
        };

        card.style.transition = 'top 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.2s ease';
        card.style.top = targetTop + 'px';
        card.style.transform = 'scale(1)';
        card.addEventListener('transitionend', release, { once: true });
        setTimeout(release, 220);
      };

      if (isTouch) {
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', finish);
        document.addEventListener('touchcancel', finish);
      } else {
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', finish);
        document.addEventListener('pointercancel', finish);
      }
    }

    function render() {
      const list = document.getElementById('scene-list');
      list.innerHTML = '';

      data.scenes.forEach((scene, index) => {
        const card = document.createElement('article');
        card.className = 'scene-card' + (scene.collapsed ? ' is-collapsed' : '');
        card.dataset.id = scene.id;

        const len = scene.body.length;
        const expanded = !scene.collapsed;

        card.innerHTML = `
          <div class="scene-side">
            <button class="drag-handle" type="button" aria-label="ドラッグして並べ替え" tabindex="-1">
              <span></span><span></span><span></span>
            </button>
            <div class="scene-num">${index + 1}</div>
          </div>
          <div class="scene-body">
            <div class="scene-body-head">
              <input class="scene-title" type="text" placeholder="シーン名（任意）" maxlength="40" value="${esc(scene.title)}" spellcheck="false">
              <span class="char-count ${charClass(len)}">${len} / ${MAX_CHARS}</span>
              <button class="collapse-btn" type="button" aria-expanded="${expanded}" aria-label="${expanded ? '本文を閉じる' : '本文を開く'}" title="${expanded ? '本文を閉じる' : '本文を開く'}">
                <span class="collapse-icon" aria-hidden="true">▼</span>
              </button>
            </div>
            <div class="scene-detail">
              <textarea class="scene-text" placeholder="このシーンで起きることを、${MAX_CHARS}字以内で。" maxlength="${MAX_CHARS + 20}">${esc(scene.body)}</textarea>
            </div>
          </div>
          <div class="scene-actions">
            <button class="delete-btn" type="button" aria-label="シーンを削除" title="削除">×</button>
          </div>
        `;

        const titleInput = card.querySelector('.scene-title');
        const textarea = card.querySelector('.scene-text');
        const counter = card.querySelector('.char-count');

        titleInput.addEventListener('input', () => {
          scene.title = titleInput.value;
          scheduleSave();
        });

        textarea.addEventListener('input', () => {
          scene.body = textarea.value;
          const l = scene.body.length;
          counter.textContent = `${l} / ${MAX_CHARS}`;
          counter.className = 'char-count ' + charClass(l);
          autoResize(textarea);
          updateStats();
          scheduleSave();
        });

        autoResize(textarea);

        card.querySelector('.collapse-btn').addEventListener('click', () => {
          const next = !scene.collapsed;
          setSceneCollapsed(scene, card, next);
          scheduleSave();
          if (!next) textarea.focus();
        });

        card.querySelector('.delete-btn').addEventListener('click', () => {
          if (data.scenes.length <= 1) {
            scene.title = '';
            scene.body = '';
            scene.collapsed = false;
            render();
            scheduleSave();
            return;
          }
          if (!confirm(`シーン ${index + 1} を削除しますか？`)) return;
          pushUndo();
          data.scenes.splice(index, 1);
          render();
          scheduleSave();
          updateStats();
        });

        const handle = card.querySelector('.drag-handle');
        handle.removeAttribute('tabindex');
        handle.addEventListener('pointerdown', e => startPointerDrag(e, card, handle, list));

        list.appendChild(card);
      });

      updateStats();
    }

    function esc(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function exportSourceText() {
      const lines = [];
      if (data.title.trim()) lines.push(data.title.trim());
      for (const sc of data.scenes) {
        if (sc.body.trim()) lines.push(sc.body.trim());
      }
      return lines.join('\n');
    }

    function showExportModal() {
      const count = data.scenes.length;
      return ExportUtils.showExportFormatModal(`${count} シーン`, null);
    }

    function buildExportContent(format) {
      const title = ExportUtils.exportBasenameFromText(exportSourceText());
      if (format === 'md') {
        const lines = [`# ${title}`, ''];
        data.scenes.forEach((sc, i) => {
          const label = sc.title.trim() || `シーン ${i + 1}`;
          lines.push(`## ${label}`);
          lines.push('');
          lines.push(sc.body.trim() || '（未記入）');
          lines.push('');
        });
        return lines.join('\n');
      }
      const lines = [title, ''];
      data.scenes.forEach((sc, i) => {
        const label = sc.title.trim() || `シーン ${i + 1}`;
        lines.push(`【${label}】`);
        lines.push(sc.body.trim() || '（未記入）');
        lines.push('');
      });
      return lines.join('\n');
    }

    const EXPORT_W = 720;
    const EXPORT_SCALE = 2;
    const EXPORT_FONT = '"Noto Sans JP", "Hiragino Sans", sans-serif';

    function wrapCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      let line = '';
      for (const ch of text) {
        if (ch === '\n') {
          lines.push(line);
          line = '';
          continue;
        }
        const next = line + ch;
        if (line && ctx.measureText(next).width > maxWidth) {
          lines.push(line);
          line = ch;
        } else {
          line = next;
        }
      }
      if (line) lines.push(line);
      return lines.length ? lines : [''];
    }

    function sceneCardLayout(ctx, cardW, scene, index) {
      const sideW = 44;
      const bodyPadX = 16;
      const bodyPadY = 14;
      const bodyW = cardW - sideW;
      const textW = bodyW - bodyPadX * 2;
      const titleText = scene.title.trim();
      const bodyText = scene.body.trim() || '（未記入）';
      const bodyEmpty = !scene.body.trim();

      ctx.font = `700 13px ${EXPORT_FONT}`;
      const titleH = titleText ? 22 : 0;

      ctx.font = `400 15px ${EXPORT_FONT}`;
      const bodyLines = wrapCanvasLines(ctx, bodyText, textW);
      const bodyLineH = 26;
      const bodyH = bodyLines.length * bodyLineH;

      ctx.font = `700 11px ${EXPORT_FONT}`;
      const footerH = 20;

      const innerH = bodyPadY + titleH + (titleText ? 8 : 0) + bodyH + 8 + footerH + bodyPadY;
      const cardH = Math.max(88, innerH);

      return {
        sideW, bodyPadX, bodyPadY, bodyW, textW, titleText, bodyText, bodyEmpty,
        bodyLines, bodyLineH, titleH, cardH, charCount: scene.body.length,
      };
    }

    function drawSceneCard(ctx, x, y, cardW, scene, index) {
      const L = sceneCardLayout(ctx, cardW, scene, index);

      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, cardW, L.cardH);

      ctx.fillStyle = '#000';
      ctx.fillRect(x, y, L.sideW, L.cardH);

      ctx.fillStyle = '#fff';
      ctx.font = `900 13px ${EXPORT_FONT}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(index + 1), x + L.sideW / 2, y + L.cardH / 2);

      const bodyX = x + L.sideW + L.bodyPadX;
      let cy = y + L.bodyPadY;

      if (L.titleText) {
        ctx.fillStyle = '#000';
        ctx.font = `700 13px ${EXPORT_FONT}`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(L.titleText, bodyX, cy);
        cy += L.titleH + 8;
      }

      ctx.font = `400 15px ${EXPORT_FONT}`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      for (const line of L.bodyLines) {
        ctx.fillStyle = L.bodyEmpty ? '#888' : '#000';
        ctx.fillText(line, bodyX, cy);
        cy += L.bodyLineH;
      }

      ctx.fillStyle = '#000';
      ctx.font = `700 11px ${EXPORT_FONT}`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`${L.charCount} / ${MAX_CHARS}`, bodyX, y + L.cardH - L.bodyPadY - 14);
    }

    function measureExportHeight(ctx, cardW) {
      const pad = 24;
      const headerH = 72;
      const statsH = 28;
      const gap = 10;
      let h = pad + headerH + statsH + gap;
      data.scenes.forEach((sc, i) => {
        h += sceneCardLayout(ctx, cardW, sc, i).cardH + gap;
      });
      h += pad + 20;
      return h;
    }

    async function renderExportCanvas() {
      await document.fonts.ready;

      const cardW = EXPORT_W - 48;
      const probe = document.createElement('canvas');
      const probeCtx = probe.getContext('2d');
      const totalH = measureExportHeight(probeCtx, cardW);

      const canvas = document.createElement('canvas');
      canvas.width = EXPORT_W * EXPORT_SCALE;
      canvas.height = totalH * EXPORT_SCALE;
      const ctx = canvas.getContext('2d');
      ctx.scale(EXPORT_SCALE, EXPORT_SCALE);

      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, EXPORT_W, totalH);

      const pad = 24;
      const workTitle = data.title.trim() || ExportUtils.exportBasenameFromText(exportSourceText());
      const totalChars = data.scenes.reduce((s, sc) => s + sc.body.length, 0);

      ctx.fillStyle = '#000';
      ctx.font = `900 28px ${EXPORT_FONT}`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(workTitle, pad, pad);

      ctx.font = `700 12px ${EXPORT_FONT}`;
      ctx.fillText(`${data.scenes.length} シーン · ${totalChars} 字`, pad, pad + 44);

      let y = pad + 72 + 28 + 10;
      data.scenes.forEach((sc, i) => {
        const L = sceneCardLayout(ctx, cardW, sc, i);
        drawSceneCard(ctx, pad, y, cardW, sc, i);
        y += L.cardH + 10;
      });

      return canvas;
    }

    function canvasToJpgBlob(canvas) {
      return new Promise(resolve => {
        canvas.toBlob(b => resolve(b), 'image/jpeg', 0.94);
      });
    }

    async function exportFile(format) {
      if (format === 'jpg') {
        const base = ExportUtils.exportBasenameFromText(exportSourceText());
        const canvas = await renderExportCanvas();
        const blob = await canvasToJpgBlob(canvas);
        if (blob) ExportUtils.downloadBlob(blob, base + '.jpg');
        return;
      }

      const filename = ExportUtils.exportFilename(exportSourceText(), format);
      const content = buildExportContent(format);
      const mime = format === 'md' ? 'text/markdown;charset=utf-8' : 'text/plain;charset=utf-8';
      const blob = new Blob([content], { type: mime });
      ExportUtils.downloadBlob(blob, filename);
    }

    document.getElementById('work-title').addEventListener('input', e => {
      data.title = e.target.value;
      scheduleSave();
    });

    document.getElementById('add-scene').addEventListener('click', () => {
      data.scenes.push(makeScene());
      render();
      scheduleSave();
      const cards = document.querySelectorAll('.scene-card');
      const last = cards[cards.length - 1];
      last.querySelector('.scene-title').focus();
      last.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    document.getElementById('export-btn').addEventListener('click', async () => {
      const format = await showExportModal();
      if (format) await exportFile(format);
    });

    document.getElementById('new-btn').addEventListener('click', async () => {
      if (!confirm('新しいプロットを作成しますか？')) return;
      await library.flush();
      library.resetSession();
      data = { title: '', scenes: [makeScene()] };
      document.getElementById('work-title').value = '';
      render();
      scheduleSave();
      document.getElementById('work-title').focus();
    });

    document.addEventListener('keydown', e => {
      if (isEditingText()) return;
      TadekuEditorUndo.tryHandleKey(e, undo, getEditorState, applyEditorState);
    });

    load();
    document.getElementById('work-title').value = data.title || '';
    syncMeta();
    render();

    (async () => {
      await library.initFromUrl();
    })();
  </script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
