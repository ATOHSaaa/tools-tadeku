<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="小説・文学向けの縦書き入稿PDFをブラウザで作成。版型・目次・奥付・ルビに対応。入稿用PDFのプレビューと出力ができる執筆支援ツールです。">
  <title>Nyuko(α) — 縦書き入稿PDF | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="../shared/nyuko-data.js"></script>
  <script src="../shared/nyuko-engine.js"></script>
  <style>
    :root {
      --bg: #f0eeea;
      --ink: #1a1a1a;
      --muted: #5a5a5a;
      --border: #d4d0c8;
      --pane-divider: #a8a196;
      --surface: #ffffff;
      --accent: var(--ink);
      --accent-soft: #e8e6e1;
      --workspace: #e8e6e1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      height: 100dvh;
    }

    .mobile-pane-bar {
      display: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.7rem 1rem;
      padding-right: 11rem;
      background: var(--surface);
      color: var(--ink);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .header-right {
      position: fixed;
      top: 0.45rem;
      right: 1rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .btn {
      border: none;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.5rem 0.85rem;
      cursor: pointer;
      transition: opacity 0.12s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary {
      background: var(--ink);
      color: #fff;
    }

    .btn-clear {
      background: #c62828;
      color: #fff;
    }

    .btn-clear:hover { opacity: 0.88; }

    .main {
      display: grid;
      grid-template-columns: var(--sidebar-width, 360px) 8px 1fr;
      grid-template-areas: "sidebar-primary resizer-workspace workspace";
      min-height: 0;
      min-width: 0;
    }

    .main.has-secondary-sidebar {
      grid-template-columns: var(--sidebar-width, 360px) 8px var(--secondary-sidebar-width, 280px) 8px 1fr;
      grid-template-areas: "sidebar-primary resizer-primary-secondary sidebar-secondary resizer-workspace workspace";
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      background: var(--surface);
      border-right: 2px solid var(--pane-divider);
    }

    .sidebar-primary { grid-area: sidebar-primary; }

    .sidebar-secondary {
      grid-area: sidebar-secondary;
    }

    .sidebar-secondary[hidden] {
      display: none !important;
    }

    .pane-resizer {
      position: relative;
      cursor: col-resize;
      background: var(--pane-divider);
      box-shadow: inset 1px 0 0 rgba(255, 255, 255, 0.35), inset -1px 0 0 rgba(0, 0, 0, 0.08);
      touch-action: none;
    }

    .pane-resizer-primary-secondary { grid-area: resizer-primary-secondary; }

    .pane-resizer-workspace { grid-area: resizer-workspace; }

    .pane-resizer[hidden] {
      display: none !important;
    }

    .pane-resizer::before {
      content: "";
      position: absolute;
      inset: 0 -4px;
    }

    .pane-resizer:hover,
    .pane-resizer.dragging,
    .pane-resizer:focus-visible {
      background: var(--accent);
      outline: none;
    }

    .tabs {
      display: grid;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      border: none;
      background: var(--bg);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.75rem 0.5rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .tab:hover { color: var(--ink); }
    .tab.active {
      background: var(--surface);
      color: var(--ink);
      border-bottom-color: var(--accent);
    }

    .tab.is-drag-source {
      visibility: hidden;
    }

    .tab.is-dragging {
      cursor: grabbing;
    }

    .tab-drag-ghost {
      position: fixed;
      z-index: 300;
      pointer-events: none;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 0.5rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--pane-divider);
      border-bottom: 2px solid var(--accent);
      border-radius: 8px 8px 4px 4px;
      box-shadow:
        0 10px 28px rgba(26, 26, 26, 0.22),
        0 3px 8px rgba(26, 26, 26, 0.12);
      white-space: nowrap;
      text-align: center;
      box-sizing: border-box;
      transform: scale(1.03);
      transition: box-shadow 0.12s, transform 0.12s;
    }

    .tab-drag-ghost.is-visible {
      display: flex;
    }

    .tab-drag-ghost.is-lifted {
      transform: scale(1.05) rotate(-1.5deg);
      box-shadow:
        0 16px 36px rgba(26, 26, 26, 0.28),
        0 4px 10px rgba(26, 26, 26, 0.14);
    }

    body.is-tab-dragging {
      cursor: grabbing;
    }

    body.is-tab-dragging .tab {
      cursor: grabbing;
    }

    .sidebar.is-drop-target .tabs {
      background: rgba(26, 26, 26, 0.05);
    }

    .tab-insert-indicator {
      position: fixed;
      z-index: 299;
      width: 3px;
      margin-left: -1px;
      background: var(--ink);
      border-radius: 2px;
      pointer-events: none;
      display: none;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.45);
    }

    .tab-insert-indicator.is-visible {
      display: block;
    }

    .split-drop-overlay.is-active .split-drop-zone {
      transition: background 0.12s, border-color 0.12s, opacity 0.12s;
    }

    .sidebar-panels {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      min-width: 0;
    }

    .split-drop-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      display: none;
    }

    .split-drop-overlay.is-active {
      display: block;
      pointer-events: auto;
    }

    .split-drop-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      background: rgba(26, 26, 26, 0.08);
      border: 2px dashed rgba(26, 26, 26, 0.22);
      box-sizing: border-box;
      transition: background 0.12s, border-color 0.12s;
    }

    .split-drop-zone::after {
      content: attr(data-label);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--muted);
      pointer-events: none;
      white-space: nowrap;
    }

    .split-drop-zone.is-hovered {
      background: rgba(26, 26, 26, 0.14);
      border-color: var(--ink);
    }

    .split-drop-zone.is-hovered::after {
      color: var(--ink);
    }

    .panel {
      display: none;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 1rem;
    }

    .panel.active { display: flex; flex-direction: column; gap: 1rem; }

    #panel-edit.active .editor-area,
    .sidebar-secondary #panel-edit .editor-area {
      flex: 1;
      min-height: 120px;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    #panel-settings > div:not(:first-child) .section-label {
      margin-top: 0.65rem;
    }

    .import-btn {
      display: block;
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }

    .import-btn:hover {
      border-color: var(--ink);
      background: var(--surface);
    }

    .import-bar {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.75rem;
      margin-bottom: 0.5rem;
    }

    #panel-edit .import-btn {
      display: inline-block;
      width: auto;
      margin-bottom: 0;
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    #panel-edit .import-btn:hover {
      background: #000;
      border-color: #000;
    }

    #import-file { display: none; }

    .toggle-group {
      display: flex;
      gap: 0.35rem;
    }

    .toggle-group-wrap {
      flex-direction: column;
    }

    .toggle-group-wrap .toggle-btn {
      flex: none;
      width: 100%;
      text-align: left;
    }

    .toggle-btn {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.55rem 0.35rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    .toggle-btn:hover { border-color: var(--ink); }

    .toggle-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--ink);
    }

    .settings-select {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.55rem 0.6rem;
      cursor: pointer;
    }

    .settings-select:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }

    .spacing-field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 0.6rem;
    }

    .spacing-field-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--ink);
    }

    .spacing-field-head span {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
    }

    .spacing-field input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .font-card {
      display: block;
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 0.65rem 0.75rem;
      margin-top: 0.35rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
    }

    .font-card:first-of-type { margin-top: 0; }

    .format-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .format-card {
      display: block;
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 0.55rem 0.7rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1.45;
      transition: background 0.12s, border-color 0.12s;
    }

    .format-card:hover { border-color: var(--ink); }

    .format-card.active {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .font-card:hover { border-color: var(--ink); }

    .font-card.active {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .font-card-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
    }

    .font-card-note {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .editor-area {
      flex: 1;
      min-height: 160px;
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      font-family: inherit;
      font-size: 0.82rem;
      line-height: 1.7;
      padding: 0.65rem 0.75rem;
      resize: vertical;
    }

    .editor-area:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }

    .editor-meta {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 700;
      text-align: right;
    }

    .workspace-wrap {
      grid-area: workspace;
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      background: var(--workspace);
    }

    .workspace-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .preview-view-toggle {
      display: flex;
      gap: 0.25rem;
    }

    .preview-view-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.35rem 0.55rem;
      cursor: pointer;
    }

    .preview-view-btn:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    .preview-view-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--ink);
    }

    .zoom-preset-group {
      display: flex;
      gap: 0.25rem;
    }

    .zoom-fit-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.35rem 0.55rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .zoom-fit-btn:hover { border-color: var(--ink); }

    .zoom-fit-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .workspace-toolbar label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    .preview-scroll {
      flex: 1;
      min-height: 0;
      min-width: 0;
      overflow: auto;
      max-width: 100%;
      padding: 1.5rem;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px) 0 0 / 24px 24px,
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px) 0 0 / 24px 24px,
        var(--workspace);
      -webkit-overflow-scrolling: touch;
    }

    .colophon-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .colophon-field label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .colophon-field input {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.5rem 0.6rem;
    }

    .colophon-field input:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }

    .colophon-date-wrap {
      position: relative;
    }

    .colophon-date-wrap input[type="text"] {
      cursor: pointer;
    }

    .colophon-date-picker {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .colophon-note {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .toc-note {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .toc-note code {
      font-family: inherit;
      font-size: 0.9em;
      font-weight: 700;
    }

    .toc-meta {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 700;
    }

    .toc-actions {
      display: flex;
      gap: 0.35rem;
    }

    .toc-actions .import-btn {
      flex: 1;
      margin-bottom: 0;
    }

    .toc-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .toc-row {
      display: grid;
      grid-template-columns: 1fr 3.5rem 1.75rem;
      gap: 0.35rem;
      align-items: center;
    }

    .toc-row input {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      font-family: inherit;
      font-size: 0.82rem;
      padding: 0.45rem 0.5rem;
    }

    .toc-row input[type="number"] {
      text-align: center;
      padding-left: 0.25rem;
      padding-right: 0.25rem;
      -moz-appearance: textfield;
    }

    .toc-row input[type="number"]::-webkit-outer-spin-button,
    .toc-row input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .toc-row input:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }

    .toc-remove {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1;
      padding: 0.35rem 0;
      cursor: pointer;
    }

    .toc-remove:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    .toc-empty {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.7;
      padding: 0.5rem 0;
    }

    .pages-note {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .page-structure {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .page-blank-field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .page-blank-field label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      flex: 1 1 auto;
      min-width: 0;
    }

    .page-blank-input-wrap {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex: none;
    }

    .page-blank-step {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1;
      width: 1.75rem;
      height: 1.75rem;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .page-blank-step:hover:not(:disabled) { border-color: var(--ink); }

    .page-blank-step:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .page-blank-input-wrap span {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    .page-blank-field input[type="number"] {
      width: 3.5rem;
      border: 1px solid var(--border);
      background: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.4rem 0.35rem;
      text-align: center;
      -moz-appearance: textfield;
    }

    .page-blank-field input[type="number"]::-webkit-outer-spin-button,
    .page-blank-field input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .page-blank-field input[type="number"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }

    .page-section-row {
      border: 1px solid var(--border);
      background: var(--accent-soft);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.55rem 0.75rem;
      text-align: center;
    }

    .empty-note {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .preview-wrap {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--workspace);
    }

    .zoom-slider {
      flex: 0 1 130px;
      max-width: 130px;
      accent-color: var(--accent);
    }

            <span class="zoom-value" id="zoom-value">30%</span>

            <button type="button" class="zoom-fit-btn active" id="zoom-fit-btn">フィット</button>
