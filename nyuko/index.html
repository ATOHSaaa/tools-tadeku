  <div class="split-drop-overlay" id="split-drop-overlay" aria-hidden="true">
    <div class="split-drop-zone" data-drop-target="primary" data-label="左サイドバー" id="split-drop-primary"></div>
    <div class="split-drop-zone" data-drop-target="secondary" data-label="右サイドバー" id="split-drop-secondary"></div>
  </div>

  <div class="tab-drag-ghost" id="tab-drag-ghost" aria-hidden="true"></div>
  <div class="tab-insert-indicator" id="tab-insert-indicator" aria-hidden="true"></div>

  <div id="nyuko-export-host" aria-hidden="true"></div>

  <script>
    (function () {
      const { FORMATS, FORMAT_ORDER, FONTS, NONBULE_POSITIONS, COLUMN_COUNTS, WRITING_DIRECTIONS, CHAPTER_MODES, BLEED_OPTIONS, DEFAULT_PAGE_SPACERS, computeGutter, resolveDraftSettings, bleedMmFromSetting, formatLineHeightLabel, hFromLineHeight, snapLineHeightH, normalizePageSpacers } = window.NyukoData;
      const { paginate, assembleLayout, createLayoutPage, exportPrint, pageDimensions } = window.NyukoEngine;

      const STORAGE_KEY = 'nyuko-draft-v1';
      const ZOOM_MIN = 5;
      const ZOOM_MAX = 200;
      const ZOOM_STEP = 5;
      const TEXT_RENDER_DEBOUNCE_MS = 250;
      const SAVE_DRAFT_DEBOUNCE_MS = 500;

      let textRenderTimer = null;
      let saveDraftTimer = null;

      const state = {
        formatId: 'a6',
        bleed: 'on',
        fontId: 'literary',
        nonbulePosition: 'spread',
        columnCount: 1,
        writingDirection: 'vertical',
        chapterMode: 'break-before',
        fontSizePt: null,
        tocFontSizePt: null,
        lineHeightH: 8,
        letterSpacing: 0,
        previewView: 'spread',
        zoomMode: 'fit',
        zoom: 0.3,
        layout: { pages: [], pageCount: 0, charCount: 0, chapters: [] },
        toc: [],
        pageSpacers: Object.assign({}, DEFAULT_PAGE_SPACERS),
        primaryActiveTab: 'edit',
        secondaryActiveTab: null,
      };

      const PAGE_SPACER_INPUTS = ['blankBeforeBody', 'blankAfterToc', 'blankAfterBody'];
      const SIDEBAR_LAYOUT_KEY = 'nyuko-sidebar-layout';
      const SPLIT_PANE_KEY = 'nyuko-split-pane-tab';
      const SPLIT_MOBILE_MQ = window.matchMedia('(max-width: 860px)');

      const els = {
        main: document.getElementById('main'),
        sidebarPrimary: document.getElementById('sidebar-primary'),
        sidebarSecondary: document.getElementById('sidebar-secondary'),
        resizerPrimarySecondary: document.getElementById('resizer-primary-secondary'),
        resizerWorkspace: document.getElementById('resizer-workspace'),
        tabsPrimary: document.getElementById('tabs-primary'),
        tabsSecondary: document.getElementById('tabs-secondary'),
        sidebarPanelsPrimary: document.getElementById('sidebar-panels-primary'),
        sidebarPanelsSecondary: document.getElementById('sidebar-panels-secondary'),
        splitDropOverlay: document.getElementById('split-drop-overlay'),
        splitDropPrimary: document.getElementById('split-drop-primary'),
        splitDropSecondary: document.getElementById('split-drop-secondary'),
        tabDragGhost: document.getElementById('tab-drag-ghost'),
        tabInsertIndicator: document.getElementById('tab-insert-indicator'),
        editor: document.getElementById('editor'),
        importBtn: document.getElementById('import-btn'),
        importFile: document.getElementById('import-file'),
        editorMeta: document.getElementById('editor-meta'),
        previewGrid: document.getElementById('preview-grid'),
        previewScroll: document.getElementById('preview-scroll'),
        previewViewBtns: document.querySelectorAll('[data-preview-view]'),
        colophonTitle: document.getElementById('colophon-title'),
        colophonAuthor: document.getElementById('colophon-author'),
        colophonDate: document.getElementById('colophon-date'),
        colophonDatePicker: document.getElementById('colophon-date-picker'),
        colophonPublisher: document.getElementById('colophon-publisher'),
        colophonPrinter: document.getElementById('colophon-printer'),
        colophonEmail: document.getElementById('colophon-email'),
        colophonWebsite: document.getElementById('colophon-website'),
        zoomSlider: document.getElementById('zoom-slider'),
        zoomValue: document.getElementById('zoom-value'),
        zoomOutBtn: document.getElementById('zoom-out-btn'),
        zoomInBtn: document.getElementById('zoom-in-btn'),
        zoomFitBtn: document.getElementById('zoom-fit-btn'),
        zoomActualBtn: document.getElementById('zoom-actual-btn'),
        btnExportPdf: document.getElementById('btn-export-pdf'),
        btnClear: document.getElementById('btn-clear'),
        formatGroup: document.getElementById('format-group'),
        bleedGroup: document.getElementById('bleed-group'),
        nonbuleGroup: document.getElementById('nonbule-group'),
        columnGroup: document.getElementById('column-group'),
        columnSection: document.getElementById('column-section'),
        directionGroup: document.getElementById('direction-group'),
        chapterModeSelect: document.getElementById('chapter-mode-select'),
        fontGroup: document.getElementById('font-group'),
        fontSizeSlider: document.getElementById('font-size-slider'),
        fontSizeValue: document.getElementById('font-size-value'),
        tocFontSizeSlider: document.getElementById('toc-font-size-slider'),
        tocFontSizeValue: document.getElementById('toc-font-size-value'),
        lineHeightSlider: document.getElementById('line-height-slider'),
        lineHeightValue: document.getElementById('line-height-value'),
        letterSpacingSlider: document.getElementById('letter-spacing-slider'),
        letterSpacingValue: document.getElementById('letter-spacing-value'),
        tocList: document.getElementById('toc-list'),
        tocMeta: document.getElementById('toc-meta'),
        tocImportChapters: document.getElementById('toc-import-chapters'),
        tocAddRow: document.getElementById('toc-add-row'),
        blankBeforeBody: document.getElementById('blank-before-body'),
        blankAfterToc: document.getElementById('blank-after-toc'),
        blankAfterBody: document.getElementById('blank-after-body'),
        labelBlankBeforeBody: document.getElementById('label-blank-before-body'),
        pageBlockAfterToc: document.getElementById('page-block-after-toc'),
        pageSectionToc: document.getElementById('page-section-toc'),
        pageSectionColophon: document.getElementById('page-section-colophon'),
      };

      function hasTocContent() {
        return tocData().some((entry) => String(entry.title || '').trim());
      }

      function hasColophonFilled() {
        const d = colophonData();
        return Boolean(
          String(d.title || '').trim() ||
          String(d.author || '').trim() ||
          String(d.publisher || '').trim() ||
          String(d.date || '').trim() ||
          String(d.printer || '').trim() ||
          String(d.email || '').trim() ||
          String(d.website || '').trim()
        );
      }

      function updatePageStructureUI() {
        const hasToc = hasTocContent();
        els.pageSectionToc.hidden = !hasToc;
        els.pageSectionColophon.hidden = !hasColophonFilled();
        els.pageBlockAfterToc.hidden = !hasToc;
        if (els.labelBlankBeforeBody) {
          els.labelBlankBeforeBody.textContent = hasToc ? '空白頁（目次前）' : '空白頁（本文前）';
        }
        updatePageSpacersUI();
      }

      function pageSpacerStepValue(key, spacers) {
        if (key === 'beforeBody') {
          return hasTocContent() ? spacers.beforeToc : spacers.beforeToc + spacers.afterToc;
        }
        if (key === 'afterToc') return spacers.afterToc;
        if (key === 'afterBodyTail') return spacers.afterBody + spacers.afterColophon;
        return 0;
      }

      function pageSpacersData() {
        return normalizePageSpacers(state.pageSpacers);
      }

      function readPageSpacersFromUI() {
        const hasToc = hasTocContent();
        const beforeToc = normalizePageSpacers({ beforeToc: els.blankBeforeBody.value }).beforeToc;
        const afterToc = hasToc
          ? normalizePageSpacers({ afterToc: els.blankAfterToc.value }).afterToc
          : 0;
        const afterTotal = normalizePageSpacers({ afterBody: els.blankAfterBody.value }).afterBody;
        return normalizePageSpacers({
          beforeToc,
          afterToc,
          afterBody: afterTotal,
          afterColophon: 0,
        });
      }

      function commitPageSpacers() {
        state.pageSpacers = readPageSpacersFromUI();
        updatePageSpacersUI();
        saveDraft();
        render();
      }

      function stepPageSpacer(key, delta) {
        const current = pageSpacersData();
        const next = Object.assign({}, current);

        if (key === 'beforeBody') {
          if (hasTocContent()) {
            next.beforeToc = current.beforeToc + delta;
          } else {
            const total = current.beforeToc + current.afterToc + delta;
            next.beforeToc = total;
            next.afterToc = 0;
          }
        } else if (key === 'afterToc') {
          next.afterToc = current.afterToc + delta;
        } else if (key === 'afterBodyTail') {
          const total = current.afterBody + current.afterColophon + delta;
          next.afterBody = total;
          next.afterColophon = 0;
        } else {
          next[key] = current[key] + delta;
        }

        state.pageSpacers = normalizePageSpacers(next);
        updatePageSpacersUI();
        saveDraft();
        render();
      }

      function updatePageSpacersUI() {
        const spacers = pageSpacersData();
        const hasToc = hasTocContent();
        if (hasToc) {
          els.blankBeforeBody.value = String(spacers.beforeToc);
          els.blankAfterToc.value = String(spacers.afterToc);
        } else {
          els.blankBeforeBody.value = String(spacers.beforeToc + spacers.afterToc);
        }
        els.blankAfterBody.value = String(spacers.afterBody + spacers.afterColophon);

        document.querySelectorAll('.page-blank-step').forEach((btn) => {
          const key = btn.dataset.spacer;
          const delta = Number(btn.dataset.delta);
          if (!key || !delta) return;
          const value = pageSpacerStepValue(key, spacers);
          if (delta < 0) btn.disabled = value <= 0;
          else btn.disabled = value >= 99;
        });
      }

      function currentFormat() { return FORMATS[state.formatId]; }
      function currentFont() { return FONTS[state.fontId]; }
      function effectiveFont() {
        const f = currentFont();
        return Object.assign({}, f, { size: state.fontSizePt || f.size });
      }
      function effectiveTocFontSizePt() {
        return state.tocFontSizePt || effectiveFont().size;
      }
      function currentBleedMm() { return bleedMmFromSetting(state.bleed); }

      function formatJapaneseDate(iso) {
        const parts = iso.split('-').map(Number);
        return parts[0] + '年' + parts[1] + '月' + parts[2] + '日';
      }

      function parseColophonDate(value) {
        if (!value) return null;
        if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
        const m = value.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日$/);
        if (!m) return null;
        return m[1] + '-' + String(Number(m[2])).padStart(2, '0') + '-' + String(Number(m[3])).padStart(2, '0');
      }

      function setColophonDate(iso) {
        if (!iso) {
          els.colophonDatePicker.value = '';
          els.colophonDate.value = '';
          return;
        }
        els.colophonDatePicker.value = iso;
        els.colophonDate.value = formatJapaneseDate(iso);
      }

      function syncColophonDateFromPicker() {
        const iso = els.colophonDatePicker.value || '';
        const current = parseColophonDate(els.colophonDate.value);
        if ((current || '') === iso) return;
        setColophonDate(iso);
        updatePageStructureUI();
        saveDraft();
        refreshPreview();
      }

      function openColophonDatePicker() {
        if (typeof els.colophonDatePicker.showPicker === 'function') {
          els.colophonDatePicker.showPicker();
        } else {
          els.colophonDatePicker.click();
        }
      }

      function normalizeTocEntry(entry) {
        const title = entry && typeof entry.title === 'string' ? entry.title : '';
        const pageRaw = entry ? entry.page : '';
        const page = pageRaw === '' || pageRaw == null ? '' : Number(pageRaw);
        return {
          title,
          page: Number.isFinite(page) && page > 0 ? page : '',
        };
      }

      function tocData() {
        return state.toc.map(normalizeTocEntry);
      }

      function setToc(entries) {
        state.toc = (entries || []).map(normalizeTocEntry);
      }

      function updateTocMeta() {
        const chapters = state.layout.chapters || [];
        els.tocMeta.textContent = chapters.length
          ? chapters.length + '章を検出（## で指定）'
          : '章は未検出';
      }

      function renderTocList() {
        els.tocList.innerHTML = '';
        if (!state.toc.length) {
          const empty = document.createElement('p');
          empty.className = 'toc-empty';
          empty.textContent = '目次はまだありません。「行を追加」または「章から拾う」で作成できます。';
          els.tocList.appendChild(empty);
          updatePageStructureUI();
          return;
        }

        state.toc.forEach((entry, index) => {
          const row = document.createElement('div');
          row.className = 'toc-row';

          const titleInput = document.createElement('input');
          titleInput.type = 'text';
          titleInput.placeholder = '章タイトル';
          titleInput.value = entry.title;
          titleInput.addEventListener('input', () => {
            state.toc[index].title = titleInput.value;
            saveDraft();
            updatePageStructureUI();
            refreshPreview();
          });

          const pageInput = document.createElement('input');
          pageInput.type = 'number';
          pageInput.min = '1';
          pageInput.placeholder = '頁';
          pageInput.value = entry.page === '' ? '' : String(entry.page);
          pageInput.addEventListener('input', () => {
            const value = pageInput.value.trim();
            state.toc[index].page = value ? Number(value) : '';
            saveDraft();
            refreshPreview();
          });

          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'toc-remove';
          removeBtn.setAttribute('aria-label', '削除');
          removeBtn.textContent = '×';
          removeBtn.addEventListener('click', () => {
            state.toc.splice(index, 1);
            saveDraft();
            renderTocList();
            refreshPreview();
          });

          row.appendChild(titleInput);
          row.appendChild(pageInput);
          row.appendChild(removeBtn);
          els.tocList.appendChild(row);
        });
        updatePageStructureUI();
      }

      function addTocRow() {
        state.toc.push({ title: '', page: '' });
        saveDraft();
        renderTocList();
        const lastTitle = els.tocList.querySelector('.toc-row:last-child input[type="text"]');
        if (lastTitle) lastTitle.focus();
      }

      function pagesBeforeBodyCount() {
        const spacers = pageSpacersData();
        let count = spacers.beforeToc + spacers.afterToc;
        count += 1; // 目次頁
        return count;
      }

      function importChaptersFromManuscript() {
        const chapters = state.layout.chapters || [];
        if (!chapters.length) {
          alert('原稿に ## で始まる章が見つかりません。');
          return;
        }
        if (state.toc.length && !confirm('目次を章一覧で上書きしますか？')) return;
        const offset = pagesBeforeBodyCount();
        setToc(chapters.map((chapter) => ({ title: chapter.title, page: chapter.page + offset })));
        saveDraft();
        renderTocList();
        render();
      }

      function colophonData() {
        return {
          title: els.colophonTitle.value,
          author: els.colophonAuthor.value,
          publisher: els.colophonPublisher.value,
          date: els.colophonDate.value,
          printer: els.colophonPrinter.value,
          email: els.colophonEmail.value,
          website: els.colophonWebsite.value,
        };
      }

      function draftData() {
        return {
          text: els.editor.value,
          formatId: state.formatId,
          bleed: state.bleed,
          fontId: state.fontId,
          nonbulePosition: state.nonbulePosition,
          columnCount: state.columnCount,
          writingDirection: state.writingDirection,
          chapterMode: state.chapterMode,
          fontSizePt: state.fontSizePt,
          tocFontSizePt: state.tocFontSizePt,
          lineHeightH: state.lineHeightH,
          letterSpacing: state.letterSpacing,
          previewView: state.previewView,
          zoomMode: state.zoomMode,
          zoom: state.zoom,
          colophon: colophonData(),
          toc: tocData(),
          pageSpacers: pageSpacersData(),
        };
      }

      function clearAll() {
        if (!confirm('本文・設定・目次・奥付をすべて初期化しますか？')) return;

        flushPending();
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (_) {}

        els.editor.value = '';
        els.colophonTitle.value = '';
        els.colophonAuthor.value = '';
        els.colophonPublisher.value = '';
        els.colophonPrinter.value = '';
        els.colophonEmail.value = '';
        els.colophonWebsite.value = '';
        setColophonDate('');

        state.formatId = 'a6';
        state.bleed = 'on';
        state.fontId = 'literary';
        state.nonbulePosition = 'spread';
        state.columnCount = 1;
        state.writingDirection = 'vertical';
        state.chapterMode = 'break-before';
        state.fontSizePt = FONTS.literary.size;
        state.tocFontSizePt = FONTS.literary.size;
        state.lineHeightH = 8;
        state.letterSpacing = 0;
        state.previewView = 'spread';
        state.zoomMode = 'fit';
        state.zoom = 0.3;
        state.toc = [];
        state.pageSpacers = Object.assign({}, DEFAULT_PAGE_SPACERS);
        state.layout = { pages: [], pageCount: 0, charCount: 0, chapters: [] };

        els.previewViewBtns.forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.previewView === state.previewView);
        });
        updateZoomUI();
        updateSpacingUI();
        updateTocFontSizeUI();
        updatePageSpacersUI();
        renderTocList();
        saveDraft();
        render();
      }

      function saveDraft() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(draftData()));
        } catch (err) {
          console.warn('下書きの保存に失敗しました', err);
        }
      }

      function flushTextRender() {
        if (textRenderTimer) {
          clearTimeout(textRenderTimer);
          textRenderTimer = null;
        }
        refreshPreview();
      }

      function scheduleTextRender() {
        if (textRenderTimer) clearTimeout(textRenderTimer);
        textRenderTimer = setTimeout(() => {
          textRenderTimer = null;
          refreshPreview();
        }, TEXT_RENDER_DEBOUNCE_MS);
      }

      function flushSaveDraft() {
        if (saveDraftTimer) {
          clearTimeout(saveDraftTimer);
          saveDraftTimer = null;
        }
        saveDraft();
      }

      function scheduleSaveDraft() {
        if (saveDraftTimer) clearTimeout(saveDraftTimer);
        saveDraftTimer = setTimeout(() => {
          saveDraftTimer = null;
          saveDraft();
        }, SAVE_DRAFT_DEBOUNCE_MS);
      }

      function flushPending() {
        flushTextRender();
        flushSaveDraft();
      }

      function loadDraft() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          if (typeof data.text === 'string') els.editor.value = data.text;
          const resolved = resolveDraftSettings(data);
          state.formatId = resolved.formatId;
          state.bleed = resolved.bleed;
          if (data.fontId === 'readable') state.fontId = 'standard';
          else if (data.fontId && FONTS[data.fontId]) state.fontId = data.fontId;
          if (data.nonbulePosition && NONBULE_POSITIONS.some((p) => p.id === data.nonbulePosition)) {
            state.nonbulePosition = data.nonbulePosition;
          }
          if (data.columnCount === 1 || data.columnCount === 2) {
            state.columnCount = data.columnCount;
          }
          if (data.writingDirection === 'vertical' || data.writingDirection === 'horizontal') {
            state.writingDirection = data.writingDirection;
          }
          if (CHAPTER_MODES.some((m) => m.id === data.chapterMode)) {
            state.chapterMode = data.chapterMode;
          }
          if (typeof data.fontSizePt === 'number' && data.fontSizePt > 0) {
            state.fontSizePt = Math.min(16, Math.max(6, data.fontSizePt));
          }
          if (typeof data.tocFontSizePt === 'number' && data.tocFontSizePt > 0) {
            state.tocFontSizePt = Math.min(16, Math.max(6, data.tocFontSizePt));
          }
          if (typeof data.lineHeightH === 'number' && data.lineHeightH > 0) {
            state.lineHeightH = snapLineHeightH(data.lineHeightH);
          } else if (typeof data.lineHeightScale === 'number' && data.lineHeightScale > 0) {
            const font = FONTS[state.fontId] || FONTS.literary;
            const sizePt = state.fontSizePt || font.size;
            const lh = font.lineHeight * data.lineHeightScale;
            state.lineHeightH = snapLineHeightH(hFromLineHeight(lh, sizePt));
          }
          if (typeof data.letterSpacing === 'number' && data.letterSpacing >= 0) {
            state.letterSpacing = Math.min(0.4, Math.max(0, data.letterSpacing));
          }
          if (data.previewView === 'spread' || data.previewView === 'single') {
            state.previewView = data.previewView;
          } else if (data.previewView === 'grid') {
            state.previewView = 'spread';
          }
          if (data.zoomMode === 'fit' || data.zoomMode === 'manual' || data.zoomMode === 'actual') {
            state.zoomMode = data.zoomMode;
          } else if (typeof data.zoom === 'number') {
            state.zoomMode = 'manual';
          }
          if (state.zoomMode === 'actual') {
            state.zoom = 1;
          } else if (typeof data.zoom === 'number' && data.zoom > 0) {
            state.zoom = Math.min(ZOOM_MAX / 100, data.zoom);
            els.zoomSlider.value = String(Math.round(data.zoom * 100));
            els.zoomValue.textContent = els.zoomSlider.value + '%';
          }
          if (data.colophon) {
            els.colophonTitle.value = data.colophon.title || '';
            els.colophonAuthor.value = data.colophon.author || '';
            els.colophonPublisher.value = data.colophon.publisher || '';
            const savedDate = parseColophonDate(data.colophon.date);
            if (savedDate) setColophonDate(savedDate);
            else setColophonDate('');
            els.colophonPrinter.value = data.colophon.printer || '';
            els.colophonEmail.value = data.colophon.email || data.colophon.contact || '';
            els.colophonWebsite.value = data.colophon.website || '';
          }
          if (Array.isArray(data.toc)) {
            setToc(data.toc);
          }
          if (data.pageSpacers) {
            state.pageSpacers = normalizePageSpacers(data.pageSpacers);
          }
        } catch (err) {
          console.warn('下書きの読み込みに失敗しました', err);
        }
      }

      function buildToggleGroup(container, items, activeId, onSelect) {
        container.innerHTML = '';
        items.forEach((item) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'toggle-btn' + (item.id === activeId ? ' active' : '');
          btn.textContent = item.label;
          btn.dataset.id = item.id;
          btn.addEventListener('click', () => onSelect(item.id));
          container.appendChild(btn);
        });
      }

      function effectiveColumnCount() {
        return state.writingDirection === 'horizontal' ? 1 : state.columnCount;
      }

      function spacingOptions() {
        return {
          lineHeightH: state.lineHeightH,
          letterSpacing: state.letterSpacing,
          columnCount: effectiveColumnCount(),
          writingDirection: state.writingDirection,
          chapterMode: state.chapterMode,
        };
      }

      function renderOptions() {
        return {
          nonbulePosition: state.nonbulePosition,
          preview: true,
          lineHeightH: state.lineHeightH,
          letterSpacing: state.letterSpacing,
          columnCount: effectiveColumnCount(),
          writingDirection: state.writingDirection,
          chapterMode: state.chapterMode,
          tocFontSizePt: effectiveTocFontSizePt(),
        };
      }

      function layoutOptions() {
        return {
          writingDirection: state.writingDirection,
          pageSpacers: pageSpacersData(),
        };
      }

      function updateSpacingUI() {
        const sizePt = state.fontSizePt || currentFont().size;
        els.fontSizeSlider.value = String(sizePt);
        els.fontSizeValue.textContent = sizePt.toFixed(1) + 'pt';
        els.lineHeightSlider.value = String(state.lineHeightH);
        els.lineHeightValue.textContent = formatLineHeightLabel(state.lineHeightH, sizePt);
        els.letterSpacingSlider.value = String(Math.round(state.letterSpacing * 100));
        els.letterSpacingValue.textContent = state.letterSpacing.toFixed(2) + 'em';
      }

      function updateTocFontSizeUI() {
        const sizePt = effectiveTocFontSizePt();
        els.tocFontSizeSlider.value = String(sizePt);
        els.tocFontSizeValue.textContent = sizePt.toFixed(1) + 'pt';
      }

      function updateZoomUI() {
        const percent = Math.round(state.zoom * 100);
        els.zoomSlider.value = String(percent);
        els.zoomValue.textContent = percent + '%';
        els.zoomOutBtn.disabled = percent <= ZOOM_MIN;
        els.zoomInBtn.disabled = percent >= ZOOM_MAX;
        els.zoomFitBtn.classList.toggle('active', state.zoomMode === 'fit');
        els.zoomActualBtn.classList.toggle('active', state.zoomMode === 'actual');
      }

      let previewRenderRaf = 0;
      let pinchSaveTimer = 0;

      function queuePreviewRender() {
        if (previewRenderRaf) return;
        previewRenderRaf = requestAnimationFrame(() => {
          previewRenderRaf = 0;
          renderPreview();
        });
      }

      function schedulePinchSave() {
        clearTimeout(pinchSaveTimer);
        pinchSaveTimer = setTimeout(saveDraft, 300);
      }

      function setManualZoomRatio(ratio, options) {
        const opts = options || {};
        state.zoomMode = 'manual';
        state.zoom = Math.min(ZOOM_MAX / 100, Math.max(ZOOM_MIN / 100, ratio));
        updateZoomUI();
        if (opts.renderNow) renderPreview();
        else queuePreviewRender();
        if (opts.save) saveDraft();
      }

      function applyManualZoom(percent) {
        setManualZoomRatio(percent / 100, { renderNow: true, save: true });
      }

      function stepZoom(delta) {
        applyManualZoom(Math.round(state.zoom * 100) + delta);
      }

      function fitPreviewZoom() {
        if (!state.layout.pageCount) return;
        const format = activeFormat();
        const bleedMm = currentBleedMm();
        const dims = pageDimensions(format, bleedMm, 1);
        const scrollStyle = getComputedStyle(els.previewScroll);
        const padX = (parseFloat(scrollStyle.paddingLeft) || 0) + (parseFloat(scrollStyle.paddingRight) || 0);
        const padY = (parseFloat(scrollStyle.paddingTop) || 0) + (parseFloat(scrollStyle.paddingBottom) || 0);
        const availW = Math.max(80, els.previewScroll.clientWidth - padX);
        const availH = Math.max(80, els.previewScroll.clientHeight - padY);

        const spreadGap = 12;
        const spreadW = dims.widthPx * 2 + spreadGap;
        const targetW = state.previewView === 'spread' ? spreadW : dims.widthPx;
        const targetH = dims.heightPx;
        const zoom = Math.min(availW / targetW, availH / targetH, 1.25);
        state.zoom = Math.max(0.05, Math.min(1.25, zoom));
        updateZoomUI();
      }

      function setPreviewView(view) {
        state.previewView = view;
        els.previewViewBtns.forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.previewView === view);
        });
        if (state.zoomMode === 'fit') fitPreviewZoom();
        saveDraft();
        renderPreview();
      }

      function buildFormatGroup() {
        els.formatGroup.innerHTML = '';
        FORMAT_ORDER.forEach((id) => {
          const format = FORMATS[id];
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'format-card' + (id === state.formatId ? ' active' : '');
          btn.textContent = format.label;
          btn.addEventListener('click', () => {
            state.formatId = id;
            saveDraft();
            buildFormatGroup();
            render();
          });
          els.formatGroup.appendChild(btn);
        });
      }

      function buildFontGroup() {
        els.fontGroup.innerHTML = '';
        Object.values(FONTS).forEach((font) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'font-card' + (font.id === state.fontId ? ' active' : '');
          btn.style.fontFamily = font.family;
          btn.textContent = font.label;
          btn.addEventListener('click', () => {
            state.fontId = font.id;
            saveDraft();
            buildFontGroup();
            render();
          });
          els.fontGroup.appendChild(btn);
        });
      }

      function buildBodyLayout() {
        const baseFormat = currentFormat();
        const font = effectiveFont();
        const opts = spacingOptions();
        let bodyLayout = paginate(els.editor.value, baseFormat, font, opts);
        const adjusted = computeGutter(baseFormat, bodyLayout.pageCount || 1);
        if (adjusted.marginInner !== baseFormat.marginInner) {
          bodyLayout = paginate(els.editor.value, adjusted, font, opts);
        }
        return bodyLayout;
      }

      function buildFullLayout() {
        return assembleLayout(buildBodyLayout(), tocData(), colophonData(), layoutOptions());
      }

      function updateLayoutMeta() {
        const metaParts = [state.layout.charCount.toLocaleString() + '字'];
        if (state.layout.bodyPageCount) metaParts.push('本文' + state.layout.bodyPageCount + 'p');
        metaParts.push('計' + state.layout.pageCount + 'p');
        els.editorMeta.textContent = metaParts.join(' / ');
        els.btnExportPdf.disabled = !state.layout.pageCount;
      }

      function refreshPreview() {
        state.layout = buildFullLayout();
        updateLayoutMeta();
        updateTocMeta();
        if (state.zoomMode === 'fit') fitPreviewZoom();
        renderPreview();
      }

      function buildChapterModeSelect() {
        els.chapterModeSelect.innerHTML = '';
        CHAPTER_MODES.forEach((mode) => {
          const option = document.createElement('option');
          option.value = mode.id;
          option.textContent = mode.label;
          els.chapterModeSelect.appendChild(option);
        });
      }

      function renderSettings() {
        buildFormatGroup();
        buildToggleGroup(els.bleedGroup, BLEED_OPTIONS, state.bleed, (id) => {
          state.bleed = id;
          saveDraft();
          render();
        });
        buildToggleGroup(els.nonbuleGroup, NONBULE_POSITIONS, state.nonbulePosition, (id) => {
          state.nonbulePosition = id;
          saveDraft();
          render();
        });
        els.columnSection.hidden = state.writingDirection === 'horizontal';
        if (state.writingDirection !== 'horizontal') {
          buildToggleGroup(els.columnGroup, COLUMN_COUNTS, state.columnCount, (id) => {
            state.columnCount = id;
            saveDraft();
            render();
          });
        }
        buildToggleGroup(els.directionGroup, WRITING_DIRECTIONS, state.writingDirection, (id) => {
          state.writingDirection = id;
          saveDraft();
          render();
        });
        els.chapterModeSelect.value = state.chapterMode;
        buildFontGroup();
        updateSpacingUI();
      }

      function activeFormat() {
        const base = currentFormat();
        const count = state.layout && (state.layout.bodyPageCount || state.layout.pageCount)
          ? (state.layout.bodyPageCount || state.layout.pageCount)
          : 1;
        return computeGutter(base, count || 1);
      }

      function renderPreview() {
        const format = activeFormat();
        const font = effectiveFont();
        const bleedMm = currentBleedMm();
        const scale = state.zoom;

        els.previewGrid.innerHTML = '';
        if (!state.layout.pageCount) {
          const empty = document.createElement('p');
          empty.className = 'preview-empty';
          empty.textContent = '原稿を入力すると、PDF出力と同じ縦組みレイアウトでここに表示されます。';
          els.previewGrid.appendChild(empty);
          return;
        }

        if (state.previewView === 'single') {
          for (let i = 0; i < state.layout.pages.length; i++) {
            const row = document.createElement('div');
            row.className = 'preview-single';
            row.appendChild(createLayoutPage(
              state.layout.pages[i], format, font, bleedMm, scale, i + 1, renderOptions()
            ));
            els.previewGrid.appendChild(row);
          }
          return;
        }

        const layoutPages = state.layout.pages;
        const total = layoutPages.length;
        const horizontal = state.writingDirection === 'horizontal';
        const dims = pageDimensions(format, bleedMm, scale);

        function makeEmptySlot(side) {
          const spacer = document.createElement('div');
          spacer.className = 'preview-slot preview-slot-' + side + ' preview-slot-empty';
          spacer.style.width = dims.widthPx + 'px';
          spacer.style.minHeight = dims.heightPx + 'px';
          return spacer;
        }

        function appendSpreadTrack(rightIdx, leftIdx) {
          const track = document.createElement('div');
          track.className = 'preview-spread-track' + (horizontal ? ' preview-spread-horizontal' : '');

          if (rightIdx != null) {
            const slot = document.createElement('div');
            slot.className = 'preview-slot preview-slot-right';
            slot.appendChild(createLayoutPage(
              layoutPages[rightIdx], format, font, bleedMm, scale, rightIdx + 1, renderOptions()
            ));
            track.appendChild(slot);
          } else {
            track.appendChild(makeEmptySlot('right'));
          }

          if (leftIdx != null) {
            const slot = document.createElement('div');
            slot.className = 'preview-slot preview-slot-left';
            slot.appendChild(createLayoutPage(
              layoutPages[leftIdx], format, font, bleedMm, scale, leftIdx + 1, renderOptions()
            ));
            track.appendChild(slot);
          } else {
            track.appendChild(makeEmptySlot('left'));
          }

          els.previewGrid.appendChild(track);
        }

        let i = 0;
        if (total > 0 && layoutPages[0].type === 'blank') {
          if (horizontal) appendSpreadTrack(0, null);
          else appendSpreadTrack(null, 0);
          i = 1;
        }

        let spreadEnd = total;
        if (total > 0 && layoutPages[total - 1].type === 'colophon') {
          spreadEnd = total - 1;
        }

        while (i < spreadEnd) {
          if (i + 1 < spreadEnd) {
            appendSpreadTrack(i, i + 1);
          } else {
            appendSpreadTrack(i, null);
          }
          i += 2;
        }

        if (spreadEnd < total) {
          appendSpreadTrack(total - 1, null);
        }
      }

      function getSidebarForTab(tabId) {
        if (els.tabsSecondary.querySelector('.tab[data-tab="' + tabId + '"]')) return 'secondary';
        return 'primary';
      }

      function hasSecondarySidebar() {
        return els.tabsSecondary.querySelectorAll('.tab').length > 0;
      }

      function updateTabGridCounts() {
        [els.tabsPrimary, els.tabsSecondary].forEach((tabs) => {
          const count = tabs.querySelectorAll('.tab').length;
          tabs.style.gridTemplateColumns = count ? 'repeat(' + count + ', 1fr)' : '';
        });
      }

      function updatePaneLayout() {
        const secondaryTabs = Array.from(els.tabsSecondary.querySelectorAll('.tab'));
        if (els.tabsPrimary.querySelectorAll('.tab').length === 0 && secondaryTabs.length > 0) {
          secondaryTabs.forEach((tab) => {
            els.tabsPrimary.appendChild(tab);
            const panel = document.getElementById('panel-' + tab.dataset.tab);
            if (panel) els.sidebarPanelsPrimary.appendChild(panel);
          });
          syncPanelOrder(els.tabsPrimary, els.sidebarPanelsPrimary);
        }

        const dualPane = els.tabsPrimary.querySelectorAll('.tab').length > 0
          && els.tabsSecondary.querySelectorAll('.tab').length > 0;

        els.sidebarSecondary.hidden = !dualPane;
        if (els.resizerPrimarySecondary) els.resizerPrimarySecondary.hidden = !dualPane;
        els.main.classList.toggle('has-secondary-sidebar', dualPane);
        if (!dualPane) state.secondaryActiveTab = null;

        if (!dualPane && !els.tabsPrimary.querySelector('.tab.active')) {
          const first = els.tabsPrimary.querySelector('.tab');
          if (first) activateTab(first.dataset.tab);
        }
      }

      function activateTab(tabId) {
        const sidebar = getSidebarForTab(tabId);
        if (sidebar === 'primary') {
          state.primaryActiveTab = tabId;
          document.querySelectorAll('#tabs-primary .tab').forEach((t) => {
            const active = t.dataset.tab === tabId;
            t.classList.toggle('active', active);
            t.setAttribute('aria-selected', active ? 'true' : 'false');
          });
          document.querySelectorAll('#sidebar-panels-primary .panel').forEach((panel) => {
            panel.classList.toggle('active', panel.id === 'panel-' + tabId);
          });
        } else {
          state.secondaryActiveTab = tabId;
          document.querySelectorAll('#tabs-secondary .tab').forEach((t) => {
            const active = t.dataset.tab === tabId;
            t.classList.toggle('active', active);
            t.setAttribute('aria-selected', active ? 'true' : 'false');
          });
          document.querySelectorAll('#sidebar-panels-secondary .panel').forEach((panel) => {
            panel.classList.toggle('active', panel.id === 'panel-' + tabId);
          });
        }
        saveSidebarLayout();
      }

      function syncPanelOrder(tabsContainer, panelsContainer) {
        Array.from(tabsContainer.querySelectorAll('.tab')).forEach((tab) => {
          const panel = document.getElementById('panel-' + tab.dataset.tab);
          if (panel) panelsContainer.appendChild(panel);
        });
      }

      function applyTabOrder(tabsContainer, panelsContainer, tabIds) {
        const known = new Set(tabIds);
        tabIds.forEach((tabId) => {
          const tab = tabsContainer.querySelector('.tab[data-tab="' + tabId + '"]');
          if (tab) tabsContainer.appendChild(tab);
        });
        Array.from(tabsContainer.querySelectorAll('.tab')).forEach((tab) => {
          if (!known.has(tab.dataset.tab)) tabsContainer.appendChild(tab);
        });
        syncPanelOrder(tabsContainer, panelsContainer);
      }

      function readSidebarLayout() {
        try {
          const saved = localStorage.getItem(SIDEBAR_LAYOUT_KEY);
          if (saved) return JSON.parse(saved);
          const legacy = localStorage.getItem(SPLIT_PANE_KEY);
          if (legacy) return { secondary: [legacy] };
        } catch (_) {}
        return null;
      }

      function saveSidebarLayout() {
        try {
          const primary = Array.from(els.tabsPrimary.querySelectorAll('.tab')).map((t) => t.dataset.tab);
          const secondary = Array.from(els.tabsSecondary.querySelectorAll('.tab')).map((t) => t.dataset.tab);
          localStorage.setItem(SIDEBAR_LAYOUT_KEY, JSON.stringify({
            primary,
            secondary,
            primaryActive: state.primaryActiveTab,
            secondaryActive: state.secondaryActiveTab,
          }));
        } catch (_) {}
      }

      function placeTabAt(tabId, targetSidebar, insertBeforeTab, options) {
        const opts = Object.assign({ save: true, activate: true }, options || {});
        if (SPLIT_MOBILE_MQ.matches) return;
        const current = getSidebarForTab(tabId);
        const tab = document.querySelector('.tab[data-tab="' + tabId + '"]');
        const panel = document.getElementById('panel-' + tabId);
        if (!tab || !panel) return;

        const sourceTabs = current === 'primary' ? els.tabsPrimary : els.tabsSecondary;
        const destTabs = targetSidebar === 'primary' ? els.tabsPrimary : els.tabsSecondary;
        const destPanels = targetSidebar === 'primary' ? els.sidebarPanelsPrimary : els.sidebarPanelsSecondary;
        const wasActive = tab.classList.contains('active');

        if (insertBeforeTab && insertBeforeTab.parentElement !== destTabs) insertBeforeTab = null;
        if (insertBeforeTab === tab) insertBeforeTab = tab.nextElementSibling;
        if (insertBeforeTab && insertBeforeTab.dataset && insertBeforeTab.dataset.tab === tabId) return;

        if (insertBeforeTab) {
          destTabs.insertBefore(tab, insertBeforeTab);
        } else {
          destTabs.appendChild(tab);
        }
        syncPanelOrder(destTabs, destPanels);

        updatePaneLayout();
        updateTabGridCounts();

        if (wasActive && current !== targetSidebar) {
          const remaining = Array.from(sourceTabs.querySelectorAll('.tab'));
          if (remaining.length) activateTab(remaining[0].dataset.tab);
        }

        if (opts.activate) {
          activateTab(tabId);
        } else if (opts.save) {
          saveSidebarLayout();
        }

        if (state.zoomMode === 'fit') { fitPreviewZoom(); renderPreview(); }
      }

      function moveTabToSidebar(tabId, target, options) {
        placeTabAt(tabId, target, null, options);
      }

      function restoreAllTabsToPrimary() {
        Array.from(els.tabsSecondary.querySelectorAll('.tab')).forEach((tab) => {
          moveTabToSidebar(tab.dataset.tab, 'primary', { save: false, activate: false });
        });
        if (state.primaryActiveTab) activateTab(state.primaryActiveTab);
        saveSidebarLayout();
      }

      function updateSplitDropZones() {
        if (!els.sidebarPrimary || !els.splitDropPrimary || !els.splitDropSecondary) return;

        const primaryRect = els.sidebarPrimary.getBoundingClientRect();
        const secondaryW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--secondary-sidebar-width'), 10) || 280;

        els.splitDropPrimary.style.left = primaryRect.left + 'px';
        els.splitDropPrimary.style.width = primaryRect.width + 'px';

        if (hasSecondarySidebar()) {
          const secondaryRect = els.sidebarSecondary.getBoundingClientRect();
          els.splitDropSecondary.style.left = secondaryRect.left + 'px';
          els.splitDropSecondary.style.width = secondaryRect.width + 'px';
        } else {
          els.splitDropSecondary.style.left = primaryRect.right + 'px';
          els.splitDropSecondary.style.width = secondaryW + 'px';
        }
      }

      function restoreSidebarLayout() {
        if (SPLIT_MOBILE_MQ.matches) return;
        try {
          const data = readSidebarLayout();
          if (!data) {
            saveSidebarLayout();
            return;
          }

          if (Array.isArray(data.secondary)) {
            data.secondary.forEach((tabId) => {
              if (document.querySelector('.tab[data-tab="' + tabId + '"]') && getSidebarForTab(tabId) === 'primary') {
                moveTabToSidebar(tabId, 'secondary', { save: false, activate: false });
              }
            });
          }

          if (Array.isArray(data.primary)) {
            applyTabOrder(els.tabsPrimary, els.sidebarPanelsPrimary, data.primary);
          }
          if (Array.isArray(data.secondary)) {
            applyTabOrder(els.tabsSecondary, els.sidebarPanelsSecondary, data.secondary);
          }

          updatePaneLayout();
          updateTabGridCounts();

          if (data.primaryActive && getSidebarForTab(data.primaryActive) === 'primary') {
            activateTab(data.primaryActive);
          } else if (els.tabsPrimary.querySelector('.tab.active')) {
            state.primaryActiveTab = els.tabsPrimary.querySelector('.tab.active').dataset.tab;
          }
          if (data.secondaryActive && getSidebarForTab(data.secondaryActive) === 'secondary') {
            activateTab(data.secondaryActive);
          }
        } catch (_) {
          saveSidebarLayout();
        }
      }

      function resolveTabDropTarget(x, y, dragTabId) {
        const bars = [
          { sidebar: 'primary', el: els.tabsPrimary, sidebarEl: els.sidebarPrimary },
          { sidebar: 'secondary', el: els.tabsSecondary, sidebarEl: els.sidebarSecondary },
        ];

        for (const bar of bars) {
          if (bar.sidebar === 'secondary' && !hasSecondarySidebar() && bar.el.querySelectorAll('.tab').length === 0) continue;
          const rect = bar.el.getBoundingClientRect();
          if (rect.height <= 0) continue;
          if (y < rect.top || y > rect.bottom || x < rect.left || x > rect.right) continue;

          const tabs = Array.from(bar.el.querySelectorAll('.tab')).filter((t) => t.dataset.tab !== dragTabId);
          let insertBeforeTab = null;
          for (const tab of tabs) {
            const tabRect = tab.getBoundingClientRect();
            if (x < tabRect.left + tabRect.width / 2) {
              insertBeforeTab = tab;
              break;
            }
          }
          return { sidebar: bar.sidebar, insertBeforeTab, inTabBar: true };
        }

        const primaryRect = els.sidebarPrimary.getBoundingClientRect();
        if (x >= primaryRect.left && x <= primaryRect.right && y >= primaryRect.top && y <= primaryRect.bottom) {
          return { sidebar: 'primary', insertBeforeTab: null, inTabBar: false };
        }

        if (hasSecondarySidebar()) {
          const secondaryRect = els.sidebarSecondary.getBoundingClientRect();
          if (x >= secondaryRect.left && x <= secondaryRect.right && y >= secondaryRect.top && y <= secondaryRect.bottom) {
            return { sidebar: 'secondary', insertBeforeTab: null, inTabBar: false };
          }
        } else {
          const secondaryW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--secondary-sidebar-width'), 10) || 280;
          const ghostLeft = primaryRect.right;
          if (x >= ghostLeft && x <= ghostLeft + secondaryW && y >= primaryRect.top && y <= primaryRect.bottom) {
            return { sidebar: 'secondary', insertBeforeTab: null, inTabBar: false };
          }
        }

        return null;
      }

      function render() {
        renderSettings();
        updatePageStructureUI();
        refreshPreview();
      }

      (function setupTabSplit() {
        if (!els.sidebarSecondary || !els.splitDropOverlay) return;

        updateTabGridCounts();
        updateSplitDropZones();

        const DRAG_THRESHOLD = 8;
        let tabDrag = null;
        let suppressTabClick = false;

        function setDragMode(on) {
          document.querySelectorAll('.tab').forEach((tab) => {
            tab.classList.toggle('is-tab-draggable', on && !SPLIT_MOBILE_MQ.matches);
          });
        }

        function showDropOverlay(show) {
          els.splitDropOverlay.classList.toggle('is-active', show);
          els.splitDropOverlay.setAttribute('aria-hidden', show ? 'false' : 'true');
          if (!show) {
            els.splitDropPrimary.classList.remove('is-hovered');
            els.splitDropSecondary.classList.remove('is-hovered');
          }
        }

        function isTabDragVisualActive() {
          return document.body.classList.contains('is-tab-dragging')
            || (els.tabDragGhost && els.tabDragGhost.classList.contains('is-visible'));
        }

        function clearTabDragVisuals() {
          document.querySelectorAll('.tab.is-drag-source, .tab.is-dragging').forEach((tab) => {
            tab.classList.remove('is-drag-source', 'is-dragging');
          });
          if (els.tabDragGhost) {
            els.tabDragGhost.classList.remove('is-visible', 'is-lifted');
            els.tabDragGhost.style.left = '';
            els.tabDragGhost.style.top = '';
            els.tabDragGhost.style.width = '';
            els.tabDragGhost.textContent = '';
            els.tabDragGhost.setAttribute('aria-hidden', 'true');
          }
          if (els.tabInsertIndicator) {
            els.tabInsertIndicator.classList.remove('is-visible');
            els.tabInsertIndicator.setAttribute('aria-hidden', 'true');
          }
          els.sidebarPrimary.classList.remove('is-drop-target');
          els.sidebarSecondary.classList.remove('is-drop-target');
          document.body.classList.remove('is-tab-dragging');
          document.body.style.userSelect = '';
        }

        function highlightSidebarDropTarget(drop) {
          els.sidebarPrimary.classList.toggle('is-drop-target', !!(drop && drop.sidebar === 'primary'));
          els.sidebarSecondary.classList.toggle('is-drop-target', !!(drop && drop.sidebar === 'secondary'));
        }

        function updateInsertIndicator(drop) {
          if (!els.tabInsertIndicator || !drop || !drop.inTabBar) {
            if (els.tabInsertIndicator) {
              els.tabInsertIndicator.classList.remove('is-visible');
              els.tabInsertIndicator.setAttribute('aria-hidden', 'true');
            }
            return;
          }

          const destTabs = drop.sidebar === 'primary' ? els.tabsPrimary : els.tabsSecondary;
          let x;
          let top;
          let height;

          if (drop.insertBeforeTab) {
            const rect = drop.insertBeforeTab.getBoundingClientRect();
            x = rect.left;
            top = rect.top;
            height = rect.height;
          } else {
            const tabs = destTabs.querySelectorAll('.tab:not(.is-drag-source)');
            if (tabs.length) {
              const rect = tabs[tabs.length - 1].getBoundingClientRect();
              x = rect.right;
              top = rect.top;
              height = rect.height;
            } else {
              const rect = destTabs.getBoundingClientRect();
              x = rect.left + 12;
              top = rect.top;
              height = rect.height;
            }
          }

          els.tabInsertIndicator.style.left = (x - 1) + 'px';
          els.tabInsertIndicator.style.top = top + 'px';
          els.tabInsertIndicator.style.height = height + 'px';
          els.tabInsertIndicator.classList.add('is-visible');
          els.tabInsertIndicator.setAttribute('aria-hidden', 'false');
        }

        function updateTabDragGhost(x, y) {
          if (!tabDrag || !els.tabDragGhost) return;
          els.tabDragGhost.style.left = (x - tabDrag.offsetX) + 'px';
          els.tabDragGhost.style.top = (y - tabDrag.offsetY) + 'px';
          const lifted = y > tabDrag.startY + 12;
          els.tabDragGhost.classList.toggle('is-lifted', lifted);
        }

        function startTabDragVisuals(e) {
          const rect = tabDrag.tab.getBoundingClientRect();
          tabDrag.offsetX = e.clientX - rect.left;
          tabDrag.offsetY = e.clientY - rect.top;

          tabDrag.tab.classList.add('is-drag-source', 'is-dragging');
          document.body.classList.add('is-tab-dragging');
          document.body.style.userSelect = 'none';

          els.tabDragGhost.textContent = tabDrag.tab.textContent.trim();
          els.tabDragGhost.style.width = rect.width + 'px';
          els.tabDragGhost.classList.add('is-visible');
          els.tabDragGhost.setAttribute('aria-hidden', 'false');
          updateTabDragGhost(e.clientX, e.clientY);

          try { tabDrag.tab.setPointerCapture(e.pointerId); } catch (_) {}
        }

        function endTabDragSession(drag, e) {
          if (!drag || !drag.active) {
            if (isTabDragVisualActive()) clearTabDragVisuals();
            return;
          }

          const drop = resolveTabDropTarget(e.clientX, e.clientY, drag.tabId);
          suppressTabClick = true;
          clearTabDragVisuals();

          if (drag.tab) {
            try { drag.tab.releasePointerCapture(e.pointerId); } catch (_) {}
          }

          if (drop) placeTabAt(drag.tabId, drop.sidebar, drop.insertBeforeTab);
        }

        function finishTabDrag(e) {
          if (!tabDrag) {
            if (isTabDragVisualActive()) clearTabDragVisuals();
            return;
          }
          if (tabDrag.pointerId !== e.pointerId) {
            if (tabDrag.active) {
              const drag = tabDrag;
              tabDrag = null;
              endTabDragSession(drag, e);
            }
            return;
          }
          const drag = tabDrag;
          tabDrag = null;
          endTabDragSession(drag, e);
        }

        function onTabPointerDown(e) {
          const tab = e.target.closest('.tab');
          if (!tab || SPLIT_MOBILE_MQ.matches || e.button !== 0) return;
          tabDrag = {
            tab,
            tabId: tab.dataset.tab,
            pointerId: e.pointerId,
            startX: e.clientX,
            startY: e.clientY,
            active: false,
          };
        }

        function onTabClick(e) {
          const tab = e.target.closest('.tab');
          if (!tab) return;
          if (suppressTabClick) {
            suppressTabClick = false;
            e.preventDefault();
            return;
          }
          activateTab(tab.dataset.tab);
        }

        els.tabsPrimary.addEventListener('pointerdown', onTabPointerDown);
        els.tabsSecondary.addEventListener('pointerdown', onTabPointerDown);
        els.tabsPrimary.addEventListener('click', onTabClick);
        els.tabsSecondary.addEventListener('click', onTabClick);

        window.addEventListener('pointermove', (e) => {
          if (!tabDrag || tabDrag.pointerId !== e.pointerId) return;
          const dist = Math.hypot(e.clientX - tabDrag.startX, e.clientY - tabDrag.startY);
          if (!tabDrag.active) {
            if (dist < DRAG_THRESHOLD) return;
            tabDrag.active = true;
            startTabDragVisuals(e);
          }
          updateTabDragGhost(e.clientX, e.clientY);
          const drop = resolveTabDropTarget(e.clientX, e.clientY, tabDrag.tabId);
          updateInsertIndicator(drop);
          highlightSidebarDropTarget(drop);
        });

        window.addEventListener('pointerup', finishTabDrag, true);
        window.addEventListener('pointercancel', finishTabDrag, true);

        window.addEventListener('blur', () => {
          if (!tabDrag || !tabDrag.active) return;
          const drag = tabDrag;
          tabDrag = null;
          endTabDragSession(drag, { clientX: drag.startX, clientY: drag.startY, pointerId: drag.pointerId });
        });

        window.addEventListener('resize', () => {
          setDragMode(true);
          updateSplitDropZones();
          if (SPLIT_MOBILE_MQ.matches && hasSecondarySidebar()) {
            restoreAllTabsToPrimary();
          }
        });

        SPLIT_MOBILE_MQ.addEventListener('change', () => {
          setDragMode(true);
          if (SPLIT_MOBILE_MQ.matches && hasSecondarySidebar()) {
            restoreAllTabsToPrimary();
          }
        });

        setDragMode(true);
      })();

      els.editor.addEventListener('input', () => {
        scheduleTextRender();
        scheduleSaveDraft();
      });

      [els.colophonTitle, els.colophonAuthor, els.colophonPublisher, els.colophonPrinter, els.colophonEmail, els.colophonWebsite].forEach((input) => {
        input.addEventListener('input', () => {
          updatePageStructureUI();
          scheduleSaveDraft();
          refreshPreview();
        });
      });

      els.colophonDate.addEventListener('click', openColophonDatePicker);
      els.colophonDatePicker.addEventListener('change', syncColophonDateFromPicker);
      els.colophonDatePicker.addEventListener('input', syncColophonDateFromPicker);

      els.tocAddRow.addEventListener('click', addTocRow);
      els.tocImportChapters.addEventListener('click', importChaptersFromManuscript);

      els.importBtn.addEventListener('click', () => els.importFile.click());

      els.importFile.addEventListener('change', async () => {
        const file = els.importFile.files[0];
        els.importFile.value = '';
        if (!file) return;

        const name = file.name.toLowerCase();
        if (!name.endsWith('.txt') && !name.endsWith('.md') && file.type && !file.type.startsWith('text/')) {
          alert('.txt または .md ファイルを選んでください。');
          return;
        }

        try {
          const text = await file.text();
          els.editor.value = text;
          saveDraft();
          render();
        } catch (_) {
          alert('ファイルの読み込みに失敗しました。');
        }
      });

      els.zoomSlider.addEventListener('input', () => {
        applyManualZoom(Number(els.zoomSlider.value));
      });

      els.zoomOutBtn.addEventListener('click', () => stepZoom(-ZOOM_STEP));
      els.zoomInBtn.addEventListener('click', () => stepZoom(ZOOM_STEP));

      let pinchStartZoom = 1;
      els.previewScroll.addEventListener('wheel', (e) => {
        if (!e.ctrlKey) return;
        e.preventDefault();
        const factor = Math.exp(-e.deltaY * 0.01);
        setManualZoomRatio(state.zoom * factor);
        schedulePinchSave();
      }, { passive: false });

      els.previewScroll.addEventListener('gesturestart', (e) => {
        e.preventDefault();
        pinchStartZoom = state.zoom;
      }, { passive: false });

      els.previewScroll.addEventListener('gesturechange', (e) => {
        e.preventDefault();
        setManualZoomRatio(pinchStartZoom * e.scale);
        schedulePinchSave();
      }, { passive: false });

      els.previewScroll.addEventListener('gestureend', (e) => {
        e.preventDefault();
        saveDraft();
      }, { passive: false });

      els.zoomFitBtn.addEventListener('click', () => {
        state.zoomMode = 'fit';
        fitPreviewZoom();
        saveDraft();
        renderPreview();
      });

      els.zoomActualBtn.addEventListener('click', () => {
        state.zoomMode = 'actual';
        state.zoom = 1;
        updateZoomUI();
        saveDraft();
        renderPreview();
      });

      els.previewViewBtns.forEach((btn) => {
        btn.addEventListener('click', () => setPreviewView(btn.dataset.previewView));
      });

      PAGE_SPACER_INPUTS.forEach((id) => {
        els[id].addEventListener('input', commitPageSpacers);
      });

      document.querySelectorAll('.page-blank-step').forEach((btn) => {
        btn.addEventListener('click', () => {
          stepPageSpacer(btn.dataset.spacer, Number(btn.dataset.delta));
        });
      });

      els.chapterModeSelect.addEventListener('change', () => {
        state.chapterMode = els.chapterModeSelect.value;
        saveDraft();
        render();
      });

      els.fontSizeSlider.addEventListener('input', () => {
        state.fontSizePt = Number(els.fontSizeSlider.value);
        updateSpacingUI();
        saveDraft();
        render();
      });

      els.tocFontSizeSlider.addEventListener('input', () => {
        state.tocFontSizePt = Number(els.tocFontSizeSlider.value);
        updateTocFontSizeUI();
        saveDraft();
        render();
      });

      els.lineHeightSlider.addEventListener('input', () => {
        state.lineHeightH = snapLineHeightH(Number(els.lineHeightSlider.value));
        updateSpacingUI();
        saveDraft();
        render();
      });

      els.letterSpacingSlider.addEventListener('input', () => {
        state.letterSpacing = Number(els.letterSpacingSlider.value) / 100;
        updateSpacingUI();
        saveDraft();
        render();
      });

      window.addEventListener('resize', () => {
        if (state.zoomMode !== 'fit') return;
        fitPreviewZoom();
        renderPreview();
      });

      if (typeof ResizeObserver !== 'undefined') {
        const previewResizeObserver = new ResizeObserver(() => {
          if (state.zoomMode !== 'fit') return;
          fitPreviewZoom();
          renderPreview();
        });
        previewResizeObserver.observe(els.previewScroll);
      }

      window.addEventListener('pagehide', flushPending);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') flushPending();
      });

      function exportTitleLine() {
        return (els.editor.value.split('\n').find((l) => l.trim()) || '無題').trim();
      }

      function exportLayoutOptions() {
        return {
          nonbulePosition: state.nonbulePosition,
          lineHeightH: state.lineHeightH,
          letterSpacing: state.letterSpacing,
          columnCount: effectiveColumnCount(),
          writingDirection: state.writingDirection,
          tocFontSizePt: effectiveTocFontSizePt(),
        };
      }

      async function runExport(btn, run) {
        flushPending();
        if (!state.layout.pageCount) return;
        const original = btn.textContent;
        els.btnExportPdf.disabled = true;
        btn.textContent = '出力準備中…';
        try {
          await run();
        } catch (err) {
          console.error(err);
          throw err;
        } finally {
          btn.textContent = original;
          els.btnExportPdf.disabled = !state.layout.pageCount;
        }
      }

      async function handleExportPdf() {
        try {
          await runExport(els.btnExportPdf, () => exportPrint(
            state.layout, activeFormat(), effectiveFont(), currentBleedMm(), exportTitleLine(),
            exportLayoutOptions()
          ));
        } catch (err) {
          alert('PDFの生成に失敗しました。');
        }
      }

      els.btnExportPdf.addEventListener('click', () => handleExportPdf());
      els.btnClear.addEventListener('click', clearAll);

      (function setupMobilePane() {
        const MOBILE_MQ = window.matchMedia('(max-width: 860px)');
        const MOBILE_KEY = 'nyuko-mobile-pane';
        const paneBtns = document.querySelectorAll('.mobile-pane-btn');

        function isMobileLayout() {
          return MOBILE_MQ.matches;
        }

        function setMobilePane(pane, options) {
          const opts = options || {};
          document.body.dataset.mobilePane = pane;
          paneBtns.forEach((btn) => {
            const active = btn.dataset.mobilePane === pane;
            btn.classList.toggle('active', active);
            btn.setAttribute('aria-selected', active ? 'true' : 'false');
          });
          if (opts.save !== false) {
            try { localStorage.setItem(MOBILE_KEY, pane); } catch (_) {}
          }
          if (isMobileLayout() && pane === 'preview') {
            if (state.zoomMode === 'fit') fitPreviewZoom();
            renderPreview();
          }
        }

        paneBtns.forEach((btn) => {
          btn.addEventListener('click', () => setMobilePane(btn.dataset.mobilePane));
        });

        try {
          const saved = localStorage.getItem(MOBILE_KEY);
          if (saved === 'edit' || saved === 'preview') {
            setMobilePane(saved, { save: false });
          } else {
            setMobilePane('edit', { save: false });
          }
        } catch (_) {
          setMobilePane('edit', { save: false });
        }

        MOBILE_MQ.addEventListener('change', () => {
          if (isMobileLayout() && document.body.dataset.mobilePane === 'preview' && state.zoomMode === 'fit') {
            fitPreviewZoom();
            renderPreview();
          }
        });
      })();

      (function setupPaneResizers() {
        if (!els.resizerWorkspace) return;

        const RESIZER_W = 8;
        const PRIMARY_KEY = 'nyuko-sidebar-width';
        const SECONDARY_KEY = 'nyuko-secondary-sidebar-width';
        const PRIMARY_DEFAULT = 360;
        const SECONDARY_DEFAULT = 280;
        const PRIMARY_MIN = 220;
        const SECONDARY_MIN = 200;

        function getPrimaryWidth() {
          return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-width'), 10) || PRIMARY_DEFAULT;
        }

        function getSecondaryWidth() {
          return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--secondary-sidebar-width'), 10) || SECONDARY_DEFAULT;
        }

        function maxPrimaryWidth() {
          return Math.min(560, Math.round(window.innerWidth * 0.55));
        }

        function maxSecondaryWidth() {
          const mainRect = els.main.getBoundingClientRect();
          const resizerCount = hasSecondarySidebar() ? 2 : 1;
          const reserved = getPrimaryWidth() + RESIZER_W * resizerCount + 280;
          return Math.min(480, Math.max(SECONDARY_MIN, Math.round(mainRect.width - reserved)));
        }

        function applyPrimaryWidth(px) {
          const w = Math.max(PRIMARY_MIN, Math.min(maxPrimaryWidth(), Math.round(px)));
          document.documentElement.style.setProperty('--sidebar-width', w + 'px');
          return w;
        }

        function applySecondaryWidth(px) {
          const w = Math.max(SECONDARY_MIN, Math.min(maxSecondaryWidth(), Math.round(px)));
          document.documentElement.style.setProperty('--secondary-sidebar-width', w + 'px');
          return w;
        }

        function afterResize() {
          if (state.zoomMode === 'fit') { fitPreviewZoom(); renderPreview(); }
        }

        try {
          const savedPrimary = Number(localStorage.getItem(PRIMARY_KEY));
          if (Number.isFinite(savedPrimary) && savedPrimary >= PRIMARY_MIN) applyPrimaryWidth(savedPrimary);
          else applyPrimaryWidth(PRIMARY_DEFAULT);
        } catch (_) {
          applyPrimaryWidth(PRIMARY_DEFAULT);
        }

        try {
          const savedSecondary = Number(localStorage.getItem(SECONDARY_KEY));
          if (Number.isFinite(savedSecondary) && savedSecondary >= SECONDARY_MIN) applySecondaryWidth(savedSecondary);
          else applySecondaryWidth(SECONDARY_DEFAULT);
        } catch (_) {
          applySecondaryWidth(SECONDARY_DEFAULT);
        }

        function bindResizer(resizerEl, onDrag, onSave) {
          if (!resizerEl) return;
          let dragging = false;

          function onMove(e) {
            if (!dragging) return;
            onDrag(e);
          }

          function onUp() {
            if (!dragging) return;
            dragging = false;
            resizerEl.classList.remove('dragging');
            document.body.style.userSelect = '';
            document.body.style.cursor = '';
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
            onSave();
            afterResize();
          }

          resizerEl.addEventListener('pointerdown', (e) => {
            dragging = true;
            resizerEl.classList.add('dragging');
            document.body.style.userSelect = 'none';
            document.body.style.cursor = 'col-resize';
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onUp);
            e.preventDefault();
          });
        }

        bindResizer(els.resizerPrimarySecondary, (e) => {
          const mainRect = els.main.getBoundingClientRect();
          applyPrimaryWidth(e.clientX - mainRect.left);
        }, () => {
          try { localStorage.setItem(PRIMARY_KEY, String(getPrimaryWidth())); } catch (_) {}
        });

        bindResizer(els.resizerWorkspace, (e) => {
          const mainRect = els.main.getBoundingClientRect();
          if (hasSecondarySidebar()) {
            applySecondaryWidth(e.clientX - mainRect.left - getPrimaryWidth() - RESIZER_W);
          } else {
            applyPrimaryWidth(e.clientX - mainRect.left);
          }
        }, () => {
          try {
            if (hasSecondarySidebar()) {
              localStorage.setItem(SECONDARY_KEY, String(getSecondaryWidth()));
            } else {
              localStorage.setItem(PRIMARY_KEY, String(getPrimaryWidth()));
            }
          } catch (_) {}
        });
      })();

      loadDraft();
      buildChapterModeSelect();
      els.previewViewBtns.forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.previewView === state.previewView);
      });
      updateZoomUI();
      if (!state.fontSizePt) state.fontSizePt = currentFont().size;
      if (!state.tocFontSizePt) state.tocFontSizePt = effectiveFont().size;
      updateSpacingUI();
      updateTocFontSizeUI();
      updatePageSpacersUI();
      renderTocList();
      render();
      restoreSidebarLayout();

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => render());
      }
    })();
  </script>
  <script src="../shared/site-link.js"></script>
</body>
