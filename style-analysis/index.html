<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HN5C12BJ0W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HN5C12BJ0W');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="8つの質問に答えて、自分の執筆スタイルタイプを診断する無料Webツール。結果をXでシェアできます。">
  <title>執筆スタイル診断 — あなたの執筆タイプは？ | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/site-link.css">
  <style>
    :root {
      --bg: #faf8f2;
      --ink: #1a1814;
      --muted: #403a34;
      --border: #1a1814;
      --surface: #fff;
      --accent: #3d5a4a;
      --accent-soft: #dce8e0;
      --gold: #6b8f71;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.65;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 5rem;
    }

    .lead {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.8;
      margin-top: 0.5rem;
    }

    .panel {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: var(--surface);
      border: 2px solid var(--border);
    }

    .panel-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
    }

    .btn:hover:not(:disabled) {
      background: var(--ink);
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--ink);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn-block {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 0.88rem;
    }

    .btn-share svg {
      width: 0.9rem;
      height: 0.9rem;
      fill: currentColor;
    }

    .progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .progress-bar {
      flex: 1;
      height: 0.35rem;
      background: var(--accent-soft);
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .question-text {
      font-size: clamp(1.05rem, 3.5vw, 1.25rem);
      font-weight: 900;
      line-height: 1.55;
      margin-bottom: 1.25rem;
    }

    .choices {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      padding: 0.85rem 1rem;
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.55;
      letter-spacing: 0;
    }

    .result-top {
      text-align: center;
      padding: 0.5rem 0 1.25rem;
      border-bottom: 1px dashed #ccc4b8;
      margin-bottom: 1.25rem;
    }

    .result-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .result-type {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .result-name {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 900;
      line-height: 1.35;
    }

    .result-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .result-blurb {
      font-size: 0.9rem;
      line-height: 1.85;
      text-align: left;
      margin-top: 1rem;
    }

    .tool-picks {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px dashed #ccc4b8;
    }

    .tool-pick-grid {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .tool-pick-card {
      display: block;
      padding: 0.85rem 0.95rem;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--ink);
      text-decoration: none;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .tool-pick-card:hover {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .tool-pick-title {
      display: block;
      font-size: 0.92rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      margin-bottom: 0.35rem;
    }

    .tool-pick-about {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.65;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .tool-pick-card:hover .tool-pick-about {
      color: rgba(255, 255, 255, 0.78);
    }

    .tool-pick-point {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.65;
      color: var(--accent);
    }

    .tool-pick-card:hover .tool-pick-point {
      color: rgba(255, 255, 255, 0.92);
    }

    .traits {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-top: 0.85rem;
    }

    .trait {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.3rem 0.55rem;
      border: 1px solid var(--border);
      background: var(--accent-soft);
    }

    .axis-chart {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
    }

    .axis-pie {
      width: min(220px, 72vw);
      height: auto;
      display: block;
      border: 2px solid var(--border);
      background: var(--bg);
    }

    .axis-slice {
      stroke: var(--surface);
      stroke-width: 1.5;
    }

    .axis-legend {
      list-style: none;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 0.85rem;
    }

    .axis-legend-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.78rem;
      font-weight: 700;
      min-width: 0;
    }

    .axis-swatch {
      width: 0.65rem;
      height: 0.65rem;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .axis-legend-label {
      flex: 1;
      min-width: 0;
    }

    .axis-legend-pct {
      color: var(--muted);
      font-weight: 700;
      flex-shrink: 0;
    }

    .cross-banner {
      display: block;
      margin-top: 1.25rem;
      padding: 1rem 1.1rem;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--ink);
      text-decoration: none;
      text-align: center;
    }

    .cross-banner-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #6b4c2a;
      margin-bottom: 0.35rem;
    }

    .cross-banner-title {
      display: block;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.03em;
    }

    .cross-banner-desc {
      display: block;
      margin-top: 0.35rem;
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .result-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.55rem;
      margin: 1.25rem 0;
    }

    .view[hidden] { display: none !important; }

    @media (max-width: 520px) {
      .axis-legend {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" href="../shared/site-typography.css">
  <link rel="stylesheet" href="../shared/share-button.css">
</head>
<body>
  <div class="app">
    <header>
      <h1 class="page-title"><a class="brand-home" href="../">tadeku-tools</a><span class="brand-sep"> / </span>執筆スタイル診断</h1>
      <p class="lead">8つの質問に答えると、あなたの執筆タイプがわかります。構成派か、直感派か、人物重視か——執筆の傾向をチェックしてみましょう。</p>
    </header>

    <section class="panel view" id="view-start">
      <div class="start-actions">
        <button type="button" class="btn btn-primary btn-block" id="start-btn">はじめる</button>
      </div>
    </section>

    <section class="panel view" id="view-quiz" hidden>
      <div class="progress">
        <span id="progress-label">1 / 8</span>
        <div class="progress-bar" aria-hidden="true"><div class="progress-fill" id="progress-fill" style="width:12.5%"></div></div>
      </div>
      <h2 class="question-text" id="question-text"></h2>
      <ul class="choices" id="choices"></ul>
    </section>

    <div class="view" id="view-result-wrap" hidden aria-live="polite">
      <section class="panel" id="view-result">
        <h2 class="panel-title">診断結果</h2>
        <div class="result-top" id="result-top"></div>
        <div class="result-actions">
          <button type="button" class="btn btn-share" id="share-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Xでシェア
          </button>
          <button type="button" class="btn" id="retry-btn">もう一度</button>
        </div>
        <h3 class="panel-title">あなたの傾向</h3>
        <div class="axis-chart" id="axis-chart"></div>
        <div id="tool-picks"></div>
      </section>
      <a class="cross-banner" href="../bungo-analysis/">
        <span class="cross-banner-label">次はこちら</span>
        <span class="cross-banner-title">文豪診断で遊ぶ →</span>
        <span class="cross-banner-desc">8つの質問で、あなたに近い文豪タイプを診断</span>
      </a>
    </div>
  </div>

  <script src="../shared/style-quiz-data.js"></script>
  <script src="../shared/style-quiz-engine.js"></script>
  <script>
    const SHARE_URL = 'https://tools.tadeku.net/style-analysis/';
    const QUESTIONS = window.StyleQuizData.QUESTIONS;
    const DIMENSION_LABELS = window.StyleQuizData.DIMENSION_LABELS;
    const AXIS_COLORS = {
      structure: '#3d5a4a',
      character: '#6b8f71',
      world: '#5a7a8a',
      prose: '#8a7348',
      intuition: '#7a688a',
      theme: '#8a5a58',
    };

    const els = {
      viewStart: document.getElementById('view-start'),
      viewQuiz: document.getElementById('view-quiz'),
      viewResult: document.getElementById('view-result-wrap'),
      startBtn: document.getElementById('start-btn'),
      progressLabel: document.getElementById('progress-label'),
      progressFill: document.getElementById('progress-fill'),
      questionText: document.getElementById('question-text'),
      choices: document.getElementById('choices'),
      resultTop: document.getElementById('result-top'),
      axisChart: document.getElementById('axis-chart'),
      toolPicks: document.getElementById('tool-picks'),
      shareBtn: document.getElementById('share-btn'),
      retryBtn: document.getElementById('retry-btn'),
    };

    let step = 0;
    let answers = [];
    let lastTop = null;

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showView(name) {
      els.viewStart.hidden = name !== 'start';
      els.viewQuiz.hidden = name !== 'quiz';
      els.viewResult.hidden = name !== 'result';
    }

    function resetQuiz() {
      step = 0;
      answers = [];
      lastTop = null;
      els.toolPicks.innerHTML = '';
      showView('start');
    }

    function startQuiz() {
      step = 0;
      answers = [];
      showView('quiz');
      renderQuestion();
    }

    function renderQuestion() {
      const q = QUESTIONS[step];
      const total = QUESTIONS.length;
      els.progressLabel.textContent = (step + 1) + ' / ' + total;
      els.progressFill.style.width = ((step + 1) / total * 100) + '%';
      els.questionText.textContent = q.text;
      els.choices.innerHTML = q.choices.map((choice, i) =>
        '<li><button type="button" class="btn choice-btn" data-index="' + i + '">' + esc(choice.text) + '</button></li>'
      ).join('');

      els.choices.querySelectorAll('.choice-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const index = Number(btn.dataset.index);
          answers.push(q.choices[index]);
          step += 1;
          if (step >= QUESTIONS.length) {
            renderResult();
          } else {
            renderQuestion();
          }
        });
      });
    }

    function polarToCartesian(cx, cy, r, angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function describeSlice(cx, cy, r, startAngle, endAngle) {
      if (endAngle - startAngle >= 359.99) {
        return 'M ' + cx + ' ' + cy + ' m -' + r + ',0 a ' + r + ',' + r + ' 0 1,0 ' + (r * 2) + ',0 a ' + r + ',' + r + ' 0 1,0 -' + (r * 2) + ',0';
      }
      const start = polarToCartesian(cx, cy, r, endAngle);
      const end = polarToCartesian(cx, cy, r, startAngle);
      const largeArc = endAngle - startAngle > 180 ? 1 : 0;
      return 'M ' + cx + ' ' + cy +
        ' L ' + start.x + ' ' + start.y +
        ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 0 ' + end.x + ' ' + end.y +
        ' Z';
    }

    function renderAxisChart(userAxis) {
      const sorted = userAxis.slice().sort((a, b) => b.value - a.value);
      const total = sorted.reduce((sum, item) => sum + item.value, 0);
      const cx = 100;
      const cy = 100;
      const r = 82;
      let angle = 0;
      let slices = '';
      let legend = '';

      if (total <= 0) {
        slices = '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="#dce8e0" />';
      } else {
        sorted.forEach((item) => {
          const sweep = (item.value / total) * 360;
          if (sweep <= 0) return;
          const color = AXIS_COLORS[item.key] || '#3d5a4a';
          const label = DIMENSION_LABELS[item.key];
          const pct = Math.round((item.value / total) * 100);
          slices += '<path class="axis-slice" fill="' + color + '" d="' + describeSlice(cx, cy, r, angle, angle + sweep) + '">' +
            '<title>' + esc(label) + ' ' + pct + '%</title></path>';
          angle += sweep;
          legend += '<li class="axis-legend-item">' +
            '<span class="axis-swatch" style="background:' + color + '"></span>' +
            '<span class="axis-legend-label">' + esc(label) + '</span>' +
            '<span class="axis-legend-pct">' + pct + '%</span>' +
            '</li>';
        });
      }

      els.axisChart.innerHTML =
        '<svg class="axis-pie" viewBox="0 0 200 200" role="img" aria-label="執筆傾向の円グラフ">' +
          slices +
        '</svg>' +
        '<ul class="axis-legend">' + legend + '</ul>';
    }

    function renderToolPicks(picks) {
      if (!picks || !picks.length) {
        els.toolPicks.innerHTML = '';
        return;
      }
      els.toolPicks.innerHTML =
        '<div class="tool-picks">' +
          '<h3 class="panel-title">tadeku-toolsのおすすめ</h3>' +
          '<div class="tool-pick-grid">' +
            picks.map((pick) =>
              '<a class="tool-pick-card" href="' + esc(pick.href) + '">' +
                '<span class="tool-pick-title">' + esc(pick.title) + '</span>' +
                '<span class="tool-pick-about">' + esc(pick.about) + '</span>' +
                '<span class="tool-pick-point">' + esc(pick.point) + '</span>' +
              '</a>'
            ).join('') +
          '</div>' +
        '</div>';
    }

    function renderResult() {
      const { userAxis, top } = window.StyleQuizEngine.rankTypes(answers);
      lastTop = top;

      els.resultTop.innerHTML =
        '<p class="result-label">あなたの執筆スタイル</p>' +
        '<p class="result-type">' + esc(top.typeName) + '</p>' +
        '<p class="result-name">' + esc(top.name) + '</p>' +
        '<p class="result-subtitle">' + esc(top.subtitle) + '</p>' +
        '<div class="traits">' +
          top.traits.map((t) => '<span class="trait">' + esc(t) + '</span>').join('') +
        '</div>' +
        '<p class="result-blurb">' + esc(top.blurb) + '</p>';

      renderAxisChart(userAxis);
      renderToolPicks(top.picks);

      showView('result');
      els.viewResult.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function buildShareText(top) {
      return '執筆スタイル診断の結果：' + top.name + 'タイプ（' + top.typeName + '）';
    }

    function openShare() {
      if (!lastTop) return;
      const text = buildShareText(lastTop) + '\n' + SHARE_URL + ' @tadeku_net #TadekuTools';
      const shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
      window.open(shareUrl, '_blank', 'noopener,noreferrer,width=550,height=420');
    }

    els.startBtn.addEventListener('click', startQuiz);
    els.retryBtn.addEventListener('click', resetQuiz);
    els.shareBtn.addEventListener('click', openShare);
  </script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
