<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HN5C12BJ0W"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="改行のつながりを見える化する原稿エディタ。WebやPDFからコピーしたテキストの体裁を整え、小説原稿を仕上げやすくします。">
  <title>Seam — 改行を整えるエディタ | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/editor-title.css">
  <link rel="stylesheet" href="../shared/editor-mobile.css">
  <script src="../shared/editor-mobile-viewport.js"></script>
  <link rel="stylesheet" href="../shared/editor-save-indicator.css">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --border: #000000;
      --surface: #ffffff;
      --highlight: #fde8d0;
      --accent: #e8913a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      flex-shrink: 0;
      border-bottom: 2px solid var(--border);
    }

    .header-stack {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      padding: 0.85rem 1.25rem 0.65rem;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .stats strong {
      font-weight: 900;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0.65rem 1.1rem;
      padding: 0.65rem 1.25rem;
      border-top: 2px solid var(--border);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .toolbar-label {
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .ignore-opt {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .ignore-opt input {
      width: 0.9rem;
      height: 0.9rem;
      margin: 0;
      accent-color: var(--ink);
      cursor: pointer;
    }

    .editor-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .editor-backdrop,
    #editor {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 1.5rem 1.75rem;
      border: none;
      font-family: inherit;
      font-size: 1.05rem;
      line-height: 2;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      overflow: auto;
      resize: none;
    }

    .editor-backdrop {
      pointer-events: none;
      color: transparent;
      background: var(--bg);
      z-index: 1;
    }

    .editor-backdrop .bad-break {
      background: var(--highlight);
      border-radius: 2px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    #editor {
      background: transparent;
      color: var(--ink);
      caret-color: var(--ink);
      outline: none;
      z-index: 2;
    }
  </style>
  <link rel="stylesheet" href="../shared/site-link.css">
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="header-stack">
        <div class="header-top">
          <div class="brand"><a class="brand-home" href="https://tools.tadeku.net/">tadeku-tools</a><span class="brand-sep"> / </span>Seam</div>
          <div class="stats">
            <span class="save-indicator" id="save-indicator"></span>
            <span>不自然な改行 <strong id="break-count">0</strong></span>
          </div>
        </div>
        <input type="text" class="work-title" id="work-title" placeholder="Title" maxlength="60" spellcheck="false">
      </div>
      <div class="toolbar">
        <span class="toolbar-label">検出：</span>
        <label class="ignore-opt"><input type="checkbox" id="detect-comma"><span>読点</span></label>
      </div>
    </header>
    <div class="editor-wrap">
      <div class="editor-backdrop" id="backdrop" aria-hidden="true"></div>
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
  </div>

  <script src="../shared/editor-prefs.js"></script>
  <script src="../shared/editor-library.js"></script>
  <script>
    const SENTENCE_END = /[。！？!?…]$/;
    const COMMA_END = /[、，]$/;
    const DIALOGUE_START = /^[「『]/;
    const HEADING = /^#{2,3}\s/;
    const IGNORE_STORAGE_KEY = 'seam-detect-comma';

    const editor = document.getElementById('editor');
    const workTitle = document.getElementById('work-title');
    const backdrop = document.getElementById('backdrop');
    const breakCountEl = document.getElementById('break-count');
    const saveIndicator = document.getElementById('save-indicator');
    const detectCommaInput = document.getElementById('detect-comma');

    TadekuEditorPrefs.trackEditor('seam');

    const library = TadekuEditorLibrary.createLibrarySession(
      'seam',
      () => ({ title: workTitle.value, body: editor.value }),
      {
        onLoad: ({ title, body }) => {
          workTitle.value = title || '';
          editor.value = body || '';
          render();
        },
        onTitleResolved: (uniqueTitle) => {
          if (document.activeElement !== workTitle) workTitle.value = uniqueTitle;
        },
        onSaved: () => {
          saveIndicator.textContent = '保存済み';
          saveIndicator.classList.add('saved');
        },
        onError: () => {
          saveIndicator.textContent = '保存エラー';
          saveIndicator.classList.remove('saved');
        },
      },
    );

    function scheduleSave() {
      saveIndicator.textContent = '保存中…';
      saveIndicator.classList.remove('saved');
      library.scheduleSave();
    }

    function loadDetectComma() {
      try {
        const saved = JSON.parse(localStorage.getItem(IGNORE_STORAGE_KEY) || 'null');
        if (saved && typeof saved === 'object' && 'detectComma' in saved) {
          return saved.detectComma === true;
        }
        const legacy = JSON.parse(localStorage.getItem('seam-ignore') || 'null');
        if (legacy && typeof legacy === 'object' && 'comma' in legacy) {
          return legacy.comma === false;
        }
      } catch (_) {}
      return false;
    }

    function saveDetectComma(detectComma) {
      localStorage.setItem(IGNORE_STORAGE_KEY, JSON.stringify({ detectComma }));
    }

    function detectCommaBreaks() {
      return detectCommaInput.checked;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function isNaturalBreak(prevLine, nextLine) {
      if (!prevLine.trim() || !nextLine.trim()) return true;
      const trimmed = prevLine.trimEnd();
      if (SENTENCE_END.test(trimmed)) return true;
      if (!detectCommaBreaks() && COMMA_END.test(trimmed)) return true;
      if (/[」』]$/.test(trimmed)) return true;
      if (DIALOGUE_START.test(nextLine.trim())) return true;
      if (HEADING.test(nextLine.trim()) || HEADING.test(prevLine.trim())) return true;
      return false;
    }

    function nextNonEmptyLineIndex(lines, fromIndex) {
      let j = fromIndex + 1;
      while (j < lines.length && !lines[j].text.trim()) j++;
      return j;
    }

    function splitLinesWithPos(text) {
      const lines = [];
      let start = 0;

      for (let i = 0; i < text.length; i++) {
        if (text[i] === '\r' && text[i + 1] === '\n') {
          lines.push({ text: text.slice(start, i), start, end: i });
          i++;
          start = i + 1;
        } else if (text[i] === '\n' || text[i] === '\r') {
          lines.push({ text: text.slice(start, i), start, end: i });
          start = i + 1;
        }
      }

      if (start <= text.length) {
        lines.push({ text: text.slice(start), start, end: text.length });
      }

      return lines;
    }

    function mergeRanges(ranges) {
      if (!ranges.length) return [];
      const sorted = [...ranges].sort((a, b) => a.start - b.start);
      const merged = [{ ...sorted[0] }];
      for (let i = 1; i < sorted.length; i++) {
        const prev = merged[merged.length - 1];
        const curr = sorted[i];
        if (curr.start <= prev.end) {
          prev.end = Math.max(prev.end, curr.end);
        } else {
          merged.push({ ...curr });
        }
      }
      return merged;
    }

    function findBadBreakRanges(text) {
      if (!text) return { ranges: [], count: 0 };

      const lines = splitLinesWithPos(text);
      if (lines.length <= 1) return { ranges: [], count: 0 };

      const charRanges = [];
      let count = 0;

      for (let i = 0; i < lines.length; i++) {
        if (!lines[i].text.trim()) continue;

        const j = nextNonEmptyLineIndex(lines, i);
        if (j >= lines.length) continue;

        if (!isNaturalBreak(lines[i].text, lines[j].text)) {
          count++;
          charRanges.push({ start: lines[i].start, end: lines[j].end });
        }
      }

      return { ranges: mergeRanges(charRanges), count };
    }

    function render() {
      const text = editor.value;
      const { ranges, count } = findBadBreakRanges(text);

      let html = '';
      let cursor = 0;

      for (const { start, end } of ranges) {
        if (cursor < start) {
          html += escapeHtml(text.slice(cursor, start));
        }
        html += `<span class="bad-break">${escapeHtml(text.slice(start, end))}</span>`;
        cursor = end;
      }

      if (cursor < text.length) {
        html += escapeHtml(text.slice(cursor));
      }

      backdrop.innerHTML = html;
      breakCountEl.textContent = count;
    }

    function syncScroll() {
      backdrop.scrollTop = editor.scrollTop;
      backdrop.scrollLeft = editor.scrollLeft;
    }

    workTitle.addEventListener('input', scheduleSave);

    detectCommaInput.addEventListener('change', () => {
      saveDetectComma(detectCommaInput.checked);
      render();
    });

    editor.addEventListener('input', () => {
      render();
      scheduleSave();
    });
    editor.addEventListener('scroll', syncScroll);
    editor.addEventListener('paste', () => {
      setTimeout(() => {
        render();
        scheduleSave();
      }, 0);
    });

    (async () => {
      detectCommaInput.checked = loadDetectComma();
      await library.initFromUrl();
      render();
      editor.focus();
    })();
  </script>
  <script>TadekuEditorMobileViewport.bind({ root: '.layout' });</script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
