<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HN5C12BJ0W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HN5C12BJ0W');

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="三題噺用のお題をランダム表示する三題噺ガチャ。小説・短編の執筆練習や、創作チャレンジのアイデア発想に使える無料Webツールです。">
  <title>三題噺ガチャ — アイデア発想 | tadeku-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/site-link.css">
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #1a1a1a;
      --muted: #666;
      --border: #1a1a1a;
      --surface: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 4rem;
    }

    .header {
      margin-bottom: 2rem;
    }

    .lead {
      font-size: clamp(0.62rem, 2.6vw, 0.92rem);
      color: var(--muted);
      white-space: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .lead::-webkit-scrollbar {
      display: none;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin: 1.75rem 0 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.55rem 1rem;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    .btn:hover {
      background: var(--ink);
      color: #fff;
    }

    .cards {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      margin-top: 2.25rem;
      width: 100%;
    }

    .cards-row {
      --cards-gap: 2.75rem;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      column-gap: var(--cards-gap);
      align-items: stretch;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      min-height: var(--cards-row-height, auto);
    }

    .card-slot {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: stretch;
      min-width: 0;
    }

    .cards-row--with-seps .card-slot + .card-slot::before {
      content: '×';
      position: absolute;
      left: calc(var(--cards-gap) / -2);
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1;
      color: var(--muted);
      pointer-events: none;
      user-select: none;
    }

    .card-slot--add {
      align-self: center;
      justify-content: center;
      align-items: center;
    }

    .cards-add {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 800px;
      margin: 0.6rem auto 0;
    }

    .card-slot .card {
      width: 100%;
      max-width: 240px;
    }

    .btn-add {
      width: auto;
      min-width: 2rem;
      padding: 0.5rem 0.6rem;
      font-size: 1.15rem;
      line-height: 1;
    }

    .card {
      display: flex;
      flex-direction: column;
      flex: 1 1 0;
      min-width: 0;
      min-height: var(--card-height, auto);
      max-width: 240px;
      background: var(--surface);
      border: 2px solid var(--border);
      transition: opacity 0.15s;
    }

    .card.is-locked {
      opacity: 0.72;
    }

    .card-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 0.75rem;
      text-align: center;
    }

    .card-text {
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 700;
      line-height: 1.55;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.12s;
    }

    .card-text.is-changing {
      opacity: 0;
    }

    .card-foot {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 0.4rem;
      border-top: 2px solid var(--border);
      padding: 0.55rem 0.65rem;
    }

    .lock-btn {
      justify-self: end;
    }

    .reroll-btn {
      justify-self: start;
    }

    .card-action {
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    .card-action:hover:not(:disabled) {
      background: var(--ink);
      color: #fff;
    }

    .card-action.is-active {
      background: var(--ink);
      color: #fff;
    }

    .card-action:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-add:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-add:disabled:hover {
      background: var(--surface);
      color: var(--ink);
    }

    .btn-share {
      gap: 0.45rem;
      border: none;
      background: var(--ink);
      color: #fff;
      transition: opacity 0.15s ease;
    }

    .btn-share:hover {
      opacity: 0.85;
      background: var(--ink);
      color: #fff;
    }

    .btn-share svg {
      width: 0.85rem;
      height: 0.85rem;
      fill: currentColor;
    }

    @media (max-width: 640px) {
      .app {
        padding: 1.25rem 1rem 4.5rem;
      }

      .lead {
        white-space: normal;
        overflow-x: visible;
        font-size: 0.82rem;
        line-height: 1.65;
      }

      .toolbar {
        gap: 0.5rem;
      }

      .btn {
        font-size: 0.72rem;
        padding: 0.5rem 0.75rem;
      }

      .cards-row {
        --cards-gap: 2.5rem;
        grid-template-columns: 1fr;
        row-gap: var(--cards-gap);
        max-width: 320px;
      }

      .cards-row--with-seps .card-slot + .card-slot::before {
        left: 50%;
        top: calc(var(--cards-gap) / -2);
        transform: translate(-50%, -50%);
      }

      .card-slot--empty {
        display: none;
      }

      .cards-add {
        max-width: 320px;
      }

      .card-slot .card,
      .card {
        max-width: none;
      }

      .card-body {
        padding: 1.15rem 0.85rem;
      }

      .card-text {
        font-size: 1.42rem;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-all;
      }

      .btn-add {
        min-width: 3.25rem;
        padding: 0.75rem 1.15rem;
        font-size: 1.65rem;
      }

      .card-foot {
        column-gap: 0.75rem;
        padding: 0.5rem 0.55rem;
      }

      .card-action {
        font-size: 0.68rem;
        padding: 0.38rem 0.55rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="page-title" id="page-title"><a class="brand-home" href="../">tadeku-tools</a><span class="brand-sep"> / </span><span id="page-tool-name">三題噺ガチャ</span></h1>
      <p class="lead" id="page-lead">三題噺用に、3つのお題をランダムで表示します。カードを固定して引き直すこともできます</p>
    </header>

    <div class="toolbar">
      <button type="button" class="btn" id="draw-unlocked">固定以外引き直す</button>
      <button type="button" class="btn" id="draw-all">全部引き直す</button>
      <button type="button" class="btn btn-share" id="share-btn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Xでシェア
      </button>
    </div>

    <div class="cards" id="cards" aria-live="polite"></div>
  </div>

  <script src="../shared/sandai-data.js"></script>
  <script>
    (function () {
      const INITIAL_COUNT = 3;
      const CARDS_PER_ROW = 3;
      const SHARE_URL = 'https://tools.tadeku.net/sandai/';
      const allItems = (window.SANDAI_DATA?.items || []).slice();
      const cardsEl = document.getElementById('cards');
      const toolNameEl = document.getElementById('page-tool-name');
      const leadEl = document.getElementById('page-lead');

      const KANJI_ONES = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九'];

      function kanjiUnder10000(n) {
        if (n === 0) return '';
        const units = ['', '十', '百', '千'];
        const digits = String(n).split('').reverse();
        let result = '';
        digits.forEach((d, i) => {
          const v = Number(d);
          if (v === 0) return;
          const head = v === 1 && i > 0 ? '' : KANJI_ONES[v];
          result = head + units[i] + result;
        });
        return result;
      }

      function topicKanji(n) {
        if (n < 10000) return kanjiUnder10000(n);
        return String(n);
      }

      const state = Array.from({ length: INITIAL_COUNT }, (_, i) => ({
        id: i,
        value: '',
        locked: false,
      }));

      let lockedCardHeight = 0;
      let lockedRowHeight = 0;

      function lockCardDimensions() {
        if (lockedCardHeight) return;

        const cards = cardsEl.querySelectorAll('.card');
        if (!cards.length) return;

        cards.forEach((card) => {
          lockedCardHeight = Math.max(lockedCardHeight, card.offsetHeight);
        });

        const firstRow = cardsEl.querySelector('.cards-row');
        if (firstRow) {
          lockedRowHeight = firstRow.offsetHeight;
        } else {
          lockedRowHeight = lockedCardHeight;
        }

        document.documentElement.style.setProperty('--card-height', `${lockedCardHeight}px`);
        document.documentElement.style.setProperty('--cards-row-height', `${lockedRowHeight}px`);
      }

      function applyLockedDimensions() {
        if (!lockedCardHeight) return;

        cardsEl.querySelectorAll('.card').forEach((card) => {
          card.style.minHeight = `${lockedCardHeight}px`;
        });
        cardsEl.querySelectorAll('.cards-row').forEach((row) => {
          row.style.minHeight = `${lockedRowHeight}px`;
        });
      }

      function updateTitle() {
        const n = state.length;
        const kanji = topicKanji(n);
        const title = `${kanji}題噺ガチャ`;
        toolNameEl.textContent = title;
        document.title = `${title} — アイデア発想 | tadeku-tools`;
        leadEl.textContent = `${kanji}題噺用に、${n}つのお題をランダムで表示します。カードを固定して引き直すこともできます`;
      }

      function buildShareText() {
        const topics = state.map((slot) => slot.value).filter(Boolean).join(' × ');
        return `${toolNameEl.textContent}を引いたよ👇️\n\n${topics}\n\n${SHARE_URL}`;
      }

      function openShare() {
        const text = buildShareText();
        const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
        window.open(url, '_blank', 'noopener,noreferrer,width=550,height=420');
      }

      function addCard() {
        if (state.length >= allItems.length) return;

        state.push({
          id: state.length,
          value: '',
          locked: false,
        });

        renderCards();
        updateTitle();

        const newIndex = state.length - 1;
        setSlotValue(newIndex, pickItem(newIndex, ''), true);
      }

      function getCard(index) {
        return cardsEl.querySelector(`.card[data-index="${index}"]`);
      }

      function usedValues(excludeIndex) {
        return state
          .filter((_, i) => i !== excludeIndex)
          .map((slot) => slot.value)
          .filter(Boolean);
      }

      function pickItem(excludeIndex, current) {
        const used = usedValues(excludeIndex);
        const pool = allItems.filter((item) => item !== current && !used.includes(item));
        if (!pool.length) {
          const fallback = allItems.filter((item) => item !== current);
          return fallback[Math.floor(Math.random() * fallback.length)] || current;
        }
        return pool[Math.floor(Math.random() * pool.length)];
      }

      function setSlotValue(index, next, animate) {
        const card = getCard(index);
        const textEl = card.querySelector('.card-text');

        if (!animate) {
          state[index].value = next;
          textEl.textContent = next;
          return;
        }

        textEl.classList.add('is-changing');
        window.setTimeout(() => {
          state[index].value = next;
          textEl.textContent = next;
          textEl.classList.remove('is-changing');
        }, 120);
      }

      function drawSlot(index, animate) {
        if (state[index].locked) return;
        setSlotValue(index, pickItem(index, state[index].value), animate);
      }

      function drawUnlocked(animate) {
        const unlocked = state
          .map((slot, index) => ({ slot, index }))
          .filter(({ slot }) => !slot.locked);

        if (!unlocked.length) return;

        const reserved = state
          .filter((slot) => slot.locked && slot.value)
          .map((slot) => slot.value);

        const pool = allItems.filter((item) => !reserved.includes(item));
        for (let i = pool.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }

        let cursor = 0;
        unlocked.forEach(({ index }) => {
          const next = pool[cursor] ?? pickItem(index, state[index].value);
          cursor += 1;
          setSlotValue(index, next, animate);
        });
      }

      function drawAll(animate) {
        state.forEach((slot) => {
          slot.locked = false;
        });

        const pool = allItems.slice();
        for (let i = pool.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }

        state.forEach((slot, index) => {
          const next = pool[index] ?? pickItem(index, slot.value);
          setSlotValue(index, next, animate);
          updateLockUi(index);
        });
      }

      function renderCard(slot, index) {
        return `
          <article class="card${slot.locked ? ' is-locked' : ''}" data-index="${index}">
            <div class="card-body">
              <p class="card-text">${slot.value || '—'}</p>
            </div>
            <div class="card-foot">
              <button type="button" class="card-action lock-btn${slot.locked ? ' is-active' : ''}" data-index="${index}" aria-label="${slot.locked ? '固定を解除' : '固定する'}" title="${slot.locked ? '固定を解除' : '固定する'}">固定</button>
              <button type="button" class="card-action reroll-btn" data-index="${index}"${slot.locked ? ' disabled' : ''}>引き直す</button>
            </div>
          </article>
        `;
      }

      function renderAddButton() {
        const disabled = state.length >= allItems.length;
        return `<button type="button" class="btn btn-add" id="add-card" aria-label="カードを追加"${disabled ? ' disabled' : ''}>+</button>`;
      }

      function renderRow(rowItems) {
        const hasCardSeps = rowItems.length > 1
          && rowItems.every((item) => item.type === 'card');

        let html = `<div class="cards-row${hasCardSeps ? ' cards-row--with-seps' : ''}">`;
        rowItems.forEach((item) => {
          html += `<div class="card-slot">${renderCard(item.slot, item.index)}</div>`;
        });
        for (let i = rowItems.length; i < CARDS_PER_ROW; i++) {
          html += '<div class="card-slot card-slot--empty" aria-hidden="true"></div>';
        }
        html += '</div>';
        return html;
      }

      function renderCards() {
        const cardItems = state.map((slot, index) => ({ type: 'card', slot, index }));

        const rows = [];
        for (let i = 0; i < cardItems.length; i += CARDS_PER_ROW) {
          rows.push(renderRow(cardItems.slice(i, i + CARDS_PER_ROW)));
        }

        const addHtml = `<div class="cards-add">${renderAddButton()}</div>`;
        cardsEl.innerHTML = rows.join('') + addHtml;
        applyLockedDimensions();
      }

      function updateLockUi(index) {
        const slot = state[index];
        const card = getCard(index);
        card.classList.toggle('is-locked', slot.locked);
        const lockBtn = card.querySelector('.lock-btn');
        lockBtn.classList.toggle('is-active', slot.locked);
        lockBtn.setAttribute('aria-label', slot.locked ? '固定を解除' : '固定する');
        lockBtn.setAttribute('title', slot.locked ? '固定を解除' : '固定する');
        card.querySelector('.reroll-btn').disabled = slot.locked;
      }

      cardsEl.addEventListener('click', (event) => {
        const addBtn = event.target.closest('#add-card');
        if (addBtn) {
          if (!addBtn.disabled) addCard();
          return;
        }

        const lockBtn = event.target.closest('.lock-btn');
        if (lockBtn) {
          const index = Number(lockBtn.dataset.index);
          state[index].locked = !state[index].locked;
          updateLockUi(index);
          return;
        }

        const rerollBtn = event.target.closest('.reroll-btn');
        if (!rerollBtn || rerollBtn.disabled) return;
        drawSlot(Number(rerollBtn.dataset.index), true);
      });

      document.getElementById('draw-unlocked').addEventListener('click', () => {
        drawUnlocked(true);
      });

      document.getElementById('draw-all').addEventListener('click', () => {
        drawAll(true);
      });

      document.getElementById('share-btn').addEventListener('click', openShare);

      renderCards();
      drawAll(false);
      requestAnimationFrame(() => {
        lockCardDimensions();
        applyLockedDimensions();
      });
    })();
  </script>
  <script src="../shared/site-link.js"></script>
</body>
</html>
